  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ Rescue | HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 20px; overflow-x: hidden; }
        .hub-card { 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            border-radius: 28px; 
            padding: 20px; 
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .hub-card:active { transform: scale(0.96); background: #111; }
        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }
        .badge-live {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(204, 255, 0, 0.1);
            color: #ccff00;
            font-size: 8px;
            font-weight: 900;
            padding: 4px 8px;
            border-radius: 8px;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="pb-10">
    <div class="flex justify-between items-center mb-10">
        <div>
            <h1 class="font-black italic text-2xl tracking-tighter uppercase">MontCode™</h1>
            <p class="text-[8px] text-zinc-500 font-bold tracking-[0.4em] uppercase">Tactical Health System</p>
        </div>
        <div class="w-10 h-10 rounded-full border border-[#ccff00]/30 flex items-center justify-center text-[#ccff00] font-black text-xs">
            2026
        </div>
    </div>

    <div class="grid grid-cols-1 gap-4">
        
        <div onclick="window.location.replace('glucose.html')" class="hub-card">
            <span class="badge-live animate-pulse">System Active</span>
            <div class="icon-box bg-lime-500/10 text-[#ccff00]">🩸</div>
            <h2 class="text-xl font-black uppercase italic tracking-tight">Glucose Master</h2>
            <p class="text-[10px] text-zinc-500 font-medium uppercase mt-1">A1C Tracking • Tactical Logs • QR Bridge</p>
        </div>

        <div onclick="window.location.replace('feedback.html')" class="hub-card">
            <div class="icon-box bg-blue-500/10 text-blue-400">📡</div>
            <h2 class="text-xl font-black uppercase italic tracking-tight">Clinical Feedback</h2>
            <p class="text-[10px] text-zinc-500 font-medium uppercase mt-1">P2P Secure Messaging • Provider Node</p>
        </div>

        <div class="hub-card opacity-40 border-dashed border-zinc-800">
            <div class="icon-box bg-zinc-800 text-zinc-500">🫀</div>
            <h2 class="text-xl font-black uppercase italic tracking-tight">BP Monitor</h2>
            <p class="text-[10px] text-zinc-600 font-medium uppercase mt-1">Coming Soon • Arterial Mapping</p>
        </div>

    </div>

    <div class="mt-10 grid grid-cols-2 gap-3">
        <button onclick="alert('Syncing All Nodes...')" class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-[9px] font-black uppercase tracking-widest text-zinc-400">
            Manual Sync 🔄
        </button>
        <button onclick="window.print()" class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-[9px] font-black uppercase tracking-widest text-zinc-400">
            Print ID Card 🪪
        </button>
    </div>

    <footer class="mt-12 text-center">
        <p class="text-[7px] text-zinc-700 font-black uppercase tracking-[0.2em]">Local Storage Only • No Cloud • HIPAA Compliant</p>
    </footer>

    <script>
        // Lógica para mostrar mini-estadísticas en el HUB
        window.onload = () => {
            const gluData = JSON.parse(localStorage.getItem('mc_glu_master_2026')) || [];
            if(gluData.length > 0) {
                // Podríamos inyectar el último valor aquí si quisiéramos
                console.log("MontCode Hub: Glucose data detected.");
            }
        }
    </script>
</body>
</html>

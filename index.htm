  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Rescue | Official Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        body { background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        
        /* Contenedor del Logo con Carpeta Guardada */
        .logo-container {
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
        }
        .logo-container:active { transform: scale(0.95); }
        .logo-img { width: 80px; height: auto; margin: 0 auto; }

        /* Grid de Auditoría Estilo MontCode */
        .audit-grid {
            display: grid;
            grid-template-cols: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .audit-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 28px;
            padding: 22px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }
        .audit-card:active { background: #111; }

        /* Panel Admin Deslizable */
        #admin-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(5, 5, 5, 0.98);
            backdrop-filter: blur(20px);
            z-index: 100;
            transform: translateY(100%);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 1px solid #222;
        }
        #admin-panel.open { transform: translateY(0); }
    </style>
</head>
<body class="p-6">

    <div class="flex justify-between items-start mb-8">
        <div class="flex gap-2">
            <button onclick="setLang('en')" class="w-8 h-8 rounded-full border border-zinc-800 bg-zinc-900 flex items-center justify-center">🇺🇸</button>
            <button onclick="setLang('es')" class="w-8 h-8 rounded-full border border-zinc-800 bg-zinc-900 flex items-center justify-center opacity-50 hover:opacity-100">🇪🇸</button>
        </div>
        <div class="text-right">
            <p class="text-[7px] text-[#ccff00] font-black uppercase tracking-[0.3em]">MontCode™ Rescue System</p>
            <p class="text-[6px] text-zinc-500 font-bold uppercase">U.S. PAT. REGISTERED 2026</p>
        </div>
    </div>

    <header class="flex flex-col items-center mb-12">
        <div class="logo-container" onclick="toggleAdmin()">
            <img src="img/logo.png" alt="MontCode" class="logo-img mb-2" onerror="this.src='https://ui-avatars.com/api/?name=M&background=ccff00&color=000&bold=true'">
            <h1 class="text-xs font-black uppercase tracking-[0.6em] text-white">MONTCODE</h1>
        </div>
    </header>

    <div class="audit-grid">
        
        <div onclick="window.location.replace('bp.html')" class="audit-card">
            <div class="flex justify-between items-start">
                <span class="text-red-500 font-bold text-xl">🫀</span>
                <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
            </div>
            <div>
                <p class="text-[8px] font-black text-zinc-500 uppercase tracking-widest">Arterial</p>
                <h2 class="text-lg font-black italic uppercase text-white">BP Audit</h2>
            </div>
        </div>

        <div onclick="window.location.replace('glucose.html')" class="audit-card">
            <div class="flex justify-between items-start">
                <span class="text-[#ccff00] font-bold text-xl">🩸</span>
                <div class="w-2 h-2 rounded-full bg-[#ccff00]"></div>
            </div>
            <div>
                <p class="text-[8px] font-black text-zinc-500 uppercase tracking-widest">Metabolic</p>
                <h2 class="text-lg font-black italic uppercase text-white">Glucose</h2>
            </div>
        </div>

        <div onclick="window.location.replace('feedback.html')" class="audit-card">
            <div class="flex justify-between items-start">
                <span class="text-blue-400 font-bold text-xl">📡</span>
                <div class="w-2 h-2 rounded-full bg-blue-500"></div>
            </div>
            <div>
                <p class="text-[8px] font-black text-zinc-500 uppercase tracking-widest">P2P Node</p>
                <h2 class="text-lg font-black italic uppercase text-white">Feedback</h2>
            </div>
        </div>

        <div onclick="alert('Syncing Clinical Data...')" class="audit-card border-[#ccff00]/10">
            <div class="flex justify-between items-start">
                <span class="text-zinc-400 font-bold text-xl">🔄</span>
                <div class="w-2 h-2 rounded-full bg-zinc-600"></div>
            </div>
            <div>
                <p class="text-[8px] font-black text-zinc-500 uppercase tracking-widest">Global</p>
                <h2 class="text-lg font-black italic uppercase text-white">Full Sync</h2>
            </div>
        </div>

    </div>

    <div id="admin-panel" class="p-10 rounded-t-[40px]">
        <div class="w-12 h-1 bg-zinc-800 rounded-full mx-auto mb-8" onclick="toggleAdmin()"></div>
        <h3 class="text-center font-black italic uppercase text-[#ccff00] mb-8">Admin Terminal</h3>
        
        <div class="grid grid-cols-1 gap-4">
            <button onclick="clearAll()" class="w-full bg-red-600/10 border border-red-600/30 text-red-500 p-4 rounded-2xl font-black uppercase text-[10px]">Purge Audit Database</button>
            <button class="w-full bg-zinc-900 p-4 rounded-2xl font-black uppercase text-[10px]">Developer Sandbox</button>
            <button class="w-full bg-zinc-900 p-4 rounded-2xl font-black uppercase text-[10px]">NFC Key Manager</button>
        </div>
        
        <button onclick="toggleAdmin()" class="w-full mt-10 text-zinc-600 font-black uppercase text-[8px] tracking-[0.4em]">Exit Master Mode</button>
    </div>

    <footer class="mt-12 text-center">
        <p class="text-[6px] text-zinc-700 font-black uppercase tracking-[0.2em]">Zero-Cloud Architecture • HIPAA Compliant PWA</p>
    </footer>

    <script>
        function toggleAdmin() {
            document.getElementById('admin-panel').classList.toggle('open');
        }

        function clearAll() {
            if(confirm("DANGER: Delete all clinical logs?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function setLang(lang) {
            // Lógica para cambiar idioma en el Hub si es necesario
            console.log("Language changed to: " + lang);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MontCode™ Admin Bypass</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10 text-center font-sans">
    
    <div class="max-w-md mx-auto border-2 border-[#ccff00] p-8 rounded-3xl shadow-[0_0_50px_rgba(204,255,0,0.2)]">
        <h1 class="text-3xl font-black italic uppercase tracking-tighter mb-4">Admin<br>Uplink</h1>
        <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-10">Emergency Enrollment Bypass v2.6</p>
        
        <div class="space-y-4 mb-10 text-left bg-zinc-950 p-6 rounded-2xl border border-zinc-900">
            <p class="text-[9px] font-black uppercase tracking-widest text-[#ccff00]">● Injecting Admin Profile...</p>
            <p class="text-[9px] font-black uppercase tracking-widest text-[#ccff00]">● Setting Kit-ID: MC-ADMIN-TRIAL</p>
            <p class="text-[9px] font-black uppercase tracking-widest text-[#ccff00]">● Unlocking Main Dashboard...</p>
        </div>

        <button onclick="injectAndLaunch()" class="w-full py-6 bg-[#ccff00] text-black rounded-3xl font-black uppercase italic tracking-tighter text-lg hover:scale-105 transition active:scale-95">
            Force Authorize & Entry
        </button>
    </div>

    <script>
        function injectAndLaunch() {
            // INYECCIÓN DE DATOS CRÍTICOS (Simula un enrolamiento exitoso)
            localStorage.setItem('mc_kit_id', 'MC-ADMIN-TRIAL');
            localStorage.setItem('mc_patient_name', 'Admin Tester');
            localStorage.setItem('mc_patient_dob', '01/01/1980');
            localStorage.setItem('montcode_onboarded', 'true'); // Bandera mágica para saltar intro
            
            // Opcional: Inyectar datos de prueba para ver el Dashboard con vida
            localStorage.setItem('mc_bp_master_2026', JSON.stringify([{ sys: 120, dia: 80, date: new Date().toLocaleDateString() }]));

            // Redirección inmediata al Dashboard principal
            // IMPORTANTE: Asegúrate de que tu archivo principal se llame 'index.html' o 'dashboard.html'
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Feedback P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; min-height: 100vh; }
        
        .chat-bubble-dr { 
            background: #1e3a8a; 
            border-radius: 20px 20px 20px 4px; 
            border-left: 4px solid #3b82f6; 
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .status-pill {
            background: rgba(204, 255, 0, 0.1);
            color: #ccff00;
            border: 1px solid rgba(204, 255, 0, 0.2);
            font-size: 10px;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 50px;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-10">
        <button onclick="history.back()" class="text-zinc-500 font-black text-[10px] uppercase tracking-widest">← Return</button>
        <h1 class="text-xs font-black italic uppercase text-zinc-400">Dr. Direct Link</h1>
    </header>

    <main id="chat-container" class="max-w-md mx-auto">
        <div class="flex justify-center mb-8">
            <span id="connection-status" class="status-pill animate-pulse">Checking Relay...</span>
        </div>

        <div id="message-area">
            <p class="text-center text-zinc-600 italic text-xs py-20">Waiting for clinical instructions...</p>
        </div>
    </main>

    <footer class="fixed bottom-10 left-0 right-0 p-6">
        <div class="max-w-md mx-auto bg-zinc-900/50 p-4 rounded-3xl border border-zinc-800 backdrop-blur-md">
            <p class="text-[8px] font-black text-zinc-500 uppercase tracking-widest text-center mb-2">Instructions stored locally</p>
            <div class="flex gap-2">
                <button onclick="checkRelayNow()" class="flex-1 bg-white text-black text-[10px] font-black py-3 rounded-2xl uppercase italic">Manual Sync</button>
                <button onclick="window.print()" class="bg-zinc-800 text-white px-4 py-3 rounded-2xl">📋</button>
            </div>
        </div>
    </footer>

    <script>
        const kitID = localStorage.getItem('my_kit_id') || "102"; // ID del paciente

        async function checkRelayNow() {
            const status = document.getElementById('connection-status');
            status.innerText = "Syncing...";

            try {
                // El paciente pregunta al "Buzón Muerto"
                const response = await fetch(`https://your-relay-server.com/get/montcode_${kitID}`);
                const data = await response.json();

                if (data && data.message) {
                    const decodedText = atob(data.message.t);
                    saveAndDisplay(decodedText, data.message.d);
                    status.innerText = "Updated";
                } else {
                    status.innerText = "No New Messages";
                }
            } catch (e) {
                status.innerText = "Offline Mode";
                // Cargar lo que ya teníamos guardado
                const lastMsg = localStorage.getItem('last_dr_note');
                if(lastMsg) displayMessage(lastMsg, "Previous Note");
            }
        }

        function saveAndDisplay(text, timestamp) {
            const dateStr = new Date(timestamp).toLocaleString();
            localStorage.setItem('last_dr_note', text);
            localStorage.setItem('last_dr_note_date', dateStr);
            displayMessage(text, dateStr);
        }

        function displayMessage(text, date) {
            const area = document.getElementById('message-area');
            area.innerHTML = `
                <div class="chat-bubble-dr animate-in fade-in duration-500">
                    <p class="text-[10px] font-black text-blue-300 uppercase mb-2">Clinical Note • ${date}</p>
                    <p class="text-sm font-medium leading-relaxed">${text}</p>
                </div>
                <div class="px-4 py-2 bg-[#ccff00]/10 border border-[#ccff00]/20 rounded-2xl">
                    <p class="text-[9px] text-[#ccff00] font-black uppercase italic">✓ Action Required</p>
                    <p class="text-[10px] text-zinc-400 mt-1">This instruction has updated your clinical roadmap.</p>
                </div>
            `;
        }

        // Ejecutar al abrir
        window.onload = checkRelayNow;
    </script>
</body>
</html>

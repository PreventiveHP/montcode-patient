<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MontCode™ | Patient Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans antialiased">

    <div class="max-w-md mx-auto space-y-8">
        <!-- EMERGENCY HEADER -->
        <div class="flex justify-between items-center">
            <button onclick="history.back()" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest border border-zinc-800 px-4 py-2 rounded-full">← Back</button>
            <div class="flex items-center gap-2">
                <span class="text-[9px] font-black text-red-500 uppercase tracking-widest animate-pulse italic">IF EMERGENCY CALL 911</span>
            </div>
        </div>

        <h1 class="text-4xl font-black italic uppercase tracking-tighter leading-none">Clinical<br>Feedback</h1>

        <!-- PROVIDER MESSAGE BOX -->
        <div class="space-y-3">
            <p class="text-[11px] font-black text-blue-500 uppercase tracking-widest italic tracking-wider">Provider Recommendations:</p>
            <div id="provider-box" class="bg-blue-600 p-8 rounded-[40px] shadow-2xl transition-all duration-500">
                <p id="instruction-text" class="text-xl font-bold italic leading-tight text-white">"Connecting to Provider Node..."</p>
                <p id="timestamp" class="text-[9px] font-black text-blue-200 uppercase mt-4 tracking-widest opacity-60">Status: Listening</p>
            </div>
        </div>

        <!-- TACTICAL BUTTONS -->
        <div class="space-y-4">
            <p class="text-[11px] font-black text-zinc-500 uppercase tracking-widest italic">Rapid Status Report:</p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="quickReport('HYPOGLYCEMIA 🚨')" class="bg-zinc-900 border border-red-900/50 p-4 rounded-2xl text-[10px] font-black uppercase text-red-500 active:bg-red-950 transition">Low Sugar</button>
                <button onclick="quickReport('HYPOTENSION 📉')" class="bg-zinc-900 border border-blue-900/50 p-4 rounded-2xl text-[10px] font-black uppercase text-blue-400 active:bg-blue-950 transition">Low BP</button>
                <button onclick="quickReport('HYPERTENSION 📈')" class="bg-zinc-900 border border-orange-900/50 p-4 rounded-2xl text-[10px] font-black uppercase text-orange-400 active:bg-orange-950 transition">High BP</button>
                <button onclick="quickReport('DIZZY / FALL ⚠️')" class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-[10px] font-black uppercase text-zinc-400 active:bg-zinc-700 transition">Dizzy/Fall</button>
            </div>
        </div>

        <!-- INPUT AREA -->
        <div class="space-y-4">
            <textarea id="patient-msg" placeholder="Describe symptoms..." 
                class="w-full h-24 bg-zinc-900 border border-zinc-800 rounded-[30px] p-6 text-white italic text-[14px] outline-none focus:border-blue-500 transition-all"></textarea>
            
            <button id="send-btn" onclick="sendToDr()" class="w-full bg-white text-black font-black p-5 rounded-full uppercase italic text-[13px] tracking-wider active:scale-95 transition-all">
                Transmit to Provider 📡
            </button>
            
            <!-- ASYNC DISCLAIMER -->
            <p class="text-[8px] text-center font-bold text-zinc-700 uppercase tracking-[0.2em] leading-relaxed">
                ASYNCHRONOUS CHANNEL: DATA DELIVERY IS NOT INSTANT.<br>
                DO NOT USE FOR LIFE-THREATENING EMERGENCIES. CALL 911.
            </p>
        </div>
    </div>

    <script>
        const kitID = "MC-ALZ43";

        async function fetchInstruction() {
            try {
                const cacheBuster = new Date().getTime();
                const response = await fetch(`https://montcode-patient.vercel.app/api/relay?id=${kitID}&_cb=${cacheBuster}`);
                const data = await response.json();

                if (data && data.message && data.message.t) {
                    const decodedText = atob(data.message.t); 
                    const time = new Date(data.message.d).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    document.getElementById('instruction-text').innerText = `"${decodedText}"`;
                    document.getElementById('timestamp').innerText = `RECEIVED: ${time}`;
                    document.getElementById('provider-box').classList.replace('bg-blue-600', 'bg-zinc-900');
                    document.getElementById('provider-box').style.border = "1px solid #2563eb";
                }
            } catch (e) { }
        }

        function quickReport(tag) {
            document.getElementById('patient-msg').value = "REPORT: " + tag;
            sendToDr();
        }

        async function sendToDr() {
            const text = document.getElementById('patient-msg').value;
            if(!text) return;

            const btn = document.getElementById('send-btn');
            btn.innerText = "TRANSMITTING...";

            try {
                await fetch(`https://montcode-patient.vercel.app/api/relay?id=${kitID}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        t: btoa(text),
                        d: new Date().getTime(),
                        from: "PATIENT"
                    })
                });
                alert("Clinical Data Transmitted.");
                document.getElementById('patient-msg').value = "";
                btn.innerText = "TRANSMIT TO PROVIDER 📡";
            } catch (e) { 
                btn.innerText = "TRANSMIT TO PROVIDER 📡";
            }
        }

        setInterval(fetchInstruction, 5000);
        window.onload = fetchInstruction;
    </script>
</body>
</html>

<script>
    // 1. CONFIGURACIÓN DEL NODO
    // Buscamos el ID real (MC-ALZ43) o usamos el temporal
    const kitID = localStorage.getItem('my_kit_id') || "MC-ALZ43";
    const relayEndpoint = `https://montcode-patient.vercel.app/api/relay?id=${kitID}`;

    // 2. RECIBIR: El paciente descarga órdenes del Dr. automáticamente
    async function checkRelayNow() {
        const status = document.getElementById('connection-status');
        
        try {
            const response = await fetch(relayEndpoint);
            const data = await response.json();

            // Si el relay tiene un mensaje (viene como {message: {content: "texto", timestamp: "..."}})
            if (data && data.message) {
                const text = data.message.content;
                const time = data.message.timestamp || new Date().getTime();
                
                saveAndDisplay(text, time);
                status.innerText = "✓ Dr. Instruction Received";
                status.classList.remove('blink');
            } else {
                // Si no hay nada nuevo, mostramos lo último guardado
                const lastMsg = localStorage.getItem('last_provider_note');
                if (lastMsg) {
                    status.innerText = "Connected • Latency Low";
                } else {
                    status.innerText = "Waiting for Dr...";
                }
            }
        } catch (e) {
            status.innerText = "Offline Mode";
            loadFromCache();
        }
    }

    // 3. ENVIAR: Reporte rápido al Dr.
    async function sendQuickStatus(statusText, statusCode) {
        const statusPill = document.getElementById('connection-status');
        statusPill.innerText = "Sending Report...";

        const report = {
            id: kitID,
            m: statusText,
            c: statusCode,
            d: new Date().getTime(),
            origin: "Patient-Node"
        };

        try {
            await fetch(relayEndpoint, {
                method: 'POST',
                body: JSON.stringify(report)
            });
            statusPill.innerText = "Report Sent to Dr!";
            setTimeout(() => statusPill.innerText = "Connected", 3000);
        } catch (e) {
            statusPill.innerText = "Relay Error";
        }
    }

    // APOYO VISUAL
    function saveAndDisplay(text, timestamp) {
        const dateStr = new Date(timestamp).toLocaleString('en-US', { 
            hour: '2-digit', minute: '2-digit' 
        });
        localStorage.setItem('last_provider_note', text);
        localStorage.setItem('last_provider_note_date', dateStr);
        displayMessage(text, dateStr);
    }

    function loadFromCache() {
        const lastMsg = localStorage.getItem('last_provider_note');
        const lastDate = localStorage.getItem('last_provider_note_date');
        if(lastMsg) displayMessage(lastMsg, lastDate);
    }

    function displayMessage(text, date) {
        const area = document.getElementById('message-area');
        area.innerHTML = `
            <div class="p-6 bg-zinc-900 border border-blue-900/30 rounded-[32px] animate-in fade-in zoom-in duration-500">
                <div class="flex justify-between items-center mb-4">
                    <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest italic">Dr. Instruction</p>
                    <p class="text-[8px] text-zinc-600 font-bold uppercase">${date}</p>
                </div>
                <p class="text-[14px] font-medium leading-relaxed text-zinc-100 italic">"${text}"</p>
            </div>
        `;
    }

    // EJECUCIÓN CONTINUA
    window.onload = () => {
        loadFromCache(); // Cargar lo viejo al abrir
        checkRelayNow(); // Revisar inmediato
        setInterval(checkRelayNow, 5000); // Revisar cada 5 segundos solo
    };
</script>

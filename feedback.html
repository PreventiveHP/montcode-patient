<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div class="max-w-md mx-auto space-y-8">
        <div class="flex justify-between items-center">
            <button onclick="history.back()" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest border border-zinc-800 px-4 py-2 rounded-full">← Back</button>
            <span id="connection-status" class="text-[9px] font-black text-green-500 uppercase tracking-widest animate-pulse italic">Secure P2P Node Active</span>
        </div>

        <h1 class="text-4xl font-black italic uppercase tracking-tighter leading-none">Clinical<br>Feedback</h1>
        <p class="text-[10px] font-bold text-zinc-600 uppercase tracking-[0.3em]">Direct Communication • No Meta • No Cloud</p>

        <!-- AREA DE MENSAJE DEL DR -->
        <div class="space-y-3">
            <p class="text-[11px] font-black text-blue-500 uppercase tracking-widest italic">Provider Recommendations:</p>
            <div id="provider-box" class="bg-blue-600 p-8 rounded-[32px] shadow-[0_20px_50px_rgba(37,99,235,0.3)] min-h-[160px] flex flex-col justify-center">
                <p id="instruction-text" class="text-lg font-bold italic leading-tight mb-4 text-white">"Waiting for provider instructions..."</p>
                <p id="timestamp" class="text-[9px] font-black text-blue-200 uppercase tracking-widest opacity-60">Status: Listening...</p>
            </div>
        </div>

        <!-- REPORTE DEL PACIENTE -->
        <div class="space-y-4 pt-4">
            <p class="text-[11px] font-black text-zinc-500 uppercase tracking-widest italic">Your message to provider:</p>
            <textarea id="patient-msg" placeholder="Type how you feel today..." 
                class="w-full h-32 bg-zinc-900 border border-zinc-800 rounded-[32px] p-6 text-white italic text-[14px] focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
            
            <button onclick="sendToDr()" class="w-full bg-blue-600 text-white font-black p-5 rounded-full uppercase italic text-[13px] tracking-wider active:scale-95 transition-all flex items-center justify-center gap-3">
                Transmit Feedback 📡
            </button>
        </div>
    </div>

    <script>
        const kitID = localStorage.getItem('my_kit_id') || "MC-ALZ43";
        const relayEndpoint = `https://montcode-patient.vercel.app/api/relay?id=${kitID}`;

        async function fetchInstruction() {
            try {
                const response = await fetch(relayEndpoint);
                const data = await response.json();

                if (data && data.message && data.message.t) {
                    // DECODIFICAR EL MENSAJE ENVIADO POR EL DR
                    const decodedText = atob(data.message.t); 
                    const time = new Date(data.message.d).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    document.getElementById('instruction-text').innerText = `"${decodedText}"`;
                    document.getElementById('timestamp').innerText = `RECEIVED: ${time}`;
                    document.getElementById('provider-box').classList.replace('bg-blue-600', 'bg-zinc-900');
                    document.getElementById('provider-box').classList.add('border', 'border-blue-900/50');
                }
            } catch (e) { console.log("Revisando conexión..."); }
        }

        async function sendToDr() {
            const text = document.getElementById('patient-msg').value;
            if(!text) return;

            try {
                await fetch(relayEndpoint, {
                    method: 'POST',
                    body: JSON.stringify({
                        t: btoa(text),
                        d: new Date().getTime(),
                        from: "PATIENT"
                    })
                });
                alert("Report sent to provider terminal.");
                document.getElementById('patient-msg').value = "";
            } catch (e) { alert("Error sending report."); }
        }

        // Revisar mensajes automáticamente cada 5 segundos
        setInterval(fetchInstruction, 5000);
        window.onload = fetchInstruction;
    </script>
</body>
</html>

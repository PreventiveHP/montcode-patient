<main id="chat-container" class="max-w-md mx-auto">
    <div class="flex justify-center mb-6">
        <span id="connection-status" class="status-pill italic blink">Checking Relay...</span>
    </div>

    <div id="message-area" class="space-y-4 mb-10">
        <div class="py-10 text-center border border-zinc-900 rounded-[32px]">
            <p class="text-zinc-800 font-black text-[10px] uppercase tracking-[0.5em] mb-2 italic">No Active Orders</p>
            <p class="text-zinc-600 text-[10px] italic px-10">Pull to sync or wait for Dr. instructions...</p>
        </div>
    </div>

    <div class="space-y-3">
        <p class="text-[9px] font-black text-zinc-500 uppercase tracking-[0.3em] text-center mb-4 italic">Quick Clinical Report</p>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="sendQuickStatus('Feeling Great', 'SX_GOOD')" class="p-5 bg-zinc-900/50 border border-green-900/20 rounded-[24px] text-[10px] font-black uppercase italic text-green-500 active:scale-95 transition-all">
                😊 Feeling Good
            </button>
            <button onclick="sendQuickStatus('Feeling Dizzy', 'SX_DIZZY')" class="p-5 bg-zinc-900/50 border border-yellow-900/20 rounded-[24px] text-[10px] font-black uppercase italic text-yellow-500 active:scale-95 transition-all">
                🌀 Dizzy / Light
            </button>
            <button onclick="sendQuickStatus('Forgot Dose', 'SX_MISSED')" class="p-5 bg-zinc-900/50 border border-red-900/20 rounded-[24px] text-[10px] font-black uppercase italic text-red-400 active:scale-95 transition-all">
                💊 Forgot Dose
            </button>
            <button onclick="sendQuickStatus('Chest Pain', 'SX_URGENT')" class="p-5 bg-red-950/20 border border-red-600 rounded-[24px] text-[10px] font-black uppercase italic text-white animate-pulse active:scale-95 transition-all">
                ⚠️ Chest Pain
            </button>
        </div>
    </div>
</main>

<script>
    // 1. CONFIGURACIÓN DEL TUBO
    const kitID = localStorage.getItem('my_kit_id') || "MC-USER";
    const relayEndpoint = `https://montcode-patient.vercel.app/api/relay?id=${kitID}`;

    // 2. RECIBIR: El paciente descarga órdenes del Dr.
    async function checkRelayNow() {
        const status = document.getElementById('connection-status');
        status.innerText = "Syncing with Provider...";
        
        try {
            const response = await fetch(relayEndpoint);
            const data = await response.json();

            // Si hay mensaje del Dr (que viene como objeto {t: 'base64', d: timestamp})
            if (data && data.message && data.message.t) {
                const decodedText = atob(data.message.t); 
                saveAndDisplay(decodedText, data.message.d);
                status.innerText = "Provider Note Updated";
            } else {
                status.innerText = "No New Instructions";
            }
        } catch (e) {
            status.innerText = "Offline Mode";
            const lastMsg = localStorage.getItem('last_provider_note');
            const lastDate = localStorage.getItem('last_provider_note_date');
            if(lastMsg) displayMessage(lastMsg, lastDate || "Stored Local");
        }
    }

    // 3. ENVIAR: El paciente manda su estado al Dr.
    async function sendQuickStatus(statusText, statusCode) {
        const statusPill = document.getElementById('connection-status');
        statusPill.innerText = "Sending Report...";

        const report = {
            k: kitID,
            m: statusText,
            c: statusCode,
            d: new Date().getTime(),
            origin: "Remote Relay"
        };

        try {
            await fetch(relayEndpoint, {
                method: 'POST',
                body: JSON.stringify(report)
            });
            statusPill.innerText = "Report Sent!";
            setTimeout(() => statusPill.innerText = "Connected", 3000);
        } catch (e) {
            statusPill.innerText = "Error: Use QR Sync";
        }
    }

    // FUNCIONES DE APOYO (UI)
    function saveAndDisplay(text, timestamp) {
        const dateStr = new Date(timestamp).toLocaleString('en-US', { 
            month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
        });
        localStorage.setItem('last_provider_note', text);
        localStorage.setItem('last_provider_note_date', dateStr);
        displayMessage(text, dateStr);
    }

    function displayMessage(text, date) {
        const area = document.getElementById('message-area');
        area.innerHTML = `
            <div class="chat-bubble-provider">
                <div class="flex justify-between items-center mb-4">
                    <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest italic leading-none">Provider Instruction</p>
                    <p class="text-[8px] text-zinc-600 font-bold uppercase">${date}</p>
                </div>
                <p class="text-[13px] font-medium leading-relaxed text-zinc-100 italic">"${text}"</p>
            </div>
        `;
    }

    window.onload = checkRelayNow;
</script>

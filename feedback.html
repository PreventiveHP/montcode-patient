<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MontCode™ | Provider Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        .chat-bubble-provider { 
            background: #0a0a0a; 
            border-radius: 24px 24px 24px 4px; 
            border: 1px solid #1e3a8a;
            border-left: 4px solid #3b82f6; 
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .status-pill {
            background: rgba(204, 255, 0, 0.05);
            color: #ccff00;
            border: 1px solid rgba(204, 255, 0, 0.2);
            font-size: 9px;
            font-weight: 900;
            padding: 6px 14px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .emergency-banner {
            background: rgba(153, 27, 27, 0.1);
            border: 1px dashed rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body class="p-6 pb-40">

    <header class="flex justify-between items-center mb-10">
        <button onclick="history.back()" class="text-zinc-600 font-black text-[10px] uppercase tracking-[0.2em] hover:text-white transition">← Return</button>
        <div class="text-right">
            <h1 class="text-[10px] font-black italic uppercase text-[#ccff00] tracking-tighter">MontCode™ Sync</h1>
            <p class="text-[8px] font-bold text-zinc-600 uppercase tracking-widest">P2P Encrypted Relay</p>
        </div>
    </header>

    <div class="emergency-banner p-4 rounded-3xl mb-8">
        <p class="text-[10px] font-black text-red-500 uppercase italic mb-1">⚠️ Emergency Protocol</p>
        <p class="text-[11px] font-bold text-white leading-tight uppercase mb-1">If this is an emergency, call <span class="underline">911</span>.</p>
        <p class="text-[8px] text-zinc-500 italic leading-snug">Asynchronous monitoring. **Provider** response time varies. Not for acute symptoms.</p>
    </div>

    <main id="chat-container" class="max-w-md mx-auto">
        <div class="flex justify-center mb-10">
            <span id="connection-status" class="status-pill italic blink">Checking Relay...</span>
        </div>

        <div id="message-area" class="space-y-4">
            <div class="py-20 text-center">
                <p class="text-zinc-800 font-black text-[10px] uppercase tracking-[0.5em] mb-2 italic">No Active Orders</p>
                <p class="text-zinc-600 text-[10px] italic">Waiting for Provider clinical instructions...</p>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-black via-black/90 to-transparent">
        <div class="max-w-md mx-auto">
            <div class="bg-zinc-900/80 p-5 rounded-[32px] border border-zinc-800/50 backdrop-blur-xl shadow-2xl">
                <p class="text-[7px] font-black text-zinc-600 uppercase tracking-[0.3em] text-center mb-4 italic">Security: Local Vault Encrypted</p>
                <div class="flex gap-3">
                    <button onclick="checkRelayNow()" class="flex-1 bg-[#ccff00] text-black text-[11px] font-black py-4 rounded-2xl uppercase italic hover:bg-white transition-all active:scale-95 shadow-lg shadow-[#ccff00]/10">
                        Manual Sync
                    </button>
                    <button onclick="window.print()" class="bg-zinc-800 text-white px-5 py-4 rounded-2xl border border-zinc-700 active:scale-95">
                        <span class="text-xs">📋</span>
                    </button>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Obtenemos el ID del kit guardado localmente
        const kitID = localStorage.getItem('my_kit_id') || "MC-USER";

        async function checkRelayNow() {
            const status = document.getElementById('connection-status');
            status.innerText = "Syncing with Provider...";
            status.classList.add('animate-pulse');

            try {
                // El paciente consulta el "Dead Drop" encriptado
                const response = await fetch(`https://your-relay-server.com/get/montcode_${kitID}`);
                const data = await response.json();

                if (data && data.message) {
                    // Decodificamos el mensaje que viene del "tubo"
                    const decodedText = atob(data.message.t); 
                    saveAndDisplay(decodedText, data.message.d);
                    status.innerText = "Provider Note Updated";
                } else {
                    status.innerText = "No New Instructions";
                }
            } catch (e) {
                status.innerText = "Offline Mode";
                // Recuperar la última nota guardada físicamente en el teléfono
                const lastMsg = localStorage.getItem('last_provider_note');
                const lastDate = localStorage.getItem('last_provider_note_date');
                if(lastMsg) displayMessage(lastMsg, lastDate || "Stored Local");
            }
        }

        function saveAndDisplay(text, timestamp) {
            const dateStr = new Date(timestamp).toLocaleString('en-US', { 
                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
            });
            localStorage.setItem('last_provider_note', text);
            localStorage.setItem('last_provider_note_date', dateStr);
            displayMessage(text, dateStr);
        }

        function displayMessage(text, date) {
            const area = document.getElementById('message-area');
            area.innerHTML = `
                <div class="chat-bubble-provider animate-in slide-in-from-bottom-4 duration-500">
                    <div class="flex justify-between items-center mb-4">
                        <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest italic leading-none">Provider Instruction</p>
                        <p class="text-[8px] text-zinc-600 font-bold uppercase">${date}</p>
                    </div>
                    <p class="text-[13px] font-medium leading-relaxed text-zinc-100 italic">"${text}"</p>
                </div>
                
                <div class="px-6 py-4 bg-[#ccff00]/5 border border-[#ccff00]/10 rounded-3xl">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-[#ccff00] text-[10px]">●</span>
                        <p class="text-[9px] text-[#ccff00] font-black uppercase italic tracking-widest">Action Required</p>
                    </div>
                    <p class="text-[10px] text-zinc-500 leading-snug">This instruction has been integrated into your clinical roadmap. Please acknowledge receipt by pressing 'Confirm Read' in your dashboard.</p>
                </div>
            `;
        }

        // Ejecutar sincronización al abrir la vista
        window.onload = checkRelayNow;
    </script>
</body>
</html>

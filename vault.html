<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Clinical Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 20px; -webkit-tap-highlight-color: transparent; }
        
        .msg-card { 
            background: linear-gradient(135deg, #0a0a0a 0%, #111 100%);
            border: 1px solid #1e1e1e;
            border-left: 4px solid #a855f7;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.4s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-card::after {
            content: ""; position: absolute; top: 0; right: 0; width: 60px; height: 60px;
            background: radial-gradient(circle at top right, rgba(168, 85, 247, 0.05), transparent);
        }

        .pulse-icon {
            width: 8px; height: 8px; background: #a855f7; border-radius: 50%;
            display: inline-block; margin-right: 8px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } }

        .timestamp-box { font-size: 8px; font-weight: 900; color: #52525b; text-transform: uppercase; letter-spacing: 0.05em; font-style: italic; }
        .clinical-text { font-size: 14px; line-height: 1.5; color: #e4e4e7; font-weight: 500; }
        
        /* New Message Indicator */
        .new-badge { background: #a855f7; color: white; font-size: 7px; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 8px; }
    </style>
</head>
<body class="pb-24">

    <header class="flex justify-between items-center mb-8 pt-4">
        <button onclick="location.href='index.html'" class="bg-zinc-900 text-zinc-400 px-4 py-2 rounded-full text-[10px] font-black uppercase italic tracking-widest border border-zinc-800 active:scale-95 transition">← Hub</button>
        <div class="text-right">
            <h1 class="text-xl font-black italic uppercase text-white tracking-tighter leading-none">Clinical Vault</h1>
            <p class="text-[7px] font-bold text-purple-500 uppercase tracking-[0.2em]">Encrypted Terminal</p>
        </div>
    </header>

    <div id="status-area" class="mb-10 p-4 bg-zinc-900/30 rounded-2xl border border-zinc-800/50 flex justify-between items-center">
        <div class="flex items-center">
            <span class="pulse-icon"></span>
            <p id="dr-display" class="text-[9px] font-black uppercase text-zinc-500 italic">Syncing Bridge...</p>
        </div>
        <p id="kit-display" class="text-[9px] font-black uppercase text-purple-700 italic">ID: --</p>
    </div>

    <!-- Contenedor Dinámico de Mensajes -->
    <div id="messages-list" class="flex flex-col gap-4">
        <!-- Inyección vía JS -->
    </div>

    <footer class="fixed bottom-6 left-0 w-full px-6 pointer-events-none">
        <div class="bg-black/80 backdrop-blur-md py-3 border-t border-white/5 text-center">
            <p class="text-[7px] font-black uppercase italic text-zinc-600 tracking-widest">End-to-End Encryption • MontCode™ 2026</p>
        </div>
    </footer>

    <script>
        async function fetchMessages() {
            const drID = localStorage.getItem('mc_linked_dr_id');
            const kitID = localStorage.getItem('mc_kit_id') || "DEMO-USER";

            document.getElementById('kit-display').innerText = "KIT: " + kitID;
            if(drID) document.getElementById('dr-display').innerText = "PROVIDER: " + drID;

            if(!drID) {
                renderInactive();
                return;
            }

            try {
                // Fetch asíncrono al Hub del Dr.
                const response = await fetch(`https://montcode-provider.vercel.app/api/hub?dr_id=${drID}&kit_id=${kitID}`);
                const data = await response.json();

                if (response.ok && data.dr_notes) {
                    // Guardar en caché para acceso offline
                    localStorage.setItem('montcode_activation', JSON.stringify(data));
                    renderList(data.dr_notes);
                } else {
                    useCache();
                }
            } catch (err) {
                console.warn("Offline Mode: Loading Cache");
                useCache();
            }
        }

        function renderList(notes) {
            const list = document.getElementById('messages-list');
            list.innerHTML = ""; // Limpiar antes de inyectar

            if(!notes || notes.length === 0) {
                renderEmpty();
                return;
            }

            // Gestión de lectura
            const lastRead = localStorage.getItem('mc_last_note_read') || 0;
            const newestTimestamp = notes[notes.length - 1].timestamp;
            localStorage.setItem('mc_last_note_read', newestTimestamp);

            // Invertir para que el más nuevo aparezca primero visualmente
            const displayNotes = [...notes].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

            list.innerHTML = displayNotes.map(note => {
                const d = new Date(note.timestamp);
                const timeStr = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const dateStr = d.toLocaleDateString([], {day:'2-digit', month:'short'});
                const isNew = new Date(note.timestamp) > new Date(lastRead);
                
                return `
                    <div class="msg-card">
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center">
                                <span class="text-[8px] font-black text-purple-400 uppercase italic tracking-tighter">Clinical Direction</span>
                                ${isNew ? '<span class="new-badge">NEW</span>' : ''}
                            </div>
                            <span class="timestamp-box">${dateStr} • ${timeStr}</span>
                        </div>
                        <p class="clinical-text">"${note.message}"</p>
                        <div class="mt-4 flex justify-end">
                            <div class="w-6 h-6 rounded-full bg-purple-900/20 flex items-center justify-center border border-purple-500/10">
                                <span class="text-[8px] font-black text-purple-500">MC</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function useCache() {
            const activation = JSON.parse(localStorage.getItem('montcode_activation') || '{}');
            if(activation.dr_notes && activation.dr_notes.length > 0) {
                renderList(activation.dr_notes);
            } else {
                renderEmpty();
            }
        }

        function renderEmpty() {
            document.getElementById('messages-list').innerHTML = `
                <div class="py-20 text-center opacity-20">
                    <p class="text-4xl mb-4 text-zinc-500">📥</p>
                    <p class="text-[10px] font-black uppercase italic tracking-widest text-zinc-500">Inbox Clean • No Instructions</p>
                </div>`;
        }

        function renderInactive() {
            document.getElementById('messages-list').innerHTML = `
                <div class="bg-zinc-900/50 border border-dashed border-zinc-800 p-12 rounded-[32px] text-center">
                    <p class="text-3xl mb-4 opacity-30">🔒</p>
                    <p class="text-[10px] text-zinc-500 font-black uppercase italic leading-relaxed tracking-tight">
                        Vault Inactive.<br><span class="text-purple-500">Scan Doctor QR</span> to link your account.
                    </p>
                </div>`;
        }

        window.onload = fetchMessages;
    </script>
</body>
</html>

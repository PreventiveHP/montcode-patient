<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Clinical Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 20px; }
        .msg-card { 
            background: linear-gradient(135deg, #1e1b4b 0%, #000 100%);
            border: 1px solid #312e81;
            border-left: 4px solid #a855f7;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .pulse-icon {
            width: 8px; height: 8px; background: #a855f7; border-radius: 50%;
            display: inline-block; margin-right: 8px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } }
    </style>
</head>
<body class="pb-20">

    <header class="flex justify-between items-center mb-10 pt-4">
        <button onclick="location.href='index.html'" class="text-zinc-500 text-xs font-black uppercase italic tracking-widest">← Back</button>
        <div class="text-right">
            <h1 class="text-xl font-black italic uppercase text-white tracking-tighter">Clinical Vault</h1>
            <p class="text-[8px] font-bold text-purple-500 uppercase tracking-widest">Secure Provider Link</p>
        </div>
    </header>

    <div id="status-area" class="mb-8 p-4 bg-zinc-900/50 rounded-2xl border border-zinc-800 flex justify-between items-center">
        <div class="flex items-center">
            <span class="pulse-icon"></span>
            <p id="dr-display" class="text-[9px] font-black uppercase text-zinc-400">Searching Provider...</p>
        </div>
        <p id="kit-display" class="text-[9px] font-black uppercase text-purple-600">ID: ----</p>
    </div>

    <!-- Contenedor de Mensajes -->
    <div id="messages-list" class="space-y-4">
        <div class="text-center py-20">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-purple-600 mx-auto mb-4"></div>
            <p class="text-[9px] text-zinc-600 font-bold uppercase italic tracking-widest">Syncing with Provider...</p>
        </div>
    </div>

    <footer class="fixed bottom-6 left-0 w-full px-6 opacity-30 text-center">
        <p class="text-[7px] font-bold uppercase italic text-zinc-500">End-to-End Encryption • MontCode™ 2026</p>
    </footer>

    <script>
        async function fetchMessages() {
            const list = document.getElementById('messages-list');
            const drID = localStorage.getItem('mc_linked_dr_id');
            const kitID = localStorage.getItem('mc_kit_id') || "DEMO-USER";

            document.getElementById('kit-display').innerText = "ID: " + kitID;
            if(drID) document.getElementById('dr-display').innerText = "Linked: " + drID;

            if(!drID) {
                list.innerHTML = `
                    <div class="bg-zinc-900 border border-dashed border-zinc-800 p-10 rounded-[35px] text-center">
                        <p class="text-3xl mb-4 opacity-20">🔒</p>
                        <p class="text-[10px] text-zinc-500 font-black uppercase italic leading-relaxed tracking-tight">
                            Vault Inactive.<br><span class="text-purple-500">Scan Doctor QR</span> to enable clinical terminal.
                        </p>
                    </div>`;
                return;
            }

            try {
                // LLAMADA AL PROVIDER
                const response = await fetch(`https://montcode-provider.vercel.app/api/hub?id=${kitID}`);
                const data = await response.json();

                if (response.ok && data.message) {
                    const timestamp = Date.now(); // Capturamos el momento exacto
                    
                    // 1. ACTUALIZAR MEMORIA PARA EL DASHBOARD (Punto Rojo)
                    let activation = JSON.parse(localStorage.getItem('montcode_activation') || '{}');
                    if (!activation.dr_notes) activation.dr_notes = [];
                    
                    // Solo guardamos si el mensaje es diferente al último para no repetir
                    const lastSaved = activation.dr_notes[activation.dr_notes.length - 1];
                    if (!lastSaved || lastSaved.message !== data.message) {
                        activation.dr_notes.push({
                            message: data.message,
                            timestamp: timestamp
                        });
                        localStorage.setItem('montcode_activation', JSON.stringify(activation));
                    }

                    // 2. RENDERIZAR MENSAJE
                    const dateObj = new Date();
                    list.innerHTML = `
                        <div class="msg-card">
                            <div class="flex justify-between items-start mb-4">
                                <p class="text-[9px] font-black text-purple-400 uppercase italic tracking-tighter">Clinical Direction</p>
                                <span class="bg-purple-600/20 text-purple-400 px-2 py-0.5 rounded text-[7px] font-black uppercase">Active</span>
                            </div>
                            <p class="text-[15px] font-medium leading-relaxed text-white italic">"${data.message}"</p>
                            <div class="flex justify-between items-center mt-6 pt-4 border-t border-white/5">
                                <div class="flex flex-col">
                                    <span class="text-[7px] font-bold text-zinc-600 uppercase italic tracking-widest">Received</span>
                                    <span class="text-[9px] font-black text-zinc-400 uppercase italic">${dateObj.toLocaleDateString()} @ ${dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                </div>
                                <img src="logo.png.jpg" class="w-6 h-6 rounded-full opacity-50 grayscale">
                            </div>
                        </div>
                    `;
                } else {
                    renderEmpty();
                }
            } catch (err) {
                renderOffline();
            }
        }

        function renderEmpty() {
            document.getElementById('messages-list').innerHTML = `
                <p class="text-center text-zinc-700 text-[10px] font-bold uppercase italic py-20 tracking-widest">
                    Standing by for Provider Instructions...
                </p>`;
        }

        function renderOffline() {
            // Si falla el fetch, intentamos mostrar lo que ya tenemos guardado
            const activation = JSON.parse(localStorage.getItem('montcode_activation') || '{}');
            if(activation.dr_notes && activation.dr_notes.length > 0) {
                const last = activation.dr_notes[activation.dr_notes.length - 1];
                const d = new Date(last.timestamp);
                document.getElementById('messages-list').innerHTML = `
                    <div class="msg-card opacity-60">
                        <p class="text-[9px] font-black text-zinc-500 uppercase italic mb-3 tracking-tighter underline">Cached Instruction (Offline)</p>
                        <p class="text-sm font-medium leading-relaxed text-zinc-400 italic">"${last.message}"</p>
                        <p class="text-[8px] font-bold text-zinc-700 uppercase italic mt-4">Synced: ${d.toLocaleDateString()}</p>
                    </div>`;
            } else {
                document.getElementById('messages-list').innerHTML = `
                <p class="text-center text-zinc-800 text-[9px] font-black uppercase py-20">Connection Pending • Check Network</p>`;
            }
        }

        window.onload = fetchMessages;
    </script>
</body>
</html>

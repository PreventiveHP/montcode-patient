<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Clinical Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 20px; }
        .msg-card { 
            background: linear-gradient(135deg, #1e1b4b 0%, #000 100%);
            border: 1px solid #312e81;
            border-left: 4px solid #3b82f6;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .pulse-icon {
            width: 8px; height: 8px; background: #3b82f6; border-radius: 50%;
            display: inline-block; margin-right: 8px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="pb-20">

    <!-- Header -->
    <header class="flex justify-between items-center mb-10 pt-4">
        <button onclick="location.href='index.html'" class="text-zinc-500 text-xs font-black uppercase italic">← Back</button>
        <div class="text-right">
            <h1 class="text-xl font-black italic uppercase text-white">Clinical Vault</h1>
            <p class="text-[8px] font-bold text-blue-500 uppercase tracking-widest">Secure Provider Link</p>
        </div>
    </header>

    <!-- Connection Info -->
    <div id="status-area" class="mb-8 p-4 bg-zinc-900/50 rounded-2xl border border-zinc-800 flex justify-between items-center">
        <div class="flex items-center">
            <span class="pulse-icon"></span>
            <p id="dr-display" class="text-[10px] font-black uppercase text-zinc-400">Not Linked to Doctor</p>
        </div>
        <p id="kit-display" class="text-[10px] font-black uppercase text-blue-600">ID: ----</p>
    </div>

    <!-- Messages Container -->
    <div id="messages-list" class="space-y-4">
        <!-- Loader inicial -->
        <div class="text-center py-20">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p class="text-xs text-zinc-600 font-bold uppercase italic">Syncing with Provider...</p>
        </div>
    </div>

    <footer class="fixed bottom-6 left-0 w-full px-6 opacity-30 text-center">
        <p class="text-[7px] font-bold uppercase italic text-zinc-500">End-to-End Encryption • MontCode™ 2026</p>
    </footer>

    <script>
        async function fetchMessages() {
            const list = document.getElementById('messages-list');
            const drID = localStorage.getItem('mc_linked_dr_id');
            const kitID = localStorage.getItem('mc_kit_id') || "DEMO-USER";

            // Actualizar UI de cabecera
            document.getElementById('kit-display').innerText = "ID: " + kitID;
            if(drID) document.getElementById('dr-display').innerText = "Linked: " + drID;

            // Si no hay Doctor vinculado, mostrar mensaje de ayuda
            if(!drID) {
                list.innerHTML = `
                    <div class="bg-zinc-900 border border-dashed border-zinc-700 p-8 rounded-[30px] text-center">
                        <p class="text-2xl mb-4 text-zinc-700">🔒</p>
                        <p class="text-xs text-zinc-500 font-bold uppercase italic leading-relaxed">
                            Your vault is locked.<br>Scan your Doctor's QR code on the main screen to start receiving instructions.
                        </p>
                    </div>
                `;
                return;
            }

            try {
                // Buscamos el archivo de texto en la "casa" del paciente
                // La ruta es: /api/hub?id=[KITID]&type=message
                const response = await fetch(`https://montcode-provider.vercel.app/api/hub?id=${kitID}`);
                const data = await response.json();

                if (response.ok && data.message) {
                    list.innerHTML = `
                        <div class="msg-card">
                            <p class="text-[9px] font-black text-blue-400 uppercase italic mb-3 tracking-tighter">Instructions from your Provider</p>
                            <p class="text-sm font-medium leading-relaxed text-zinc-200">${data.message}</p>
                            <div class="flex justify-between items-center mt-6 pt-4 border-t border-white/5">
                                <span class="text-[8px] font-bold text-zinc-600 uppercase italic">Received: ${new Date().toLocaleDateString()}</span>
                                <span class="text-[8px] font-black text-blue-600 uppercase italic">Priority: High</span>
                            </div>
                        </div>
                    `;
                } else {
                    list.innerHTML = `
                        <p class="text-center text-zinc-600 text-[10px] font-bold uppercase italic py-20">
                            No new instructions at this time.
                        </p>
                    `;
                }
            } catch (err) {
                console.warn("Check local message storage...");
                list.innerHTML = `<p class="text-center text-zinc-700 text-[9px] font-black uppercase">Offline Mode • Connection Pending</p>`;
            }
        }

        // Ejecutar al cargar
        window.onload = fetchMessages;
    </script>
</body>
</html>

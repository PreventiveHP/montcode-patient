<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ | Link Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        #reader { width: 100% !important; min-height: 300px; background: #050505; border-radius: 24px; overflow: hidden; border: 1px solid #222; }
        video { border-radius: 24px; object-fit: cover; }
        /* Ocultar botones feos de la librería si aparecen */
        #reader__dashboard_section_csr button { display: none; }
    </style>
</head>
<body class="bg-black text-white p-6">
    
    <div class="flex justify-between items-center mb-6">
        <button onclick="location.href='index.html'" class="text-zinc-500 font-bold uppercase text-[10px]">← Back</button>
        <span class="text-[8px] text-blue-500 font-black tracking-widest uppercase">P2P Tunnel Active</span>
    </div>
    
    <h1 class="text-2xl font-black italic uppercase mb-2 tracking-tighter">Bridge Link</h1>
    <p class="text-zinc-500 text-[10px] uppercase font-bold mb-6 tracking-widest">Scan Provider QR to activate encryption</p>

    <div id="reader"></div>

    <div id="result" class="mt-8 p-6 bg-zinc-900 rounded-3xl border border-zinc-800 text-center hidden">
        <div class="w-12 h-12 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
            <span class="text-green-500">✅</span>
        </div>
        <p class="text-green-500 font-black uppercase text-xs">Link Established</p>
        <p class="text-[9px] text-zinc-500 mt-2 uppercase font-bold">Encrypted Tunnel Active.</p>
        <button onclick="location.href='index.html'" class="mt-6 bg-white text-black w-full py-4 rounded-2xl font-black uppercase text-[11px] shadow-lg">Enter Dashboard</button>
    </div>

    <script>
        let html5QrCode;

        async function onScanSuccess(decodedText) {
            try {
                const data = JSON.parse(decodedText);
                if (!data.endpoint) throw new Error("Invalid");

                localStorage.setItem('mc_dr_endpoint', decodedText);
                
                document.getElementById('reader').style.display = 'none';
                document.getElementById('result').classList.remove('hidden');
                
                if (html5QrCode) {
                    await html5QrCode.stop();
                }
                
                window.speechSynthesis.speak(new SpeechSynthesisUtterance("Link established"));
                
            } catch (e) {
                console.error("QR Error:", e);
            }
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 15, qrbox: { width: 250, height: 250 } };

            // Forzamos la cámara trasera usando "environment"
            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess
            ).catch(err => {
                console.error("Error starting camera:", err);
                // Si falla, intentamos cualquier cámara disponible
                html5QrCode.start({ facingMode: "user" }, config, onScanSuccess);
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(startScanner, 1000);
        });
    </script>

    <footer class="mt-10 text-[7px] text-zinc-700 text-center uppercase font-bold px-8">
        MontCode™ Tactical Bridge - 100% Local Encryption.
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MontCode™ | Link Provider</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">
    <h1 class="text-xl font-black italic uppercase mb-4">Link with Doctor</h1>
    <div id="reader" style="width: 100%; border-radius: 20px; overflow: hidden;"></div>
    <div id="result" class="mt-4 p-4 bg-zinc-900 rounded-2xl text-[10px] break-all font-mono">
        Scan the QR on the Doctor's Console...
    </div>

    <script>
        function onScanSuccess(decodedText) {
            try {
                // Guardamos el endpoint del Dr en el teléfono
                const drData = JSON.parse(decodedText);
                localStorage.setItem('mc_dr_endpoint', JSON.stringify(drData));
                
                document.getElementById('result').innerHTML = "✅ LINK ESTABLISHED! Now you can send vitals.";
                document.getElementById('result').classList.add('text-green-500');
                
                // Detener cámara después de éxito
                html5QrcodeScanner.clear();
            } catch (e) {
                alert("Invalid MontCode QR");
            }
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>

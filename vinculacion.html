<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ | Link Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { background: #000; overflow-x: hidden; }
        #reader { width: 100% !important; min-height: 300px; background: #050505; border-radius: 32px; overflow: hidden; border: 1px solid #1a1a1a; }
        video { border-radius: 32px; object-fit: cover; }
        #reader__dashboard_section_csr button { display: none; }
    </style>
</head>
<body class="bg-black text-white p-6">
    
    <div class="flex justify-between items-center mb-6">
        <button onclick="location.href='index.html'" class="text-zinc-500 font-bold uppercase text-[10px] bg-zinc-900/50 px-3 py-2 rounded-lg border border-zinc-800">← Back</button>
        <span class="text-[8px] text-blue-500 font-black tracking-[0.2em] uppercase italic">Tactical Bridge</span>
    </div>
    
    <h1 class="text-3xl font-black italic uppercase mb-2 tracking-tighter">Bridge Link</h1>
    <p class="text-zinc-500 text-[10px] uppercase font-bold mb-8 tracking-widest leading-tight">Scan the Provider QR from your Desktop console to establish the tunnel.</p>

    <div id="reader" class="shadow-[0_0_40px_rgba(59,130,246,0.1)]"></div>

    <div id="result" class="mt-8 p-8 bg-zinc-900/50 rounded-[32px] border border-blue-500/20 text-center hidden animate-pulse">
        <div class="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-500/30">
            <span class="text-2xl">⚡</span>
        </div>
        <p class="text-blue-400 font-black uppercase text-xs tracking-widest">Link Established</p>
        <p class="text-[9px] text-zinc-500 mt-3 uppercase font-bold leading-relaxed px-4">
            Encrypted P2P tunnel is now active with the Provider Console.
        </p>
        <button onclick="location.href='index.html'" class="mt-8 bg-white text-black w-full py-4 rounded-2xl font-black uppercase text-[11px] shadow-xl hover:scale-[1.02] transition-transform">Enter Dashboard</button>
    </div>

    <script>
        let html5QrCode;

        async function onScanSuccess(decodedText) {
            try {
                // 1. Validar que el QR sea un JSON válido de suscripción
                const data = JSON.parse(decodedText);
                if (!data.endpoint) throw new Error("Invalid Link");

                // 2. Limpiar vinculaciones viejas y guardar la nueva (con la ruta /index.html del Dr)
                localStorage.removeItem('mc_dr_endpoint');
                localStorage.setItem('mc_dr_endpoint', decodedText);
                
                // 3. UI Feedback
                document.getElementById('reader').style.display = 'none';
                document.getElementById('result').classList.remove('hidden');
                
                if (html5QrCode) {
                    await html5QrCode.stop().catch(err => console.log("Stop error", err));
                }
                
                // 4. Voz de confirmación MontCode™
                const msg = new SpeechSynthesisUtterance("Bridge established. Welcome to MontCode.");
                msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
                
            } catch (e) {
                console.error("QR Error:", e);
                // No alertamos para no interrumpir el flujo de escaneo continuo
            }
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { 
                fps: 20, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0 
            };

            // Intentar cámara trasera por defecto
            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess
            ).catch(err => {
                console.warn("Failing back to user camera...");
                html5QrCode.start({ facingMode: "user" }, config, onScanSuccess);
            });
        }

        // Delay para asegurar carga de DOM y permisos
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(startScanner, 1200);
        });
    </script>

    <footer class="fixed bottom-6 left-0 w-full text-[7px] text-zinc-800 text-center uppercase font-bold px-8 tracking-[0.3em]">
        MontCode™ Tactical Bridge System v5.7
    </footer>
</body>
</html>

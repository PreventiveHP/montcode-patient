 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600;900&display=swap');
        
        body { background: #000; color: white; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Fix Logo Box */
        .logo-box {
            width: 100px; height: 100px;
            border: 2px solid #DAA520;
            box-shadow: 0 0 30px rgba(218, 165, 32, 0.3);
            border-radius: 50%;
            overflow: hidden;
            background: #0a0a0a;
            display: flex; align-items: center; justify-content: center;
        }

        .live-panel {
            background: linear-gradient(145deg, #0a0a0a, #050505);
            border: 1px solid #1a1a1a;
            border-radius: 28px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        
        .live-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, #00ffcc, transparent);
            animation: scan-line 3s linear infinite;
        }

        @keyframes scan-line { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .pulse-live {
            width: 10px; height: 10px;
            background: #00ffcc;
            border-radius: 50%;
            box-shadow: 0 0 15px #00ffcc;
            animation: blink-live 1.5s infinite;
        }

        @keyframes blink-live { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } }

        .nav-card {
            background: #080808;
            border: 1px solid #1a1a1a;
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .nav-card:active { transform: scale(0.92); border-color: #0070f3; }
        .icon-3d { filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.2)); }

        /* Estilo para el Scanner Modal */
        #sync-modal { display: none; }
    </style>
</head>
<body class="p-6">

    <script>
        // GATEKEEPER estricto
        if (!localStorage.getItem('mc_patient_name')) {
            window.location.replace('activation.html');
        }
    </script>

    <header class="flex flex-col items-center mt-4 mb-8">
        <div class="logo-box">
            <img src="logo.png.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/100?text=MC'">
        </div>
        <h1 class="text-2xl font-orbitron font-black italic tracking-tighter">MONTCODE™</h1>
        <p class="text-[7px] text-blue-500 font-bold uppercase tracking-[0.3em] mt-1 italic">Tactical Healthcare Ecosystem</p>
    </header>

    <div class="live-panel p-6 mb-10 border-l-4 border-blue-600">
        <div class="flex justify-between items-center mb-4">
            <span class="text-[9px] font-black uppercase text-blue-400 tracking-[0.2em] italic">Clinical Bridge Active</span>
            <div class="pulse-live"></div>
        </div>
        
        <div class="min-h-[60px] flex items-center">
            <p id="msg-text" class="text-xl font-semibold italic text-zinc-100 leading-tight tracking-tight">
                "Waiting for clinical instructions..."
            </p>
        </div>

        <div class="mt-6 pt-4 border-t border-zinc-900 flex justify-between items-end">
            <div>
                <p id="display-name" class="text-[11px] font-black text-white uppercase tracking-tighter italic">PATIENT NAME</p>
                <p id="display-dob" class="text-[9px] font-bold text-zinc-500">DOB: --/--/----</p>
            </div>
            <div class="text-right">
                <span id="kit-days" class="text-[9px] bg-blue-900/40 text-blue-400 px-3 py-1 rounded-full font-black border border-blue-800/50">
                    365 DAYS LEFT
                </span>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-5 mb-10">
        <a href="bp.html" class="nav-card p-8 flex flex-col items-center text-center">
            <div class="text-4xl mb-3 icon-3d">❤️</div>
            <span class="text-[10px] font-black uppercase text-zinc-500 tracking-widest mb-1">Vital Signs</span>
            <span class="text-[9px] text-red-500 font-black italic">BP / PULSE</span>
        </a>

        <a href="glucose.html" class="nav-card p-8 flex flex-col items-center text-center">
            <div class="text-4xl mb-3 icon-3d">🩸</div>
            <span class="text-[10px] font-black uppercase text-zinc-500 tracking-widest mb-1">Metabolic</span>
            <span class="text-[9px] text-lime-400 font-black italic">GLUCOSE</span>
        </a>
    </div>

    <div id="sync-modal" class="fixed inset-0 bg-black/fb z-50 p-6 flex flex-col items-center justify-center">
        <h2 class="font-orbitron text-xl mb-4 text-blue-500 italic">SCAN DR. QR</h2>
        <div id="sync-reader" class="w-full max-w-xs aspect-square bg-zinc-900 rounded-3xl overflow-hidden border-2 border-blue-600 mb-6"></div>
        <button onclick="closeSync()" class="text-zinc-500 font-bold uppercase text-xs tracking-widest">Cancel Sync</button>
    </div>

    <footer class="mt-auto pb-6 text-center">
        <p class="text-[8px] text-zinc-800 font-black uppercase tracking-[0.3em] mb-2">MontCode Rescue v6.0</p>
        <div class="flex justify-center gap-4">
            <button onclick="openSync()" class="text-[8px] text-blue-400 font-bold uppercase italic underline">Sync Bridge Now</button>
            <button onclick="resetApp()" class="text-[8px] text-red-900 font-bold uppercase italic">System Reset</button>
        </div>
    </footer>

    <script>
        const HUB_URL = "https://montcode-provider.vercelapp/api/hub";
        let syncScanner = null;

        function initDashboard() {
            const name = localStorage.getItem('mc_patient_name') || "User";
            const dob = localStorage.getItem('mc_patient_dob') || "00/00/0000";
            
            document.getElementById('display-name').innerText = name;
            document.getElementById('display-dob').innerText = `DOB: ${dob}`;

            let activationDate = localStorage.getItem('mc_activation_date') || new Date().toISOString();
            const daysPassed = Math.floor((new Date() - new Date(activationDate)) / (1000 * 60 * 60 * 24));
            const remaining = 365 - daysPassed;
            document.getElementById('kit-days').innerText = `${remaining > 0 ? remaining : 0} DAYS LEFT`;
        }

        // LÓGICA DE SYNC BRIDGE CON CÁMARA
        async function openSync() {
            document.getElementById('sync-modal').style.display = 'flex';
            syncScanner = new Html5Qrcode("sync-reader");
            try {
                await syncScanner.start(
                    { facingMode: "environment" },
                    { fps: 20, qrbox: 200 },
                    (decodedText) => {
                        if (decodedText.startsWith("MC-DR")) {
                            localStorage.setItem('mc_dr_link', decodedText);
                            if (navigator.vibrate) navigator.vibrate(200);
                            alert("Link con Provider: OK");
                            closeSync();
                            fetchFeedback();
                        }
                    }
                );
            } catch (err) {
                alert("Camera Error: Check Permissions");
                closeSync();
            }
        }

        function closeSync() {
            if (syncScanner) {
                syncScanner.stop().finally(() => {
                    document.getElementById('sync-modal').style.display = 'none';
                });
            } else {
                document.getElementById('sync-modal').style.display = 'none';
            }
        }

        async function fetchFeedback() {
            const patientName = localStorage.getItem('mc_patient_name');
            const drLink = localStorage.getItem('mc_dr_link');
            if (!patientName || !drLink) return;

            try {
                const res = await fetch(`${HUB_URL}?patient=${patientName}&dr=${drLink}&t=${Date.now()}`);
                const data = await res.json();
                if (data.feedback) {
                    const msgEl = document.getElementById('msg-text');
                    msgEl.innerText = `"${data.feedback}"`;
                    msgEl.classList.add('text-blue-400');
                    
                    if (window.lastMsg !== data.feedback) {
                        const u = new SpeechSynthesisUtterance("New message from Doctor Montalván");
                        window.speechSynthesis.speak(u);
                        window.lastMsg = data.feedback;
                    }
                }
            } catch (e) { console.log("Searching for Dr..."); }
        }

        function resetApp() {
            if(confirm("ALERT: Clear all clinical data?")) {
                localStorage.clear();
                window.location.replace('activation.html');
            }
        }

        window.onload = () => {
            initDashboard();
            fetchFeedback();
            setInterval(fetchFeedback, 20000);
        };
    </script>
</body>
</html>

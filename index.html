 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .dash-card { background: #0a0a0a; border-radius: 28px; padding: 20px; border: 1px solid #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 120px; transition: 0.2s; }
        .dash-card:active { transform: scale(0.95); }
        .card-blue { border-bottom: 4px solid #2563eb; }
        #qr-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
    </style>
</head>
<body class="p-6">

    <!-- QR para el Dr (Modo Espejo) -->
    <div id="qr-overlay" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[40px] flex flex-col items-center" onclick="event.stopPropagation()">
            <div id="qrcode"></div>
            <p class="text-black font-black text-[10px] mt-4 tech-font italic uppercase">Provider Link</p>
        </div>
    </div>

    <header class="flex justify-between items-center mb-8 mt-4">
        <div>
            <h2 id="greet" class="text-blue-500 font-black text-[12px] tech-font uppercase italic">Welcome,</h2>
            <p id="p-name" class="text-white font-bold text-[20px] uppercase italic tracking-tighter">Authorized User</p>
        </div>
        <img src="logo.png.jpg" class="w-12 h-12 rounded-full border-2 border-yellow-600 object-cover">
    </header>

    <!-- BANNER DE SINCRONIZACIÓN (Como tu linkActivation) -->
    <div onclick="showProviderQR()" class="bg-blue-600/10 border border-blue-500/30 p-4 rounded-[25px] mb-6 flex justify-between items-center active:scale-95 transition">
        <p class="text-[10px] font-black text-blue-400 uppercase italic">Sync with Provider Console</p>
        <span class="text-blue-500 text-xl">🔗</span>
    </div>

    <!-- ÁREA DE MENSAJES DEL DOCTOR (Solo visible si hay nota) -->
    <div id="msg-box" class="hidden mb-6 bg-zinc-900 border-l-4 border-blue-600 p-6 rounded-r-2xl">
        <p class="text-[9px] text-blue-500 font-black uppercase mb-2">Dr. Instruction:</p>
        <p id="msg-text" class="text-white font-bold italic uppercase"></p>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="dash-card border-b-4 border-red-600">🍎 <p class="text-[10px] font-bold mt-2">Vitals</p></div>
        <div class="dash-card border-b-4 border-green-600">🥗 <p class="text-[10px] font-bold mt-2">Diet</p></div>
        <div class="dash-card border-b-4 border-yellow-600">💊 <p class="text-[10px] font-bold mt-2">Meds</p></div>
        <div onclick="location.href='activation.html'" class="dash-card card-blue">🆔 <p class="text-[10px] font-bold mt-2">Reset</p></div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            
            // ANALISIS DE DEEP LINK (Inspirado en tu App1)
            const isMirror = params.get('mode') === 'mirror';
            const note = params.get('note');
            const localName = localStorage.getItem('mc_patient_name');

            // BYPASS: Si es modo espejo (el Dr. mirando), no ejecutamos el redirect de activación
            if (isMirror || note) {
                console.log("Deep Link detected: Bypass Activation Check");
                document.getElementById('p-name').innerText = localName || "Remote Patient";
                
                if (note) {
                    const box = document.getElementById('msg-box');
                    document.getElementById('msg-text').innerText = decodeURIComponent(note);
                    box.classList.remove('hidden');
                }
                return; // AQUÍ SE ROMPE EL BUCLE
            }

            // Si es un usuario normal sin nombre, a activación
            if (!localName) {
                window.location.replace('activation.html');
            } else {
                document.getElementById('p-name').innerText = localName;
            }
        });

        function showProviderQR() {
            const qrBox = document.getElementById('qrcode');
            qrBox.innerHTML = "";
            // Generamos la URL con el Deep Link incluido
            const mirrorURL = window.location.origin + window.location.pathname + "?mode=mirror";
            new QRCode(qrBox, { text: mirrorURL, width: 200, height: 200 });
            document.getElementById('qr-overlay').style.display = 'flex';
        }
    </script>
</body>
</html>

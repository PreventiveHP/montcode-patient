<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Patient Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        
        /* Dashboard Cards */
        .dash-card { background: #0a0a0a; border-radius: 28px; padding: 22px; border: 1px solid #1a1a1a; transition: 0.2s; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 130px; position: relative; overflow: hidden; }
        .dash-card:active { transform: scale(0.95); background: #111; }
        
        .card-red { border-bottom: 4px solid #dc2626; box-shadow: 0 8px 20px -10px rgba(220, 38, 38, 0.4); }
        .card-green { border-bottom: 4px solid #16a34a; box-shadow: 0 8px 20px -10px rgba(22, 163, 74, 0.4); }
        .card-blue { border-bottom: 4px solid #2563eb; box-shadow: 0 8px 20px -10px rgba(37, 99, 235, 0.4); }
        .card-yellow { border-bottom: 4px solid #eab308; box-shadow: 0 8px 20px -10px rgba(234, 179, 8, 0.4); }

        #qr-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
    </style>
</head>
<body class="p-6 pb-20">

    <!-- DOCTOR ACCESS QR -->
    <div id="qr-overlay" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[45px] w-[320px] flex flex-col items-center shadow-2xl shadow-blue-500/20" onclick="event.stopPropagation()">
            <div id="qrcode" class="mb-4 border-2 border-zinc-100 p-2 rounded-2xl"></div>
            <p class="text-black font-black text-[10px] uppercase tech-font italic tracking-tighter">Doctor Console Access</p>
            <p class="text-zinc-400 text-[8px] font-bold mt-2 uppercase">Scan to sync patient data</p>
            <button class="mt-6 w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase italic">Close Link</button>
        </div>
    </div>

    <!-- HEADER -->
    <header class="flex justify-between items-center mb-8 mt-4">
        <div class="flex items-center gap-4">
            <img src="logo.png.jpg" class="w-14 h-14 rounded-full border-2 border-[#DAA520] object-cover shadow-lg shadow-yellow-500/20">
            <div>
                <h2 id="greeting-msg" class="text-blue-500 font-black text-[14px] tech-font uppercase italic leading-none">Good Morning,</h2>
                <p id="p-name" class="text-white font-bold text-[18px] uppercase tracking-tighter italic">Patient</p>
            </div>
        </div>
        <div class="text-right">
            <p id="p-dob" class="text-[8px] text-zinc-600 font-black uppercase tracking-widest italic">DOB: --/--/----</p>
        </div>
    </header>

    <!-- SYNC BANNER -->
    <div onclick="generateDoctorQR()" class="bg-blue-600/10 border border-blue-500/30 p-5 rounded-[30px] mb-6 flex items-center justify-between active:scale-95 transition">
        <div class="flex items-center gap-3">
            <span class="text-2xl">⚡</span>
            <div>
                <p class="text-[10px] font-black text-blue-400 uppercase italic leading-tight">Sync Provider</p>
                <p class="text-[7px] text-blue-300/50 font-bold uppercase tracking-widest">Share Dashboard with Dr.</p>
            </div>
        </div>
        <div class="bg-blue-600 p-2 rounded-full">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
        </div>
    </div>

    <!-- DR. ORDERS AREA (BLUE BOX) -->
    <div id="dr-message-area" class="mb-8 hidden">
        <div class="bg-zinc-900/80 border-2 border-blue-500/30 rounded-[35px] overflow-hidden">
            <div class="bg-blue-600/20 px-6 py-3 border-b border-blue-500/10 flex justify-between items-center">
                <p class="text-[9px] font-black text-blue-400 tech-font uppercase italic tracking-tighter">Medical Instruction</p>
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></span>
            </div>
            <div class="p-6">
                <p id="dr-note-text" class="text-zinc-200 text-[13px] leading-tight font-black italic uppercase tracking-tight">
                    WAITING FOR PROVIDER NOTE...
                </p>
                <div class="mt-4 pt-3 border-t border-zinc-800 flex justify-end">
                    <button onclick="acknowledgeNote()" class="text-[8px] bg-blue-600 text-white px-4 py-2 rounded-full font-black uppercase italic tracking-widest">Acknowledge</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TOOLS GRID -->
    <div class="grid grid-cols-2 gap-4">
        <div onclick="location.href='bp.html'" class="dash-card card-red">
            <span class="text-3xl mb-1">🫀</span>
            <p class="text-[10px] font-black uppercase italic tracking-tighter">BP Log</p>
        </div>
        <div onclick="location.href='glucose.html'" class="dash-card card-green">
            <span class="text-3xl mb-1">🩸</span>
            <p class="text-[10px] font-black uppercase italic tracking-tighter">Glucose</p>
        </div>
        <div onclick="location.href='food.html'" class="dash-card card-yellow">
            <span class="text-3xl mb-1">🥗</span>
            <p class="text-[10px] font-black uppercase italic tracking-tighter">Food Scan</p>
        </div>
        <div onclick="location.href='activation.html'" class="dash-card card-blue">
            <span class="text-3xl mb-1">🆔</span>
            <p class="text-[10px] font-black uppercase italic tracking-tighter">Kit Setup</p>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            // --- 1. CAPTURADOR DE NOTAS DESDE LA URL (Ruta del Provider) ---
            const urlParams = new URLSearchParams(window.location.search);
            const noteFromUrl = urlParams.get('note');
            
            if (noteFromUrl) {
                // Guardamos la nota que viene del Dr. en el storage local
                localStorage.setItem('mc_dr_note', decodeURIComponent(noteFromUrl));
                // Limpiamos la URL para una estética limpia
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            const name = localStorage.getItem('mc_patient_name');
            if (!name) {
                window.location.replace('activation.html');
            } else {
                setEnglishGreeting(name);
                document.getElementById('p-dob').innerText = "DOB: " + (localStorage.getItem('mc_patient_dob') || "--/--/----");
                checkDrNotes();
            }
        });

        function setEnglishGreeting(name) {
            const hour = new Date().getHours();
            let greet = "Good Morning,";
            if (hour >= 12 && hour < 17) greet = "Good Afternoon,";
            if (hour >= 17 || hour < 5) greet = "Good Evening,";
            document.getElementById('greeting-msg').innerText = greet;
            document.getElementById('p-name').innerText = name;
        }

        function checkDrNotes() {
            const note = localStorage.getItem('mc_dr_note');
            if (note) {
                document.getElementById('dr-note-text').innerText = `"${note}"`;
                document.getElementById('dr-message-area').classList.remove('hidden');
            }
        }

        function acknowledgeNote() {
            localStorage.removeItem('mc_dr_note');
            document.getElementById('dr-message-area').style.opacity = '0.5';
            setTimeout(() => {
                document.getElementById('dr-message-area').classList.add('hidden');
                document.getElementById('dr-message-area').style.opacity = '1';
            }, 300);
        }

        function generateDoctorQR() {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, {
                text: window.location.href,
                width: 220,
                height: 220,
                colorDark: "#000000",
                correctLevel: QRCode.CorrectLevel.H
            });
            document.getElementById('qr-overlay').style.display = 'flex';
        }
    </script>
</body>
</html>

 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        
        .dash-card { background: #111; border-radius: 24px; padding: 20px; transition: 0.2s; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 140px; border: 2px solid transparent; }
        .dash-card:active { transform: scale(0.92); }
        
        .neon-red { border-color: #dc2626; box-shadow: 0 0 15px rgba(220, 38, 38, 0.1); }
        .neon-green { border-color: #16a34a; box-shadow: 0 0 15px rgba(22, 163, 74, 0.1); }
        .neon-blue { border-color: #2563eb; box-shadow: 0 0 15px rgba(37, 99, 235, 0.1); }
        .neon-yellow { border-color: #eab308; box-shadow: 0 0 15px rgba(234, 179, 8, 0.1); }
        
        .icon-box { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 1.4rem; }
        #qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-6">

    <!-- MODAL PARA GENERAR EL QR QUE EL DR ESCANEARÁ -->
    <div id="qr-modal" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[40px] text-center max-w-xs w-full" onclick="event.stopPropagation()">
            <p class="text-black font-black text-[10px] uppercase mb-4 tech-font italic">Dashboard Link</p>
            <div id="qrcode-box" class="flex justify-center mb-6 border-2 border-zinc-100 p-2 rounded-xl"></div>
            <p class="text-[8px] text-zinc-400 font-bold uppercase mb-4">Doctor scans this for direct access</p>
            <button class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase italic text-[10px]">Close</button>
        </div>
    </div>

    <!-- HEADER: MUESTRA DATOS DEL PACIENTE YA REGISTRADOS -->
    <div class="flex justify-between items-center mb-10">
        <div>
            <h2 id="p-name" class="text-[14px] font-black text-blue-500 tech-font italic uppercase">Patient Name</h2>
            <p id="p-dob" class="text-[9px] text-zinc-600 font-bold uppercase italic tracking-widest">DOB: --/--/----</p>
        </div>
        <img src="logo.png.jpg" class="w-10 h-10 rounded-full border border-[#DAA520] object-cover">
    </div>

    <!-- BANNER: COMPARTIR CON DR (SÓLO PINTA EL QR) -->
    <div onclick="showQR()" class="mb-10 p-5 bg-blue-600/10 border-2 border-blue-500/40 rounded-[30px] flex justify-between items-center active:scale-95 transition">
        <div class="flex items-center gap-4">
            <span class="text-2xl">📱</span>
            <div>
                <p class="text-[10px] font-black uppercase text-blue-400 italic">Provider View</p>
                <p class="text-[7px] text-blue-300/60 font-bold uppercase italic">Generate QR for Doctor</p>
            </div>
        </div>
        <div class="bg-blue-600 p-2 rounded-full">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
        </div>
    </div>

    <!-- DASHBOARD GRID -->
    <div class="grid grid-cols-2 gap-5 mb-8">
        <div onclick="location.href='bp.html'" class="dash-card neon-red">
            <div class="icon-box bg-red-600">🫀</div>
            <p class="text-[10px] font-black uppercase italic">BP Log</p>
        </div>
        <div onclick="location.href='glucose.html'" class="dash-card neon-green">
            <div class="icon-box bg-green-600">🩸</div>
            <p class="text-[10px] font-black uppercase italic">Glucose</p>
        </div>
        <div onclick="location.href='food.html'" class="dash-card neon-yellow">
            <div class="icon-box bg-yellow-600">🥗</div>
            <p class="text-[10px] font-black uppercase italic">Food Scan</p>
        </div>
        <div onclick="location.href='activation.html'" class="dash-card neon-blue">
            <div class="icon-box bg-blue-600">🆔</div>
            <p class="text-[10px] font-black uppercase italic">Activation</p>
        </div>
    </div>

    <script>
        window.onload = () => {
            // Buscamos si el paciente ya se registró
            const name = localStorage.getItem('mc_patient_name');
            const dob = localStorage.getItem('mc_patient_dob');

            if (name) {
                document.getElementById('p-name').innerText = name;
                document.getElementById('p-dob').innerText = "DOB: " + dob;
            } else {
                // Si NO hay registro (usuario nuevo), mandar a activación
                window.location.replace('activation.html');
            }
        };

        function showQR() {
            const box = document.getElementById('qrcode-box');
            box.innerHTML = "";
            // Genera el link directo al index actual para el Dr.
            new QRCode(box, {
                text: window.location.href,
                width: 180,
                height: 180,
                colorDark : "#000000",
                correctLevel : QRCode.CorrectLevel.H
            });
            document.getElementById('qr-modal').style.display = 'flex';
        }
    </script>
</body>
</html>

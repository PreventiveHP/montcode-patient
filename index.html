 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Patient Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        
        .menu-card { 
            background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; 
            padding: 25px; margin-bottom: 15px; transition: all 0.3s;
            display: flex; align-items: center; justify-content: space-between;
        }
        .menu-card:active { transform: scale(0.98); background: #111; }
        
        .icon-circle {
            width: 50px; height: 50px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }
        
        .btn-lang { font-size: 20px; opacity: 0.4; filter: grayscale(1); transition: all 0.3s; }
        .btn-lang.active { opacity: 1; filter: grayscale(0); }

        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: none !important; }
        #reader__dashboard_section_csr button { background: #ccff00 !important; color: black !important; border-radius: 8px; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center mb-8 pt-4">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-[#ccff00]">MontCode™</h1>
            <p id="sub-title" class="text-[10px] text-zinc-500 uppercase tracking-widest">Personal Health Link</p>
        </div>
        <div class="flex gap-4">
            <button onclick="setLang('en')" id="btn-en" class="btn-lang active">🇺🇸</button>
            <button onclick="setLang('es')" id="btn-es" class="btn-lang">🇪🇸</button>
        </div>
    </div>

    <div id="sync-banner" class="p-5 bg-zinc-900/50 border border-zinc-800 rounded-[32px] mb-8">
        <div class="flex justify-between items-center mb-4">
            <div>
                <p id="lang-sync-title" class="text-[9px] font-black text-zinc-500 uppercase tracking-[0.2em]">Provider Connection</p>
                <p id="sync-status" class="text-xs font-bold text-red-500 uppercase italic">Not Linked</p>
            </div>
            <button id="btn-scan-action" onclick="openScanner()" class="bg-[#ccff00] text-black text-[10px] font-black px-4 py-2 rounded-full uppercase italic">Scan Dr. QR</button>
        </div>
        
        <div id="scanner-container" class="hidden">
            <div id="reader"></div>
            <button onclick="closeScanner()" class="w-full mt-4 text-[10px] font-bold text-zinc-500 uppercase py-2">Cancel Scan</button>
        </div>
    </div>

    <div class="space-y-4">
        <div onclick="window.location.href='bp.html'" class="menu-card border-blue-900/30">
            <div class="flex items-center gap-4">
                <div class="icon-circle bg-blue-950 text-blue-400">❤️</div>
                <div>
                    <h2 class="font-black text-lg lang-bp-title">Blood Pressure</h2>
                    <p id="lang-bp-sub" class="text-[10px] text-zinc-500 uppercase">Monitor & Transmit</p>
                </div>
            </div>
            <span class="text-zinc-700">→</span>
        </div>

        <div onclick="window.location.href='glucose.html'" class="menu-card border-lime-900/30">
            <div class="flex items-center gap-4">
                <div class="icon-circle bg-lime-950 text-lime-400">🩸</div>
                <div>
                    <h2 class="font-black text-lg lang-glu-title">Glucose Level</h2>
                    <p id="lang-glu-sub" class="text-[10px] text-zinc-500 uppercase">Diabetes Management</p>
                </div>
            </div>
            <span class="text-zinc-700">→</span>
        </div>

        <div class="p-4 border border-zinc-900 rounded-2xl">
            <p id="lang-name-label" class="text-[8px] font-black text-zinc-600 uppercase mb-2">Patient Identification</p>
            <input type="text" id="patient-name" oninput="savePatientInfo()" placeholder="Enter Full Name" 
                   class="w-full bg-transparent border-b border-zinc-800 text-sm font-bold p-1 outline-none text-[#ccff00]">
        </div>
    </div>

    <div class="mt-10 text-center">
        <div class="flex justify-center gap-2">
            <div class="w-1 h-1 bg-green-500 rounded-full animate-ping"></div>
            <span class="text-[8px] text-green-700 font-bold uppercase tracking-widest">Tactical System Active</span>
        </div>
    </div>

    <script>
        let currentLang = localStorage.getItem('mc_lang') || 'en';
        let html5QrCode = null;

        const translations = {
            es: {
                sub: "Vínculo de Salud Personal",
                syncT: "Conexión con Proveedor",
                notL: "No Vinculado",
                linked: "Vinculado con:",
                bpT: "Presión Arterial",
                bpS: "Monitoreo y Transmisión",
                gluT: "Nivel de Glucosa",
                gluS: "Control de Diabetes",
                nameL: "Identificación del Paciente",
                scanBtn: "Escanear QR Dr.",
                cancel: "Cancelar Escaneo"
            },
            en: {
                sub: "Personal Health Link",
                syncT: "Provider Connection",
                notL: "Not Linked",
                linked: "Linked to:",
                bpT: "Blood Pressure",
                bpS: "Monitor & Transmit",
                gluT: "Glucose Level",
                gluS: "Diabetes Management",
                nameL: "Patient Identification",
                scanBtn: "Scan Dr. QR",
                cancel: "Cancel Scan"
            }
        };

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('mc_lang', lang);
            const t = translations[lang];

            document.getElementById('sub-title').innerText = t.sub;
            document.getElementById('lang-sync-title').innerText = t.syncT;
            document.querySelector('.lang-bp-title').innerText = t.bpT;
            document.getElementById('lang-bp-sub').innerText = t.bpS;
            document.querySelector('.lang-glu-title').innerText = t.gluT;
            document.getElementById('lang-glu-sub').innerText = t.gluS;
            document.getElementById('lang-name-label').innerText = t.nameL;
            document.getElementById('btn-scan-action').innerText = t.scanBtn;

            updateSyncStatusDisplay();
            
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
        }

        function updateSyncStatusDisplay() {
            const storedID = localStorage.getItem('mc_provider_id');
            const statusEl = document.getElementById('sync-status');
            const t = translations[currentLang];
            
            if(storedID) {
                statusEl.innerText = `${t.linked} ${storedID}`;
                statusEl.classList.remove('text-red-500');
                statusEl.classList.add('text-[#ccff00]');
            } else {
                statusEl.innerText = t.notL;
                statusEl.classList.remove('text-[#ccff00]');
                statusEl.classList.add('text-red-500');
            }
        }

        function openScanner() {
            document.getElementById('scanner-container').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                (decodedText) => {
                    // ÉXITO: Guardamos el ID del Doctor escaneado
                    localStorage.setItem('mc_provider_id', decodedText);
                    
                    // Feedback visual rápido antes de recargar
                    document.getElementById('sync-status').innerText = "LINKED!";
                    document.getElementById('sync-status').classList.replace('text-red-500', 'text-[#ccff00]');
                    
                    // Detener cámara y refrescar para aplicar cambios
                    html5QrCode.stop().then(() => {
                        location.reload();
                    });
                }
            ).catch(err => {
                console.error("Error al iniciar el scanner", err);
            });
        }

        function closeScanner() {
            if(html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scanner-container').classList.add('hidden');
                }).catch(() => {
                    document.getElementById('scanner-container').classList.add('hidden');
                });
            } else {
                document.getElementById('scanner-container').classList.add('hidden');
            }
        }

        function savePatientInfo() {
            const name = document.getElementById('patient-name').value;
            localStorage.setItem('mc_patient_name', name);
        }

        window.onload = () => {
            setLang(currentLang);
            document.getElementById('patient-name').value = localStorage.getItem('mc_patient_name') || '';
        };
    </script>
</body>
</html>

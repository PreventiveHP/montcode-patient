<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MontCode™ | Patient Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .menu-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; padding: 20px; transition: 0.3s; }
        .menu-card:active { transform: scale(0.98); background: #111; }
    </style>
</head>
<body>
    <header class="mb-8">
        <h1 class="text-3xl font-black italic uppercase tracking-tighter">MontCode™</h1>
        <div id="connection-status" class="inline-flex items-center gap-2 mt-2 px-3 py-1 rounded-full border text-[10px] font-bold uppercase tracking-widest">
            </div>
    </header>

    <div class="grid gap-4">
        <div onclick="location.href='bp.html'" class="menu-card flex items-center justify-between border-blue-500/20">
            <div class="flex items-center gap-4">
                <div class="text-3xl">🩸</div>
                <div>
                    <h2 class="font-black italic uppercase text-sm">Blood Pressure</h2>
                    <p class="text-[9px] text-zinc-500 uppercase">Triage & Logs</p>
                </div>
            </div>
            <div class="text-blue-500">→</div>
        </div>

        <div onclick="location.href='vinculacion.html'" class="menu-card flex items-center justify-between border-zinc-800">
            <div class="flex items-center gap-4">
                <div class="text-3xl">📲</div>
                <div>
                    <h2 class="font-black italic uppercase text-sm text-zinc-400">Link with Doctor</h2>
                    <p class="text-[9px] text-zinc-500 uppercase">NFC / QR Bridge</p>
                </div>
            </div>
            <div class="text-zinc-700">→</div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const status = document.getElementById('connection-status');
            const hasLink = localStorage.getItem('mc_dr_endpoint');
            
            if (hasLink) {
                status.classList.add('border-green-500/30', 'text-green-500', 'bg-green-500/5');
                status.innerText = "● Bridge Active";
            } else {
                status.classList.add('border-zinc-800', 'text-zinc-600');
                status.innerText = "○ Local Mode Only";
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ Patient Hub</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neon-pulse { animation: neon-respiration 3s infinite ease-in-out; }
        @keyframes neon-respiration {
            0%, 100% { box-shadow: 0 0 5px rgba(204, 255, 0, 0.2); border-color: rgba(204, 255, 0, 0.2); }
            50% { box-shadow: 0 0 25px rgba(204, 255, 0, 0.6); border-color: rgba(204, 255, 0, 1); }
        }
        .bg-grid { background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col p-6 font-sans bg-grid">

    <div class="flex justify-between items-center mb-10">
        <div class="flex items-center gap-3">
            <img src="logo.png.jpg" class="w-10 h-10 rounded-full border border-zinc-800">
            <div>
                <h1 class="text-xs font-black uppercase tracking-widest text-zinc-500">Patient ID</h1>
                <p id="display-pid" class="text-white font-mono text-sm font-bold">MC-XXXX</p>
            </div>
        </div>
        <div class="text-right">
            <div id="connection-dot" class="inline-block w-2 h-2 bg-[#ccff00] rounded-full mr-1"></div>
            <span class="text-[9px] font-black uppercase text-zinc-500 tracking-tighter">Live Bridge</span>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <a href="bp.html" class="bg-zinc-900/80 border border-zinc-800 p-6 rounded-[35px] flex flex-col items-center justify-center gap-3 active:scale-95 transition-all">
            <span class="text-3xl">❤️</span>
            <span class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Blood Pressure</span>
        </a>

        <a href="glucose.html" class="bg-zinc-900/80 border border-zinc-800 p-6 rounded-[35px] flex flex-col items-center justify-center gap-3 active:scale-95 transition-all">
            <span class="text-3xl">🩸</span>
            <span class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Glucose</span>
        </a>

        <a href="food.html" class="bg-zinc-900/80 border border-zinc-800 p-6 rounded-[35px] flex flex-col items-center justify-center gap-3 active:scale-95 transition-all">
            <span class="text-3xl">🥗</span>
            <span class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Food Scan</span>
        </a>

        <a href="activation.html" class="bg-zinc-900/80 border border-zinc-800 p-6 rounded-[35px] flex flex-col items-center justify-center gap-3 active:scale-95 transition-all">
            <span class="text-3xl">⚙️</span>
            <span class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Sync Provider</span>
        </a>
    </div>

    <div id="feedback-container" class="mt-auto">
        <p class="text-[9px] font-black uppercase tracking-[0.3em] text-zinc-600 mb-3 ml-2">Provider Messages</p>
        <div id="feedback-box" class="bg-zinc-900 border-2 border-zinc-800 p-6 rounded-[40px] transition-all duration-1000 min-h-[100px] flex items-center justify-center">
            <p id="feedback-text" class="text-zinc-700 font-bold italic text-sm text-center uppercase tracking-tighter">
                Awaiting Doctor's instructions...
            </p>
        </div>
    </div>

    <script>
        // Cargar Datos Locales
        const pid = localStorage.getItem('patient_id') || ("MC-" + Math.random().toString(36).substr(2, 4).toUpperCase());
        localStorage.setItem('patient_id', pid); // Asegurar permanencia
        document.getElementById('display-pid').innerText = pid;

        const providerID = localStorage.getItem('linked_provider_id');

        // Inicializar Pusher para escuchar al Dr.
        const pusher = new Pusher('284fc98940a4b6d4c359', { cluster: 'us2' });
        
        // El paciente se suscribe a SU PROPIO canal para recibir feedback
        const feedbackChannel = pusher.subscribe('feedback-' + pid);

        feedbackChannel.bind('new-message', function(data) {
            const box = document.getElementById('feedback-box');
            const text = document.getElementById('feedback-text');

            // Actualizar texto y aplicar efecto Neón "Latiendo"
            text.innerText = data.message;
            text.classList.remove('text-zinc-700');
            text.classList.add('text-[#ccff00]');
            box.classList.add('neon-pulse', 'border-[#ccff00]');
            
            // Sonido o Vibración
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        });
    </script>
</body>
</html>

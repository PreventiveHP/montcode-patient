<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Patient Hub</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .dash-card { background: #0a0a0a; border-radius: 28px; padding: 20px; border: 1px solid #1a1a1a; transition: 0.2s; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 130px; }
        .dash-card:active { transform: scale(0.95); }
        .card-red { border-bottom: 4px solid #dc2626; }
        .card-green { border-bottom: 4px solid #16a34a; }
        .card-blue { border-bottom: 4px solid #2563eb; }
        .card-yellow { border-bottom: 4px solid #eab308; }
        .card-purple { border-bottom: 4px solid #a855f7; }
        .card-zinc { border-bottom: 4px solid #71717a; }
        #qr-overlay, #provider-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
    </style>
</head>
<body class="p-6 pb-20">

    <div class="flex justify-end mb-2">
        <button onclick="toggleSpanish()" class="text-2xl grayscale hover:grayscale-0 transition" title="Translate to Spanish">🇪🇸</button>
    </div>

    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-4">
            <img src="logo.png.jpg" class="w-14 h-14 rounded-full border-2 border-[#DAA520] object-cover shadow-lg">
            <div>
                <h2 id="greet" class="text-blue-400 font-black text-[14px] tech-font uppercase italic leading-none">Good Morning,</h2>
                <p id="p-name" class="text-white font-bold text-[18px] uppercase italic">Patient</p>
            </div>
        </div>
        <div class="text-right">
            <p id="p-dob" class="text-[8px] text-zinc-600 font-black uppercase italic">DOB: VERIFIED</p>
        </div>
    </header>

    <div id="dr-message-area" class="mb-8 hidden">
        <div class="bg-zinc-900 border-2 border-blue-500 rounded-[35px] overflow-hidden">
            <div class="bg-blue-600/20 px-6 py-2 border-b border-blue-500/10 flex justify-between">
                <p class="text-[9px] font-black text-blue-400 tech-font uppercase">Medical Instruction</p>
            </div>
            <div class="p-6 text-center">
                <p id="dr-note-text" class="text-white text-[15px] font-black italic uppercase italic">NO MESSAGE</p>
                <button onclick="acknowledgeNote()" class="mt-4 text-[9px] bg-blue-600 text-white px-5 py-2 rounded-full font-black uppercase italic">Acknowledge</button>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div onclick="location.href='bp.html'" class="dash-card card-red">
            <span class="text-3xl mb-1">🫀</span>
            <p id="lbl-bp" class="text-[10px] font-black uppercase italic tracking-tighter">BP Log</p>
        </div>
        <div onclick="location.href='glucose.html'" class="dash-card card-green">
            <span class="text-3xl mb-1">🩸</span>
            <p id="lbl-glu" class="text-[10px] font-black uppercase italic tracking-tighter">Glucose</p>
        </div>
        <div onclick="initNFCSync()" class="dash-card card-purple">
            <span class="text-3xl mb-1 animate-pulse">📡</span>
            <p id="lbl-nfc" class="text-[10px] font-black uppercase italic tracking-tighter">NFC Sync</p>
        </div>
        <div onclick="document.getElementById('provider-overlay').style.display='flex'" class="dash-card card-blue">
            <span class="text-3xl mb-1">🩺</span>
            <p id="lbl-cli" class="text-[10px] font-black uppercase italic tracking-tighter text-blue-400">Clinical Mode</p>
        </div>
    </div>

    <div id="qr-overlay" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[45px] w-[320px] flex flex-col items-center">
            <div id="qrcode"></div>
            <p class="text-black font-black text-[10px] uppercase mt-4">Provider Sync QR</p>
        </div>
    </div>

    <script>
        // REDIRECCIÓN INTELIGENTE
        // Si la URL contiene "?mode=dr", no pedimos activación (permite al Dr entrar)
        const isDrMode = new URLSearchParams(window.location.search).get('mode') === 'dr';
        if (!localStorage.getItem('montcode_activation') && !isDrMode) {
            window.location.replace('activation.html');
        }

        window.addEventListener('load', () => {
            const name = localStorage.getItem('mc_patient_name') || "Patient";
            document.getElementById('p-name').innerText = name;
            setGreeting();
            checkDrNotes();
        });

        function setGreeting() {
            const hour = new Date().getHours();
            let g = "Good Morning,";
            if(hour >= 12 && hour < 17) g = "Good Afternoon,";
            if(hour >= 17 || hour < 5) g = "Good Evening,";
            document.getElementById('greet').innerText = g;
        }

        function checkDrNotes() {
            const note = localStorage.getItem('mc_dr_note');
            if (note) {
                document.getElementById('dr-note-text').innerText = `"${note}"`;
                document.getElementById('dr-message-area').classList.remove('hidden');
            }
        }

        async function initNFCSync() {
            const name = localStorage.getItem('mc_patient_name') || "User";
            // RUTA DINÁMICA: index.html + modo dr + nombre del paciente
            const syncURL = `${window.location.origin}${window.location.pathname}?mode=dr&pt=${encodeURIComponent(name)}`;
            
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    await ndef.write(syncURL);
                    alert("NFC Linked to: " + name);
                } catch (error) {
                    alert("NFC Error: Use Chrome on Android.");
                }
            } else {
                // Fallback a QR si el NFC no está disponible
                const qrContainer = document.getElementById('qrcode');
                qrContainer.innerHTML = "";
                new QRCode(qrContainer, { text: syncURL, width: 200, height: 200 });
                document.getElementById('qr-overlay').style.display = 'flex';
            }
        }

        function toggleSpanish() {
            const labels = {
                "lbl-bp": "Registro PA",
                "lbl-glu": "Glucosa",
                "lbl-nfc": "Sinc NFC",
                "lbl-cli": "Modo Clínico"
            };
            for (let id in labels) {
                document.getElementById(id).innerText = labels[id];
            }
        }

        function acknowledgeNote() {
            localStorage.removeItem('mc_dr_note');
            document.getElementById('dr-message-area').classList.add('hidden');
        }
    </script>
</body>
</html>

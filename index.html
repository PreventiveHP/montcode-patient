 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Patient Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        
        .menu-card { 
            background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; 
            padding: 25px; margin-bottom: 15px; transition: all 0.3s;
            display: flex; align-items: center; justify-content: space-between;
        }
        .menu-card:active { transform: scale(0.98); background: #111; }
        
        .icon-circle {
            width: 50px; height: 50px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }
        
        .btn-lang { font-size: 20px; opacity: 0.4; grayscale: 1; transition: all 0.3s; }
        .btn-lang.active { opacity: 1; filter: grayscale(0); }
    </style>
</head>
<body>

    <div class="flex justify-between items-center mb-10 pt-4">
        <div>
            <h1 class="text-2xl font-black tracking-tighter">MontCode™</h1>
            <p id="sub-title" class="text-[10px] text-zinc-500 uppercase tracking-widest">Personal Health Link</p>
        </div>
        <div class="flex gap-4">
            <button onclick="setLang('en')" id="btn-en" class="btn-lang active">🇺🇸</button>
            <button onclick="setLang('es')" id="btn-es" class="btn-lang">🇪🇸</button>
        </div>
    </div>

    <div class="space-y-4">
        
        <div onclick="window.location.href='bp.html'" class="menu-card border-blue-900/30">
            <div class="flex items-center gap-4">
                <div class="icon-circle bg-blue-950 text-blue-400">❤️</div>
                <div>
                    <h2 class="font-black text-lg lang-bp-title">Blood Pressure</h2>
                    <p class="text-[10px] text-zinc-500 uppercase lang-bp-sub">Monitor & Transmit</p>
                </div>
            </div>
            <span class="text-zinc-700">→</span>
        </div>

        <div onclick="window.location.href='glucose.html'" class="menu-card border-lime-900/30">
            <div class="flex items-center gap-4">
                <div class="icon-circle bg-lime-950 text-lime-400">🩸</div>
                <div>
                    <h2 class="font-black text-lg lang-glu-title">Glucose Level</h2>
                    <p class="text-[10px] text-zinc-500 uppercase lang-glu-sub">Diabetes Management</p>
                </div>
            </div>
            <span class="text-zinc-700">→</span>
        </div>

        <div class="menu-card opacity-50">
            <div class="flex items-center gap-4">
                <div class="icon-circle bg-zinc-900 text-zinc-400">💊</div>
                <div>
                    <h2 class="font-black text-lg lang-med-title">Med Reader</h2>
                    <p class="text-[10px] text-zinc-500 uppercase lang-med-sub">AI Classification</p>
                </div>
            </div>
            <span class="text-[9px] font-black text-zinc-800 uppercase">Coming Soon</span>
        </div>

    </div>

    <div class="mt-20 text-center">
        <p class="text-[9px] text-zinc-600 uppercase tracking-[0.2em] mb-2">Secure Local Connection</p>
        <div class="flex justify-center gap-2">
            <div class="w-1 h-1 bg-green-500 rounded-full animate-ping"></div>
            <span class="text-[8px] text-green-700 font-bold uppercase">System Active</span>
        </div>
    </div>

    <script>
        let currentLang = localStorage.getItem('mc_lang') || 'en';

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('mc_lang', lang);
            
            const t = lang === 'es' ? {
                sub: "Vínculo de Salud Personal",
                bpT: "Presión Arterial",
                bpS: "Monitoreo y Transmisión",
                gluT: "Nivel de Glucosa",
                gluS: "Control de Diabetes",
                medT: "Lector de Meds",
                medS: "Clasificación IA"
            } : {
                sub: "Personal Health Link",
                bpT: "Blood Pressure",
                bpS: "Monitor & Transmit",
                gluT: "Glucose Level",
                gluS: "Diabetes Management",
                medT: "Med Reader",
                medS: "AI Classification"
            };

            document.getElementById('sub-title').innerText = t.sub;
            document.querySelector('.lang-bp-title').innerText = t.bpT;
            document.querySelector('.lang-bp-sub').innerText = t.bpS;
            document.querySelector('.lang-glu-title').innerText = t.gluT;
            document.querySelector('.lang-glu-sub').innerText = t.gluS;
            document.querySelector('.lang-med-title').innerText = t.medT;
            document.querySelector('.lang-med-sub').innerText = t.medS;

            // UI Flags
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
        }

        // Ejecutar al cargar
        window.onload = () => setLang(currentLang);
    </script>
</body>
</html>

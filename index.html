<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Patient Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        
        .menu-card { 
            background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 28px; 
            padding: 20px; margin-bottom: 12px; transition: all 0.2s;
            display: flex; align-items: center; gap: 15px;
        }
        .menu-card:active { transform: scale(0.96); background: #111; }
        
        .icon-box {
            width: 60px; height: 60px; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; font-size: 28px;
        }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-online { background: #ccff00; box-shadow: 0 0 10px #ccff00; }
        .dot-offline { background: #ff4444; }

        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: none !important; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center mb-6 pt-4">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-[#ccff00]">MontCode™</h1>
            <div class="flex items-center gap-2 mt-1">
                <div id="bridge-dot" class="status-dot dot-offline"></div>
                <p id="sync-status" class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest italic">Not Linked to Dr.</p>
            </div>
        </div>
        <button onclick="openScanner()" class="bg-zinc-900 border border-zinc-800 p-3 rounded-2xl active:scale-90 transition-transform">
            <span class="text-xl">📷</span>
        </button>
    </div>

    <div id="scanner-container" class="hidden mb-6 bg-zinc-900 p-4 rounded-3xl">
        <div id="reader"></div>
        <button onclick="closeScanner()" class="w-full mt-4 text-[10px] font-black text-zinc-500 uppercase">Cancel Scan</button>
    </div>

    <div class="mb-8 p-4 border border-zinc-900 rounded-3xl bg-zinc-950/50">
        <p class="text-[8px] font-black text-zinc-600 uppercase mb-1 ml-1 tracking-[0.2em]">Patient Profile</p>
        <input type="text" id="patient-name" oninput="savePatientInfo()" placeholder="Enter Your Name" 
               class="w-full bg-transparent border-none text-lg font-bold p-1 outline-none text-white placeholder:text-zinc-800">
    </div>

    <div class="grid grid-cols-1 gap-3">
        
        <div onclick="window.location.href='bp.html?mode=bp'" class="menu-card border-blue-900/20">
            <div class="icon-box bg-blue-950/30 text-blue-500 border border-blue-900/50">❤️</div>
            <div class="flex-1">
                <h2 class="font-black text-lg text-blue-100">Blood Pressure</h2>
                <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Clinical BP Monitor</p>
            </div>
            <span class="text-zinc-800 text-xl">→</span>
        </div>

        <div onclick="window.location.href='bp.html?mode=glucose'" class="menu-card border-lime-900/20">
            <div class="icon-box bg-lime-950/30 text-[#ccff00] border border-lime-900/50">🩸</div>
            <div class="flex-1">
                <h2 class="font-black text-lg text-lime-100">Glucose Level</h2>
                <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Sugar Tracking</p>
            </div>
            <span class="text-zinc-800 text-xl">→</span>
        </div>

    </div>

    <footer class="mt-12 text-center">
        <p class="text-[7px] text-zinc-800 font-black uppercase tracking-[0.3em] mb-4">MontCode™ Rescue Tactical v5.7</p>
        <div class="flex justify-center gap-4 opacity-30 grayscale">
            <span class="text-xs">🇺🇸</span>
            <span class="text-xs">🇪🇸</span>
        </div>
    </footer>

    <script>
        let html5QrCode = null;

        function updateSyncStatusDisplay() {
            const storedID = localStorage.getItem('mc_provider_id');
            const statusEl = document.getElementById('sync-status');
            const bridgeDot = document.getElementById('bridge-dot');
            
            if(storedID) {
                statusEl.innerText = `LINKED: ${storedID}`;
                statusEl.classList.replace('text-zinc-500', 'text-[#ccff00]');
                bridgeDot.classList.replace('dot-offline', 'dot-online');
            }
        }

        function openScanner() {
            document.getElementById('scanner-container').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    localStorage.setItem('mc_provider_id', decodedText);
                    html5QrCode.stop().then(() => {
                        document.getElementById('scanner-container').classList.add('hidden');
                        updateSyncStatusDisplay();
                        if(navigator.vibrate) navigator.vibrate(200);
                    });
                }
            ).catch(err => console.error(err));
        }

        function closeScanner() {
            if(html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scanner-container').classList.add('hidden');
                });
            }
        }

        function savePatientInfo() {
            localStorage.setItem('mc_patient_name', document.getElementById('patient-name').value);
        }

        window.onload = () => {
            document.getElementById('patient-name').value = localStorage.getItem('mc_patient_name') || '';
            updateSyncStatusDisplay();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Solo para pintar el QR que el Dr. va a escanear -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .dash-card { background: #111; border-radius: 24px; padding: 20px; transition: 0.2s; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 140px; border: 2px solid transparent; }
        .dash-card:active { transform: scale(0.92); }
        .neon-red { border-color: #dc2626; }
        .neon-green { border-color: #16a34a; }
        .neon-blue { border-color: #2563eb; }
        .neon-yellow { border-color: #eab308; }
        .icon-box { width: 52px; height: 52px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 1.5rem; }
        #qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        #dr-mailbox { display: none; background: #2563eb; color: white; padding: 16px; border-radius: 20px; margin-bottom: 24px; border: 2px solid #60a5fa; }
    </style>
</head>
<body class="p-6 pb-24">

    <!-- MODAL QR (ESTÁTICO) -->
    <div id="qr-modal" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[40px] text-center max-w-xs w-full" onclick="event.stopPropagation()">
            <p class="text-black font-black text-[12px] uppercase mb-4 tech-font italic">Doctor Access Key</p>
            <div id="qrcode-box" class="flex justify-center mb-6"></div>
            <button onclick="document.getElementById('qr-modal').style.display='none'" class="w-full bg-red-600 text-white font-black py-4 rounded-2xl uppercase italic text-[10px]">Close</button>
        </div>
    </div>

    <!-- NOTA DEL DOCTOR -->
    <div id="dr-mailbox" id="mailbox-container">
        <p class="text-[8px] font-black uppercase opacity-80 italic">📩 Message from Dr. Montalvan:</p>
        <p id="dr-note-text" class="text-[12px] font-bold italic mt-1 uppercase"></p>
    </div>

    <!-- HEADER -->
    <div class="flex justify-between items-start mb-8">
        <button onclick="toggleLang()" id="langBtn" class="bg-white text-black text-[9px] font-black px-4 py-2 rounded-full uppercase italic">🇺🇸 English</button>
        <div class="text-right">
            <p id="p-name" class="text-[11px] font-black text-blue-500 uppercase italic tech-font">User</p>
            <p id="p-dob" class="text-[7px] text-zinc-500 font-bold uppercase italic">DOB: --/--/----</p>
        </div>
    </div>

    <!-- LOGO -->
    <div class="flex flex-col items-center mb-10">
        <img src="logo.png.jpg" class="w-20 h-20 rounded-full border-2 border-[#DAA520] mb-4 object-cover">
        <h1 class="text-2xl font-black tech-font italic uppercase">MONTCODE™</h1>
    </div>

    <!-- SHARE BANNER -->
    <div onclick="showQR()" class="mb-8 p-5 bg-blue-900/20 border-2 border-blue-500/30 rounded-[30px] flex justify-between items-center active:scale-95 transition">
        <div class="flex items-center gap-4">
            <span class="text-2xl">📱</span>
            <div>
                <p class="text-[10px] font-black uppercase text-blue-400 italic">Share Dashboard</p>
                <p class="text-[7px] text-blue-300/50 font-bold uppercase italic">Link with Provider</p>
            </div>
        </div>
        <div class="bg-blue-600 p-2 rounded-full">
            <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M15 8a3 3 0 10-2.977-2.63l-4.94 2.47a3 3 0 100 4.319l4.94 2.47a3 3 0 10.895-1.789l-4.94-2.47a3.027 3.027 0 000-.74l4.94-2.47C13.456 7.68 14.19 8 15 8z"></path></svg>
        </div>
    </div>

    <!-- GRID -->
    <div class="grid grid-cols-2 gap-5 mb-8">
        <div onclick="location.href='bp.html'" class="dash-card neon-red">
            <div class="icon-box bg-red-600">🫀</div>
            <p class="text-[10px] font-black uppercase italic">BP Log</p>
        </div>
        <div onclick="location.href='glucose.html'" class="dash-card neon-green">
            <div class="icon-box bg-green-600">🩸</div>
            <p class="text-[10px] font-black uppercase italic">Glucose</p>
        </div>
        <div onclick="location.href='food.html'" class="dash-card neon-yellow">
            <div class="icon-box bg-yellow-600">🥗</div>
            <p class="text-[10px] font-black uppercase italic">Food Scan</p>
        </div>
        <div onclick="location.href='activation.html'" class="dash-card neon-blue">
            <div class="icon-box bg-blue-600">🆔</div>
            <p class="text-[10px] font-black uppercase italic">Activation</p>
        </div>
    </div>

    <script>
        // Cargar Datos
        window.onload = () => {
            document.getElementById('p-name').innerText = localStorage.getItem('mc_patient_name') || "User";
            document.getElementById('p-dob').innerText = "DOB: " + (localStorage.getItem('mc_patient_dob') || "--/--/----");
            
            // Ver si hay nota del Dr
            const n = new URLSearchParams(window.location.search).get('nota');
            if(n) {
                document.getElementById('dr-mailbox').style.display = 'block';
                document.getElementById('dr-note-text').innerText = decodeURIComponent(n).replace(/_/g,' ');
            }
        };

        function showQR() {
            const box = document.getElementById('qrcode-box');
            box.innerHTML = "";
            new QRCode(box, { text: window.location.href.split('?')[0], width: 200, height: 200 });
            document.getElementById('qr-modal').style.display = 'flex';
        }

        function toggleLang() {
            const b = document.getElementById('langBtn');
            b.innerText = b.innerText.includes('USA') ? '🇪🇸 Spanish' : '🇺🇸 English';
        }
    </script>
</body>
</html>

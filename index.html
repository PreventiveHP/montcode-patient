<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; visibility: hidden; overflow-x: hidden; }
        .dash-card { background: #111; border-radius: 20px; padding: 20px; transition: 0.2s; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 130px; border: 2px solid transparent; }
        .dash-card:active { transform: scale(0.92); filter: brightness(1.3); }
        .neon-red { border-color: #dc2626; box-shadow: 0 0 15px rgba(220, 38, 38, 0.1); }
        .neon-green { border-color: #16a34a; box-shadow: 0 0 15px rgba(22, 163, 74, 0.1); }
        .neon-blue { border-color: #2563eb; box-shadow: 0 0 15px rgba(37, 99, 235, 0.1); }
        .neon-yellow { border-color: #eab308; box-shadow: 0 0 15px rgba(234, 179, 8, 0.1); }
        .icon-box { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 1.6rem; }
        .logo-glow { border: 2px solid #DAA520; box-shadow: 0 0 20px rgba(218, 165, 32, 0.3); }
        .btn-text { font-size: 10px; font-weight: 900; text-transform: uppercase; font-style: italic; margin-top: 4px; }
        #sync-indicator { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: 900; text-transform: uppercase; background: #16a34a; color: white; padding: 2px 10px; border-radius: 50px; display: none; z-index: 1000; }
    </style>
</head>
<body class="p-6 pb-24">

    <div id="sync-indicator">Vault Synced ✓</div>

    <div class="flex justify-between items-start mb-8">
        <button id="langBtn" class="bg-white text-black text-[9px] font-black px-4 py-2 rounded-full uppercase italic">🇺🇸 English</button>
        <div class="text-right">
            <p id="display-name" class="text-[10px] font-black text-blue-500 uppercase italic">Loading...</p>
            <p id="display-dob" class="text-[7px] text-zinc-500 font-bold uppercase tracking-widest italic">DOB: --/--/----</p>
        </div>
    </div>

    <div class="flex flex-col items-center justify-center mb-10 w-full">
        <img src="logo.png.jpg" class="w-24 h-24 rounded-full logo-glow object-cover mb-4">
        <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">MONTCODE™</h1>
    </div>

    <!-- PROVIDER STATUS BAR -->
    <div id="conn-banner" class="mb-8 p-4 bg-zinc-900 border border-zinc-800 rounded-[22px] flex justify-between items-center transition">
        <div class="flex items-center gap-3">
            <span id="conn-icon" class="text-lg">🔗</span>
            <div>
                <span id="conn-txt" class="text-[9px] font-black uppercase text-white italic">Provider Connection</span>
                <p id="dr-status" class="text-[7px] text-zinc-500 font-bold uppercase tracking-tighter italic">Not Linked</p>
            </div>
        </div>
        <div id="status-led" class="w-2 h-2 rounded-full bg-zinc-700"></div>
    </div>

    <div class="grid grid-cols-2 gap-5 mb-8">
        <div onclick="location.href='bp.html'" class="dash-card neon-red">
            <div class="icon-box bg-red-600">🫀</div>
            <h2 class="btn-text">BP Log</h2>
        </div>
        <div onclick="location.href='glucose.html'" class="dash-card neon-green">
            <div class="icon-box bg-green-600">🩸</div>
            <h2 class="btn-text">Glucose</h2>
        </div>
        <div onclick="location.href='food.html'" class="dash-card neon-yellow">
            <div class="icon-box bg-yellow-600">🥗</div>
            <h2 class="btn-text">Food Scan</h2>
        </div>
        <div onclick="location.href='activation.html'" class="dash-card neon-blue">
            <div class="icon-box bg-blue-600">🆔</div>
            <h2 class="btn-text">Kit Activation</h2>
        </div>
    </div>

    <script>
        function checkEnrolment() {
            const profileName = localStorage.getItem('mc_patient_name');
            if (!profileName) {
                window.location.replace('activation.html');
            } else {
                document.body.style.visibility = 'visible';
                updateHub();
                pushDataToDoctor(); // ACTIVACIÓN DEL GRITO (PUSH)
            }
        }

        function updateHub() {
            document.getElementById('display-name').innerText = localStorage.getItem('mc_patient_name') || "User";
            document.getElementById('display-dob').innerText = `DOB: ${localStorage.getItem('mc_patient_dob') || "--/--/----"}`;
            
            const linkedDr = localStorage.getItem('mc_linked_dr_id');
            const providerName = localStorage.getItem('mc_provider_name') || "Doctor Console";
            
            if(linkedDr) {
                document.getElementById('dr-status').innerText = providerName + " | ACTIVE";
                document.getElementById('status-led').classList.replace('bg-zinc-700', 'bg-green-500');
                document.getElementById('conn-icon').innerText = "🛡️";
            }
        }

        // MOTOR DE SINCRONIZACIÓN TÁCTICA (PUSH)
        async function pushDataToDoctor() {
            const drId = localStorage.getItem('mc_linked_dr_id');
            const kitId = localStorage.getItem('mc_kit_id');
            
            if (!drId || !kitId) return;

            // Preparamos el paquete de datos cifrado (simulado)
            const patientPayload = {
                id: kitId,
                dr_target: drId,
                name: localStorage.getItem('mc_patient_name'),
                dob: localStorage.getItem('mc_patient_dob'),
                last_bp: localStorage.getItem('last_bp_value') || "--/--",
                last_glu: localStorage.getItem('last_glucose_value') || "--",
                risk: localStorage.getItem('current_risk_level') || "stable",
                last_sync: new Date().toLocaleTimeString()
            };

            console.log("Tactical Push initiated for Dr:", drId);

            // Simulación de envío al Relay
            try {
                // En un entorno productivo, esto va a tu API Vercel
                // fetch('https://tu-relay.vercel.app/api/push', { method: 'POST', body: JSON.stringify(patientPayload) });
                
                // Para tu prueba local: Guardamos en un "Buzón Compartido" simulado si es el mismo navegador
                let sharedVault = JSON.parse(localStorage.getItem('mc_patients') || '[]');
                
                // Actualizar o agregar
                const index = sharedVault.findIndex(p => p.id === kitId);
                if(index > -1) sharedVault[index] = patientPayload;
                else sharedVault.push(patientPayload);
                
                localStorage.setItem('mc_patients', JSON.stringify(sharedVault));

                // Feedback visual de éxito
                const indicator = document.getElementById('sync-indicator');
                indicator.style.display = 'block';
                setTimeout(() => indicator.style.display = 'none', 2000);

            } catch (e) { console.warn("Push failed: Offline mode."); }
        }

        window.onload = checkEnrolment;
    </script>
</body>
</html>

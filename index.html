<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MontCode">
    <link rel="apple-touch-icon" href="logo_192.png">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-3d { background: linear-gradient(145deg, #0f0f0f, #050505); border: 1px solid #1a1a1a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: all 0.3s ease; }
        .glass-3d:active { transform: scale(0.95); border-color: #3b82f6; }
        .hero-gradient { background: linear-gradient(to bottom, #003366 0%, #000000 100%); height: 240px; }
        .dr-bridge-container { border: 2px solid #333; background: rgba(10, 10, 10, 0.9); transition: all 0.5s ease; min-height: 100px; }
        .bridge-active { border-color: #ccff00; box-shadow: 0 0 20px rgba(204, 255, 0, 0.2); }
        .live-indicator { background: #ccff00; color: #000; font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 4px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="pb-20">
    <div class="hero-gradient flex flex-col items-center justify-center px-6 text-center border-b border-zinc-900">
        <img src="logo.png.jpg" alt="MontCode Logo" class="h-12 mb-3 opacity-90 rounded-lg shadow-lg">
        <p id="user-greeting" class="text-blue-400 text-[10px] font-black uppercase tracking-[0.2em] mb-1">SYSTEM READY</p>
        <h1 class="text-3xl font-[900] tracking-tighter italic uppercase mb-1 leading-none text-white">
            MONTCODE<span class="text-blue-500">-PATIENT</span>
        </h1>
        <p class="text-[7px] font-bold text-zinc-500 uppercase tracking-widest opacity-60 italic">Tactical Health Management Unit</p>
    </div>

    <div class="px-6 -mt-10">
        <div class="bg-zinc-900/90 backdrop-blur-xl border border-zinc-800 rounded-2xl p-4 mb-4 shadow-2xl">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <p class="text-[7px] font-bold text-zinc-500 uppercase tracking-widest">Link Status</p>
                    <p id="display-id" class="text-lg font-black text-blue-500 tracking-tighter uppercase">Secured</p>
                </div>
                <div class="text-right">
                    <p class="text-[7px] font-bold text-zinc-500 uppercase tracking-widest">Your Kit ID</p>
                    <p id="px-uuid-display" class="text-[9px] font-black text-[#ccff00] uppercase italic">---</p>
                </div>
            </div>
            <div class="flex items-center gap-2 border-t border-zinc-800/50 pt-2">
                <div id="status-dot" class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></div>
                <span id="status-text" class="text-[8px] font-bold text-zinc-400 uppercase tracking-widest">Sentinel Monitoring Active</span>
            </div>
        </div>

        <div id="dr-bridge" class="dr-bridge-container rounded-2xl p-4 mb-4 border-zinc-800">
            <div class="flex justify-between items-center mb-3">
                <span id="bridge-tag" class="text-[8px] font-black uppercase tracking-tighter text-zinc-600 border border-zinc-800 px-2 py-0.5 rounded">Clinical Bridge</span>
                <span id="msg-time" class="text-[7px] text-zinc-500 font-bold uppercase italic">No Messages</span>
            </div>
            <p id="dr-display" class="text-[12px] font-bold text-zinc-500 leading-snug italic">
                Awaiting instructions from provider terminal...
            </p>
        </div>

        <div class="bg-zinc-900/40 border border-zinc-800/50 p-4 rounded-2xl mb-6">
            <p class="text-[8px] font-black text-[#ccff00] uppercase tracking-[2px] mb-3 text-center">Tactical Report Feed</p>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="fastReport('GLU')" class="bg-zinc-900 border border-zinc-800 text-white font-black py-3 rounded-xl text-[9px] uppercase active:bg-[#ccff00] active:text-black transition-all">
                    Report Glucose 🩸
                </button>
                <button onclick="fastReport('BP')" class="bg-zinc-900 border border-zinc-800 text-white font-black py-3 rounded-xl text-[9px] uppercase active:bg-blue-600 transition-all">
                    Report BP 🫀
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <a href="bp-tactical.html" class="glass-3d p-5 rounded-[30px] flex flex-col items-center gap-2">
                <div class="text-xl">❤️</div>
                <span class="text-[8px] font-black uppercase tracking-widest text-zinc-400">BP Master</span>
            </a>
            <a href="glucose.html" class="glass-3d p-5 rounded-[30px] flex flex-col items-center gap-2">
                <div class="text-xl text-[#ccff00]">🩸</div>
                <span class="text-[8px] font-black uppercase tracking-widest text-zinc-400">Glucose</span>
            </a>
            <a href="food.html" class="glass-3d p-5 rounded-[30px] flex flex-col items-center gap-2">
                <div class="text-xl">🥗</div>
                <span class="text-[8px] font-black uppercase tracking-widest text-zinc-400">Food Log</span>
            </a>
            <a href="activation.html" class="glass-3d p-5 rounded-[30px] flex flex-col items-center gap-2">
                <div class="text-xl">📲</div>
                <span class="text-[8px] font-black uppercase tracking-widest text-blue-500 italic">Sync Kit</span>
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCiIUVMfCt68zWs6Z5aRcyaMQoAUyAmMRI",
            authDomain: "montcode-sentinel.firebaseapp.com",
            databaseURL: "https://montcode-sentinel-default-rtdb.firebaseio.com",
            projectId: "montcode-sentinel"
        };

        const app = initializeApp(firebaseConfig);
        const db_fire = getDatabase(app);

        let pid = localStorage.getItem('mc_patient_uuid');
        if (!pid) {
            pid = 'MC-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            localStorage.setItem('mc_patient_uuid', pid);
        }
        document.getElementById('px-uuid-display').innerText = pid;

        const pName = localStorage.getItem('patient_name');
        if(pName) document.getElementById('user-greeting').innerText = `GOOD DAY, ${pName.toUpperCase()}`;

        if(pid) {
            onValue(ref(db_fire, `mensaje_dr/${pid}`), (snapshot) => {
                const data = snapshot.val();
                const bridgeBox = document.getElementById('dr-bridge');
                const display = document.getElementById('dr-display');
                const tag = document.getElementById('bridge-tag');
                const time = document.getElementById('msg-time');

                if(data && data.texto) {
                    bridgeBox.classList.add('bridge-active');
                    display.innerText = data.texto;
                    display.className = "text-[16px] font-black text-[#ccff00] leading-tight uppercase italic";
                    tag.innerText = "LIVE INSTRUCTION";
                    tag.className = "live-indicator uppercase tracking-tighter";
                    const msgDate = data.timestamp ? new Date(data.timestamp) : new Date();
                    time.innerText = msgDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    time.className = "text-[7px] text-[#ccff00] font-black uppercase italic animate-pulse";
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                }
            });
        }

        // --- ENVÍO INVERSO CORREGIDO ---
        window.fastReport = async (type) => {
            let message = "";
            const statusText = document.getElementById('status-text');

            if (type === 'GLU') {
                const data = JSON.parse(localStorage.getItem('mc_glu_master_2026')) || [];
                if (data.length === 0) return alert("No Glucose Data Found.");
                const last = data[data.length - 1];
                message = `[REPORT_GLU] Value: ${last.v} mg/dL | Mode: ${last.t.toUpperCase()}`;
            } else if (type === 'BP') {
                const data = JSON.parse(localStorage.getItem('mc_bp_master_2026')) || [];
                if (data.length === 0) return alert("No BP Data Found.");
                const last = data[data.length - 1];
                // Formato exacto para que el Mirror y el Provider lo succionen
                message = `[REPORT_BP] Reading: ${last.sys}/${last.dia} mmHg | Pulse: ${last.pulse}`;
            }

            try {
                statusText.innerText = "TRANSMITTING REPORT...";
                // Ruta de chat estándar para que el Sentinel lo detecte
                const reportRef = ref(db_fire, `chats/${pid}/messages`);
                await push(reportRef, {
                    text: message,
                    sender: "patient",
                    timestamp: Date.now(),
                    delivered: true
                });

                statusText.innerText = "REPORT SYNCED ✅";
                setTimeout(() => statusText.innerText = "Sentinel Monitoring Active", 3000);
            } catch (e) {
                statusText.innerText = "SYNC ERROR";
            }
        };
    </script>
</body>
</html>

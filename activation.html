 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Activation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .scanner-box { width: 100%; height: 250px; background: #050505; border-radius: 30px; overflow: hidden; border: 2px solid #222; position: relative; flex-shrink: 0; }
        #reader video { object-fit: cover !important; }
        .input-field { background: #111; border: 1px solid #222; padding: 16px; border-radius: 15px; width: 100%; color: white; outline: none; margin-bottom: 10px; font-weight: 800; text-transform: uppercase; font-size: 12px; }
        .input-field:focus { border-color: #2563eb; }
        .step-inactive { opacity: 0.15; filter: grayscale(1); pointer-events: none; transition: 0.3s; }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between mb-6 pt-2">
        <button onclick="window.location.replace('index.html')" class="text-[10px] font-black uppercase text-zinc-500 italic">← Cancel</button>
        <img src="logo.png.jpg" class="w-8 h-8 rounded-full border border-[#DAA520] object-cover">
    </header>

    <h1 id="title" class="text-3xl font-black tech-font italic uppercase leading-none mb-1">Kit Link</h1>
    <p id="desc" class="text-[9px] text-blue-500 font-bold uppercase mb-6 italic tracking-widest">Step 1: Scan Barcode 102 or Dr. QR</p>

    <!-- SCANNER UNIFICADO -->
    <div class="scanner-box mb-6" id="scanner-wrapper">
        <div id="reader" style="width: 100%; height: 100%;"></div>
    </div>

    <!-- FORMULARIO DE PACIENTE -->
    <div id="patient-form" class="space-y-3 mb-6">
        <div class="flex flex-col">
            <label class="text-[8px] font-black uppercase text-zinc-500 mb-1 ml-2">Hardware ID / Provider Status</label>
            <input type="text" id="masterID" placeholder="WAITING FOR SCAN..." readonly class="input-field text-blue-500">
        </div>
        
        <div id="enroll-fields" class="step-inactive">
            <input type="text" id="p-name" placeholder="Patient Full Name" class="input-field">
            <input type="text" id="p-dob" placeholder="DOB: MM/DD/YYYY" class="input-field">
        </div>
    </div>

    <button id="btn-save" onclick="saveActivation()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase italic text-sm step-inactive">
        Complete Enrollment
    </button>

    <script>
        let html5QrCode = new Html5Qrcode("reader");
        let activeData = { kit: null, dr: null };

        const config = { 
            fps: 20, 
            qrbox: { width: 250, height: 150 },
            aspectRatio: 1.0
        };

        // Iniciar escáner automáticamente
        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            (decodedText) => {
                // Lógica de detección: Barcode de Kit (Empieza con 102) o QR de Dr
                if (decodedText.startsWith("102")) {
                    activeData.kit = decodedText;
                    document.getElementById('masterID').value = "KIT ID: " + decodedText;
                    vibrate();
                    unlockFields();
                } else if (decodedText.includes("dr_id") || decodedText.startsWith("MC-DR") || decodedText.includes("provider")) {
                    activeData.dr = decodedText;
                    document.getElementById('masterID').value = "CLINICAL LINK ACTIVE";
                    vibrate();
                    unlockFields();
                }
            }
        ).catch(err => {
            console.error("Camera error:", err);
            // Si falla la cámara, mostramos los campos para no trabar al usuario
            unlockFields(); 
        });

        function unlockFields() {
            document.getElementById('enroll-fields').classList.remove('step-inactive');
            document.getElementById('btn-save').classList.remove('step-inactive');
            document.getElementById('desc').innerText = "Step 2: Enter Patient Details";
            document.getElementById('desc').classList.replace('text-blue-500', 'text-green-500');
        }

        function vibrate() { if (navigator.vibrate) navigator.vibrate(100); }

        function saveActivation() {
            const name = document.getElementById('p-name').value;
            const dob = document.getElementById('p-dob').value;

            if (!name || !dob) {
                alert("Please enter Name and Date of Birth");
                return;
            }

            // --- LA CORRECCIÓN CLAVE ---
            // 1. Guardamos la bandera que el HUB (index.html) está buscando
            localStorage.setItem('montcode_activation', 'true'); 
            
            // 2. Guardamos los datos del perfil
            localStorage.setItem('mc_patient_name', name);
            localStorage.setItem('mc_patient_dob', dob);
            
            // 3. Guardamos ID de hardware si se escaneó
            if (activeData.kit) localStorage.setItem('mc_kit_id', activeData.kit);
            
            // Detener cámara antes de salir
            html5QrCode.stop().then(() => {
                // Efecto visual de éxito
                const btn = document.getElementById('btn-save');
                btn.innerText = "SUCCESSFUL ✓";
                btn.style.background = "#16a34a";

                setTimeout(() => {
                    window.location.replace('index.html');
                }, 800);
            }).catch(() => {
                window.location.replace('index.html');
            });
        }
    </script>
</body>
</html>

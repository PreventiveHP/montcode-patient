 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ Activation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .scanner-box { width: 100%; height: 280px; background: #0a0a0a; border-radius: 40px; overflow: hidden; position: relative; border: 2px solid #1a1a1a; }
        #interactive.viewport canvas, video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .step-active { border-color: #ccff00; color: #ccff00; }
        .enroll-btn { background: #111; border: 1px solid #222; padding: 15px; border-radius: 20px; text-align: center; transition: 0.3s; }
        .enroll-btn.selected { border-color: #ccff00; background: #ccff001a; color: #ccff00; }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-8">
        <button onclick="location.href='index.html'" class="text-zinc-500 font-black uppercase text-[10px]">← Dashboard</button>
        <h1 class="text-xl font-black italic uppercase italic">Kit Activation</h1>
    </header>

    <div id="enrollment-ui">
        <p class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-4">Select Telemetry Period</p>
        <div class="grid grid-cols-3 gap-3 mb-8">
            <button onclick="setPeriod(7)" id="p7" class="enroll-btn text-xs font-bold uppercase">7 Days</button>
            <button onclick="setPeriod(15)" id="p15" class="enroll-btn text-xs font-bold uppercase">15 Days</button>
            <button onclick="setPeriod(365)" id="p365" class="enroll-btn text-xs font-bold uppercase">365 Days</button>
        </div>
    </div>

    <div class="flex gap-2 mb-6">
        <div id="step1-tag" class="flex-1 border-b-4 border-zinc-800 pb-2 text-[8px] font-black uppercase step-active">Step 1: Barcode</div>
        <div id="step2-tag" class="flex-1 border-b-4 border-zinc-800 pb-2 text-[8px] font-black uppercase text-zinc-700">Step 2: Dr. Link</div>
    </div>

    <div class="scanner-box mb-8" id="scanner-wrapper">
        <div id="interactive" class="viewport"></div> <div id="qr-reader" class="hidden"></div> <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
            <div id="scan-line" class="w-64 h-1 bg-[#ccff00] shadow-[0_0_15px_#ccff00] animate-pulse"></div>
            <p id="scanner-label" class="text-[8px] font-black uppercase mt-4 text-white/40 tracking-[0.3em]">Ready for Kit Barcode</p>
        </div>
    </div>

    <div id="feedback" class="text-center">
        <p class="text-xs font-bold text-zinc-500 uppercase italic">Place the camera over the Kit Serial</p>
    </div>

    <script>
        let step = "BARCODE";
        let selectedDays = 0;

        function setPeriod(days) {
            selectedDays = days;
            document.querySelectorAll('.enroll-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('p'+days).classList.add('selected');
            startBarcodeScanner();
        }

        // --- LÓGICA DE BARCODE (QUAGGA2) ---
        function startBarcodeScanner() {
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["code_128_reader", "ean_reader", "upc_reader"] },
                locate: true
            }, (err) => { 
                if (!err) {
                    Quagga.start();
                    document.getElementById('scanner-label').innerText = "Scanning Barcode...";
                }
            });

            Quagga.onDetected((data) => {
                const code = data.codeResult.code;
                if (code.startsWith("102")) {
                    Quagga.stop();
                    handleKitSuccess(code);
                }
            });
        }

        function handleKitSuccess(code) {
            localStorage.setItem('patient_id', code);
            localStorage.setItem('enrollment_days', selectedDays);
            localStorage.setItem('activation_date', new Date().toISOString());
            
            // Efecto Visual
            document.getElementById('step1-tag').classList.replace('step-active', 'text-green-500');
            document.getElementById('step2-tag').classList.add('step-active');
            
            // Cambiar a QR
            document.getElementById('interactive').classList.add('hidden');
            document.getElementById('qr-reader').classList.remove('hidden');
            document.getElementById('scan-line').style.background = "#3b82f6";
            document.getElementById('scanner-label').innerText = "Now Scan Doctor QR";
            
            startQRScanner();
        }

        // --- LÓGICA DE QR (HTML5QRCODE) ---
        function startQRScanner() {
            const html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    html5QrCode.stop().then(() => {
                        localStorage.setItem('dr_link', decodedText);
                        location.href = "index.html"; // Regreso al Dashboard
                    });
                }
            );
        }
    </script>
</body>
</html>

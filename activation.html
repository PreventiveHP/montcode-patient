 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ Activation</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo_192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .scanner-box { width: 100%; height: 260px; background: #0a0a0a; border-radius: 40px; overflow: hidden; position: relative; border: 2px solid #1a1a1a; }
        #interactive.viewport canvas, video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .step-active { border-color: #ccff00; color: #ccff00; }
        .input-field { background: #111; border: 1px solid #222; padding: 15px; border-radius: 15px; width: 100%; color: white; font-weight: bold; margin-bottom: 10px; outline: none; }
        .input-field:focus { border-color: #ccff00; }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-8">
        <button onclick="location.href='index.html'" class="text-zinc-500 font-black uppercase text-[10px]">← Cancel</button>
        <h1 class="text-xl font-black italic uppercase tracking-tighter text-[#ccff00]">Activation Kit</h1>
    </header>

    <div id="local-data-ui" class="hidden">
        <p class="text-[9px] font-black text-[#ccff00] uppercase tracking-widest mb-4 italic">Step 3: Patient Profile</p>
        <input type="text" id="p-name" placeholder="Full Name" class="input-field">
        <input type="text" id="p-dob" placeholder="DOB (MM/DD/YYYY)" class="input-field">
        <button onclick="finalizeActivation()" class="w-full bg-[#ccff00] text-black font-black py-4 rounded-2xl uppercase italic mt-4 shadow-[0_0_20px_rgba(204,255,0,0.3)]">Authorize & Start</button>
    </div>

    <div id="dr-link-ui" class="hidden">
        <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-4 italic">Step 2: Provider Pairing</p>
        <div class="scanner-box mb-4" id="qr-wrapper">
            <div id="qr-reader"></div>
        </div>
        <div class="text-center mb-4">
            <span class="text-[8px] text-zinc-600 font-bold uppercase tracking-widest">— OR ENTER MANUALLY —</span>
        </div>
        <input type="text" id="manual-dr-id" placeholder="Enter Provider ID (e.g. DR-99)" class="input-field uppercase">
        <button onclick="validateDrLink()" class="w-full bg-zinc-800 text-white font-black py-4 rounded-2xl uppercase italic mt-2">Link Provider</button>
    </div>

    <div id="main-activation-ui">
        <div class="flex gap-2 mb-6 text-center">
            <div id="step1-tag" class="flex-1 border-b-4 border-zinc-800 pb-2 text-[8px] font-black uppercase step-active">1. Kit Scan</div>
            <div id="step2-tag" class="flex-1 border-b-4 border-zinc-800 pb-2 text-[8px] font-black uppercase text-zinc-800">2. Dr. Pair</div>
        </div>

        <div class="scanner-box mb-8" id="barcode-wrapper">
            <div id="interactive" class="viewport"></div> 
            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                <div id="scan-line" class="w-64 h-0.5 bg-[#ccff00] shadow-[0_0_15px_#ccff00] animate-pulse"></div>
                <p id="scanner-label" class="text-[8px] font-black uppercase mt-4 text-white/40 tracking-[0.3em]">Align MontCode Barcode</p>
            </div>
        </div>
    </div>

    <script>
        let kitBarcode = "";
        let enrollmentDays = 0;

        window.onload = () => {
            startBarcodeScanner();
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
        };

        function startBarcodeScanner() {
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["code_128_reader", "ean_reader"] },
                locate: true
            }, (err) => { if (!err) Quagga.start(); });

            Quagga.onDetected((data) => {
                const code = data.codeResult.code;
                // REGLA: Debe empezar por 102
                if (code.startsWith("102")) {
                    Quagga.stop();
                    processBarcode(code);
                }
            });
        }

        function processBarcode(code) {
            kitBarcode = code;
            
            // LÓGICA ESTRICTA DE DÍAS
            if (code.includes("365")) enrollmentDays = 365;
            else if (code.includes("90")) enrollmentDays = 90;
            else if (code.includes("30")) enrollmentDays = 30;
            else if (code.includes("14")) enrollmentDays = 14;
            else if (code.includes("07")) enrollmentDays = 7;
            else {
                alert("Invalid Kit Code. Please use an official MontCode Kit.");
                startBarcodeScanner(); // Reiniciar si no es válido
                return;
            }

            // Crear ID de Paciente basado en el Kit
            const randomSuffix = Math.random().toString(36).substring(2, 6).toUpperCase();
            const uniqueID = `MC-${code.substring(0,3)}-${randomSuffix}`;
            localStorage.setItem('temp_id', uniqueID);

            // Cambiar a Paso 2 (Provider Link)
            document.getElementById('main-activation-ui').classList.add('hidden');
            document.getElementById('dr-link-ui').classList.remove('hidden');
            
            // Iniciar Escáner QR del Dr
            startQRScanner();
        }

        function startQRScanner() {
            const html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 200 }, 
            (decodedText) => {
                html5QrCode.stop().then(() => {
                    localStorage.setItem('dr_link', decodedText);
                    showLocalDataStep();
                });
            }).catch(err => console.log("Waiting for manual or camera..."));
        }

        function validateDrLink() {
            const manualID = document.getElementById('manual-dr-id').value;
            if(manualID.length < 2) {
                alert("Please scan QR or enter a valid Provider ID");
                return;
            }
            localStorage.setItem('dr_link', manualID);
            showLocalDataStep();
        }

        function showLocalDataStep() {
            document.getElementById('dr-link-ui').classList.add('hidden');
            document.getElementById('local-data-ui').classList.remove('hidden');
        }

        function finalizeActivation() {
            const name = document.getElementById('p-name').value;
            const dob = document.getElementById('p-dob').value;

            if(!name) { alert("Patient name is required for local identification."); return; }

            localStorage.setItem('patient_id', localStorage.getItem('temp_id'));
            localStorage.setItem('enrollment_days', enrollmentDays);
            localStorage.setItem('activation_date', new Date().toISOString());
            localStorage.setItem('patient_name', name);
            localStorage.setItem('patient_dob', dob || "00/00/0000");

            location.href = "index.html";
        }
    </script>
</body>
</html>

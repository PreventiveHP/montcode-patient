 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Activation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .scanner-view { width: 100%; height: 300px; background: #111; border-radius: 32px; overflow: hidden; position: relative; border: 2px solid #2563eb; }
        #interactive.viewport video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .scan-line { position: absolute; top: 50%; left: 10%; width: 80%; height: 2px; background: #3b82f6; box-shadow: 0 0 15px #3b82f6; animation: move 2s infinite ease-in-out; }
        @keyframes move { 0%, 100% { top: 25%; } 50% { top: 75%; } }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-6">
        <button onclick="location.href='index.html'" class="text-zinc-500 font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
            <span>←</span> Back
        </button>
        <img src="logo.png.jpg" class="w-8 h-8 rounded-full border border-[#DAA520] object-cover">
    </header>
    
    <h1 class="text-3xl font-black italic uppercase tracking-tighter leading-none mb-1 text-white">Kit Activation</h1>
    <p class="text-[9px] text-zinc-500 font-bold uppercase mb-8 italic">Validated Series: 102XXX +</p>

    <div id="scanner-container" class="scanner-view mb-8">
        <div id="interactive" class="viewport"></div>
        <div class="scan-line"></div>
    </div>

    <div class="bg-zinc-900/80 p-6 rounded-[28px] border border-zinc-800 mb-8">
        <p class="text-[8px] font-black text-blue-500 uppercase tracking-widest mb-2 italic">System Status: <span id="scan-status" class="text-zinc-400">Waiting...</span></p>
        <input type="text" id="kitID" placeholder="POINT AT KIT" readonly
               class="w-full bg-transparent font-black text-4xl text-white outline-none italic uppercase placeholder:text-zinc-800 tracking-tight">
    </div>

    <button onclick="activateSystem()" id="btn-activate" class="w-full bg-blue-600 py-6 rounded-[26px] font-black uppercase italic text-lg shadow-2xl transition-all">
        Confirm Activation
    </button>

    <script>
        let isDetected = false;

        function startScanner() {
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["code_128_reader", "ean_reader", "code_39_reader"] }
            }, (err) => { if (!err) Quagga.start(); });

            Quagga.onDetected((data) => {
                const code = data.codeResult.code;
                if (/^102/.test(code) && !isDetected) {
                    isDetected = true;
                    document.getElementById('kitID').value = code;
                    document.getElementById('scan-status').innerText = "KIT VALIDATED ✓";
                    document.getElementById('scan-status').className = "text-green-500 font-black italic";
                    if (navigator.vibrate) navigator.vibrate(200);
                }
            });
        }

        function activateSystem() {
            const code = document.getElementById('kitID').value;
            if (code) {
                // ESTRUCTURA EXACTA QUE PIDE TU INDEX:
                const activation = {
                    kitID: code,
                    startDate: new Date().getTime(),
                    expiryDate: new Date().getTime() + (365 * 24 * 60 * 60 * 1000),
                    isActive: true
                };

                // Guardamos la activación principal
                localStorage.setItem('montcode_activation', JSON.stringify(activation));
                
                // Guardamos el ID por separado para el Clinical Feedback
                localStorage.setItem('my_kit_id', code);
                localStorage.setItem('target_kit_id', code);

                document.getElementById('btn-activate').innerText = "SYSTEM ARMED";
                document.getElementById('btn-activate').style.background = "#16a34a";

                Quagga.stop();

                // Redirección a la raíz (donde está tu index.html)
                setTimeout(() => { location.href = 'index.html'; }, 1200);
            }
        }
        window.onload = startScanner;
    </script>
</body>
</html>

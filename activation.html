 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Activation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .scanner-view { 
            width: 100%; height: 280px; 
            background: #111; border-radius: 32px; 
            overflow: hidden; position: relative; 
            border: 2px solid #2563eb; 
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.2);
        }
        #interactive.viewport video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .scan-line { 
            position: absolute; top: 50%; left: 10%; 
            width: 80%; height: 2px; 
            background: #3b82f6; 
            box-shadow: 0 0 15px #3b82f6; 
            animation: move 2s infinite ease-in-out; 
            z-index: 20;
        }
        @keyframes move { 0%, 100% { top: 25%; } 50% { top: 75%; } }
        .disabled-btn { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-6">
        <button onclick="window.location.replace('index.html')" class="text-zinc-500 font-black text-[10px] uppercase tracking-widest flex items-center gap-2"><span>←</span> Cancel</button>
        <div><img src="logo.png.jpg" class="w-8 h-8 rounded-full border border-[#DAA520] object-cover"></div>
    </header>
    
    <h1 id="step-title" class="text-3xl font-black italic uppercase tracking-tighter leading-none mb-1 text-white">Kit Activation</h1>
    <p id="step-desc" class="text-[9px] text-zinc-500 font-bold uppercase mb-8 italic">Step 1: Scan physical kit barcode</p>

    <div id="scanner-container" class="scanner-view mb-8">
        <div id="interactive" class="viewport"></div>
        <div id="qr-reader" style="display:none; width: 100%; height: 100%;"></div>
        <div class="scan-line"></div>
    </div>

    <div class="bg-zinc-900/80 p-6 rounded-[28px] border border-zinc-800 mb-8">
        <p class="text-[8px] font-black text-blue-500 uppercase tracking-widest mb-2 italic">
            Audit Status: <span id="scan-status" class="text-zinc-400">Searching Kit...</span>
        </p>
        <input type="text" id="masterID" placeholder="POINT AT KIT" readonly
               class="w-full bg-transparent font-black text-4xl text-white outline-none italic uppercase placeholder:text-zinc-800 tracking-tight">
    </div>

    <button onclick="nextStep()" id="btn-main" class="w-full bg-blue-600 py-6 rounded-[26px] font-black uppercase italic text-lg shadow-2xl transition-all disabled-btn">
        Validate Kit
    </button>

    <script>
        let isKitDetected = false;
        let doctorID = "NONE";
        let kitCode = "PENDING";
        let step = 1; 

        function startBarcodeScanner() {
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["code_128_reader", "ean_reader"] },
                locate: true
            }, (err) => { if (!err) Quagga.start(); });

            Quagga.onDetected((data) => {
                const code = data.codeResult.code;
                // Validación de serie 102
                if (/^102/.test(code) && !isKitDetected) {
                    isKitDetected = true;
                    kitCode = code;
                    document.getElementById('masterID').value = code;
                    document.getElementById('scan-status').innerText = "KIT VALIDATED ✓";
                    document.getElementById('scan-status').className = "text-green-500 font-black italic";
                    document.getElementById('btn-main').classList.remove('disabled-btn');
                    if (navigator.vibrate) navigator.vibrate(200);
                    Quagga.stop();
                }
            });
        }

        function nextStep() {
            if (step === 1) {
                step = 2;
                document.getElementById('step-title').innerText = "Doctor Link";
                document.getElementById('step-desc').innerText = "Step 2: Scan Provider QR Code";
                document.getElementById('masterID').value = "";
                document.getElementById('masterID').placeholder = "SCAN DR QR";
                document.getElementById('btn-main').classList.add('disabled-btn');
                document.getElementById('btn-main').innerText = "Awaiting QR Scan...";
                document.getElementById('interactive').style.display = "none";
                document.getElementById('qr-reader').style.display = "block";
                startQRScanner();
            } else if (step === 2) {
                finalizeActivation();
            }
        }

        function startQRScanner() {
            const html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    let cleanedId = decodedText;
                    
                    // AUDITORÍA: Si el QR es un JSON del Dr, extraemos el ID remoto
                    try {
                        const parsed = JSON.parse(decodedText);
                        cleanedId = parsed.dr_id || parsed.id || decodedText;
                    } catch(e) {
                        console.log("Plain text ID detected");
                    }

                    doctorID = cleanedId;
                    document.getElementById('masterID').value = "DR-LINKED";
                    document.getElementById('scan-status').innerText = "PROVIDER IDENTIFIED ✓";
                    document.getElementById('scan-status').className = "text-green-500 font-black italic";
                    document.getElementById('btn-main').classList.remove('disabled-btn');
                    document.getElementById('btn-main').innerText = "Complete Setup";
                    if (navigator.vibrate) navigator.vibrate(200);
                    html5QrCode.stop();
                }
            ).catch(err => console.error(err));
        }

        function finalizeActivation() {
            const patientName = prompt("Patient Name:");
            const patientDOB = prompt("DOB (MM/DD/YYYY):");
            
            if (patientName && patientDOB) {
                // LLAVES CRÍTICAS PARA TRANSMISIÓN REMOTA
                localStorage.setItem('mc_patient_name', patientName);
                localStorage.setItem('mc_patient_dob', patientDOB);
                localStorage.setItem('mc_linked_dr_id', doctorID);
                localStorage.setItem('mc_kit_id', kitCode);
                
                // OBJETO DE ACTIVACIÓN (BASE PARA EL VAULT)
                const activationData = {
                    kit_id: kitCode,
                    name: patientName,
                    dob: patientDOB,
                    dr_id: doctorID,
                    status: 'Active',
                    dr_notes: [], // Inicializado para recibir mensajes remotos
                    setup_date: new Date().toISOString()
                };
                localStorage.setItem('montcode_activation', JSON.stringify(activationData));
                
                document.getElementById('btn-main').innerText = "LINK SUCCESSFUL";
                document.getElementById('btn-main').style.background = "#16a34a";
                
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                
                setTimeout(() => { 
                    window.location.replace('index.html'); 
                }, 1000);
            } else {
                alert("Profile incomplete. Please enter name and DOB.");
            }
        }

        window.onload = startBarcodeScanner;
    </script>
</body>
</html>

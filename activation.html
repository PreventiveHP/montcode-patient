 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ Activation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .scanner-box { width: 100%; height: 260px; background: #0a0a0a; border-radius: 40px; overflow: hidden; position: relative; border: 2px solid #1a1a1a; }
        #interactive.viewport canvas, video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .step-active { border-color: #ccff00; color: #ccff00; }
        .input-field { background: #111; border: 1px solid #222; padding: 15px; border-radius: 15px; width: 100%; color: white; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-8">
        <button onclick="location.href='index.html'" class="text-zinc-500 font-black uppercase text-[10px]">← Cancel</button>
        <h1 class="text-xl font-black italic uppercase">System Enrollment</h1>
    </header>

    <div id="local-data-ui" class="hidden">
        <p class="text-[9px] font-black text-[#ccff00] uppercase tracking-widest mb-4 italic">Step 3: Personalization (Local Only)</p>
        <input type="text" id="p-name" placeholder="Patient Name" class="input-field">
        <input type="text" id="p-dob" placeholder="DOB (MM/DD/YYYY)" class="input-field">
        <button onclick="finalizeActivation()" class="w-full bg-[#ccff00] text-black font-black py-4 rounded-2xl uppercase italic mt-4">Complete Activation</button>
    </div>

    <div id="main-activation-ui">
        <div class="flex gap-2 mb-6">
            <div id="step1-tag" class="flex-1 border-b-4 border-zinc-800 pb-2 text-[8px] font-black uppercase step-active">1. Barcode</div>
            <div id="step2-tag" class="flex-1 border-b-4 border-zinc-800 pb-2 text-[8px] font-black uppercase text-zinc-700">2. Dr. Link</div>
        </div>

        <div class="scanner-box mb-8" id="scanner-wrapper">
            <div id="interactive" class="viewport"></div> 
            <div id="qr-reader" class="hidden"></div> 
            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                <div id="scan-line" class="w-64 h-1 bg-[#ccff00] shadow-[0_0_15px_#ccff00] animate-pulse"></div>
                <p id="scanner-label" class="text-[8px] font-black uppercase mt-4 text-white/40 tracking-[0.3em]">Align Kit Barcode</p>
            </div>
        </div>
    </div>

    <script>
        let kitBarcode = "";
        let enrollmentDays = 0;

        window.onload = () => startBarcodeScanner();

        function startBarcodeScanner() {
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["code_128_reader", "ean_reader"] },
                locate: true
            }, (err) => { if (!err) Quagga.start(); });

            Quagga.onDetected((data) => {
                const code = data.codeResult.code;
                if (code.startsWith("102")) {
                    Quagga.stop();
                    processBarcode(code);
                }
            });
        }

        function processBarcode(code) {
            kitBarcode = code;
            // Detección automática de días basado en el código
            if (code.includes("365")) enrollmentDays = 365;
            else if (code.includes("15")) enrollmentDays = 15;
            else enrollmentDays = 7; // Default

            // Generar MC-ID Único (Ej: MC-102-A7B2)
            const randomSuffix = Math.random().toString(36).substring(2, 6).toUpperCase();
            const uniqueID = `MC-${code.substring(0,3)}-${randomSuffix}`;
            localStorage.setItem('temp_id', uniqueID);

            // UI Feedback
            document.getElementById('step1-tag').classList.replace('step-active', 'text-green-500');
            document.getElementById('step2-tag').classList.add('step-active');
            document.getElementById('interactive').classList.add('hidden');
            document.getElementById('qr-reader').classList.remove('hidden');
            document.getElementById('scan-line').style.background = "#3b82f6";
            document.getElementById('scanner-label').innerText = "Scan Doctor QR";
            
            startQRScanner();
        }

        function startQRScanner() {
            const html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            (decodedText) => {
                html5QrCode.stop().then(() => {
                    localStorage.setItem('dr_link', decodedText);
                    showLocalDataStep();
                });
            });
        }

        function showLocalDataStep() {
            document.getElementById('main-activation-ui').classList.add('hidden');
            document.getElementById('local-data-ui').classList.remove('hidden');
        }

        function finalizeActivation() {
            const name = document.getElementById('p-name').value;
            const dob = document.getElementById('p-dob').value;

            // Consolidar datos finales
            localStorage.setItem('patient_id', localStorage.getItem('temp_id'));
            localStorage.setItem('enrollment_days', enrollmentDays);
            localStorage.setItem('activation_date', new Date().toISOString());
            localStorage.setItem('patient_name', name || "Guest Patient");
            localStorage.setItem('patient_dob', dob || "00/00/0000");

            location.href = "index.html";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ Activation</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo_192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .scanner-box { width: 100%; height: 260px; background: #0a0a0a; border-radius: 40px; overflow: hidden; position: relative; border: 2px solid #1a1a1a; }
        #interactive.viewport canvas, video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .input-field { background: #111; border: 1px solid #222; padding: 15px; border-radius: 15px; width: 100%; color: white; font-weight: bold; margin-bottom: 10px; outline: none; text-transform: uppercase; }
        .input-field:focus { border-color: #ccff00; }
        .btn-primary { background: #ccff00; color: #000; font-weight: 900; padding: 16px; border-radius: 20px; text-transform: uppercase; font-style: italic; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.8; }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-8">
        <button onclick="location.href='index.html'" class="text-zinc-500 font-black uppercase text-[10px]">← Cancel</button>
        <h1 class="text-xl font-black italic uppercase tracking-tighter text-[#ccff00]">Activation Kit</h1>
    </header>

    <div id="local-data-ui" class="hidden">
        <p class="text-[9px] font-black text-[#ccff00] uppercase tracking-widest mb-4 italic">Step 3: Patient Profile (Private)</p>
        <input type="text" id="p-name" placeholder="Full Name" class="input-field">
        <input type="text" id="p-dob" placeholder="DOB (MM/DD/YYYY)" class="input-field">
        <p class="text-[7px] text-zinc-600 uppercase font-bold mb-4 px-2">This information is stored only on this device.</p>
        <button onclick="finalizeActivation()" class="w-full btn-primary mt-4 shadow-[0_0_20px_rgba(204,255,0,0.3)]">Authorize & Start</button>
    </div>

    <div id="dr-link-ui" class="hidden">
        <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-4 italic">Step 2: Provider Pairing</p>
        <div class="scanner-box mb-4" id="qr-wrapper">
            <div id="qr-reader" style="width: 100%;"></div>
        </div>
        <input type="text" id="manual-dr-id" placeholder="Provider ID (e.g. 102001)" class="input-field text-center text-blue-400">
        <button onclick="validateDrLink()" class="w-full bg-zinc-800 text-white font-black py-4 rounded-2xl uppercase italic mt-2">Link Provider</button>
    </div>

    <div id="main-activation-ui">
        <div class="flex gap-2 mb-6 text-center">
            <div id="step1-tag" class="flex-1 border-b-4 border-[#ccff00] pb-2 text-[8px] font-black uppercase text-[#ccff00]">1. Kit Scan</div>
            <div id="step2-tag" class="flex-1 border-b-4 border-zinc-800 pb-2 text-[8px] font-black uppercase text-zinc-800">2. Dr. Pair</div>
        </div>

        <div class="scanner-box mb-6" id="barcode-wrapper">
            <div id="interactive" class="viewport"></div> 
            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                <div id="scan-line" class="w-64 h-0.5 bg-[#ccff00] shadow-[0_0_15px_#ccff00] animate-pulse"></div>
                <p id="scanner-label" class="text-[8px] font-black uppercase mt-4 text-white/40 tracking-[0.3em]">Align MontCode Barcode</p>
            </div>
        </div>

        <input type="text" id="manual-kit-id" placeholder="Kit Code (e.g. 10215321)" class="input-field text-center text-[#ccff00]">
        <button onclick="validateManualKit()" class="w-full bg-zinc-900 border border-zinc-700 text-zinc-400 font-black py-4 rounded-2xl uppercase italic mt-2">Activate Kit</button>
    </div>

    <script>
        let enrollmentDays = 0;
        let html5QrCode = null;

        window.onload = () => {
            startBarcodeScanner();
        };

        function startBarcodeScanner() {
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["code_128_reader", "ean_reader"] },
                locate: true
            }, (err) => { if (!err) Quagga.start(); });

            Quagga.onDetected((data) => {
                const code = data.codeResult.code;
                if (code.startsWith("102")) {
                    Quagga.stop();
                    processBarcode(code);
                }
            });
        }

        function validateManualKit() {
            const val = document.getElementById('manual-kit-id').value.trim();
            if(val.startsWith("102")) {
                Quagga.stop();
                processBarcode(val);
            } else {
                alert("Invalid Kit Format (Must start with 102)");
            }
        }

        function processBarcode(code) {
            // Detectar vigencia del kit
            const daysMap = {"365":365, "90":90, "30":30, "15":15, "14":14, "07":7};
            enrollmentDays = 0;
            for(let key in daysMap) {
                if(code.includes(key)) { enrollmentDays = daysMap[key]; break; }
            }

            if(enrollmentDays === 0) {
                alert("Validity period not detected in barcode.");
                startBarcodeScanner();
                return;
            }

            // --- GENERACIÓN DE UUID PERSISTENTE ---
            const uniqueID = 'PX-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            localStorage.setItem('temp_uuid', uniqueID);
            localStorage.setItem('enrollment_days', enrollmentDays);

            document.getElementById('main-activation-ui').classList.add('hidden');
            document.getElementById('dr-link-ui').classList.remove('hidden');
            startQRScanner();
        }

        function startQRScanner() {
            html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (decodedText) => {
                completeDrLinking(decodedText);
            }).catch(() => {});
        }

        function validateDrLink() {
            const manualID = document.getElementById('manual-dr-id').value.trim();
            if(manualID.length < 3) return alert("Invalid Provider ID");
            completeDrLinking(manualID);
        }

        function completeDrLinking(drId) {
            localStorage.setItem('dr_link', drId);
            if(html5QrCode) {
                html5QrCode.stop().then(() => showLocalDataStep()).catch(() => showLocalDataStep());
            } else {
                showLocalDataStep();
            }
        }

        function showLocalDataStep() {
            document.getElementById('dr-link-ui').classList.add('hidden');
            document.getElementById('local-data-ui').classList.remove('hidden');
        }

        function finalizeActivation() {
            const name = document.getElementById('p-name').value.trim();
            const dob = document.getElementById('p-dob').value.trim();

            if(!name) return alert("Full Name required for local identification.");

            // PERSISTENCIA FINAL
            localStorage.setItem('mc_patient_uuid', localStorage.getItem('temp_uuid'));
            localStorage.setItem('patient_name', name);
            localStorage.setItem('patient_dob', dob || "00/00/0000");
            localStorage.setItem('activation_date', new Date().toISOString());

            location.href = "index.html";
        }
    </script>
</body>
</html>

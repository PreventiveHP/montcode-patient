<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Activation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/quagga.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .scanner-view { width: 100%; height: 280px; background: #111; border-radius: 32px; overflow: hidden; position: relative; border: 2px solid #222; }
        #interactive.viewport video, canvas { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        .scan-line { position: absolute; top: 50%; left: 10%; width: 80%; height: 2px; background: #3b82f6; box-shadow: 0 0 15px #3b82f6; animation: move 2s infinite ease-in-out; }
        @keyframes move { 0%, 100% { top: 20%; } 50% { top: 80%; } }
    </style>
</head>
<body class="p-6">
    <button onclick="location.href='index.html'" class="mb-6 text-zinc-500 font-black text-[10px] uppercase">← Back</button>
    
    <h1 class="text-3xl font-black italic uppercase tracking-tighter leading-none mb-1">Kit Enrollment</h1>
    <p class="text-[9px] text-zinc-500 font-bold uppercase mb-8 italic">Validated Series: 102XXX +</p>

    <div class="scanner-view mb-8">
        <div id="interactive" class="viewport"></div>
        <div class="scan-line"></div>
    </div>

    <div class="bg-zinc-900/50 p-5 rounded-[28px] border border-zinc-800 mb-6">
        <p class="text-[8px] font-black text-blue-500 uppercase tracking-widest mb-1">Status: <span id="scan-status">Waiting...</span></p>
        <input type="number" id="kitID" placeholder="POINT CAMERA AT BARCODE" readonly
               class="w-full bg-transparent font-black text-3xl text-white outline-none italic uppercase">
    </div>

    <button onclick="activateSystem()" id="btn-activate" class="w-full bg-blue-600 py-5 rounded-[24px] font-black uppercase italic shadow-xl active:scale-95 transition">
        Confirm 365 Days Activation
    </button>

    <script>
        function startScanner() {
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["code_128_reader", "ean_reader", "code_39_reader"] },
                locate: true
            }, (err) => { if (!err) Quagga.start(); });

            Quagga.onDetected((data) => {
                const code = data.codeResult.code;
                if (/^102\d{3,}/.test(code)) {
                    document.getElementById('kitID').value = code;
                    document.getElementById('scan-status').innerText = "DETECTED";
                    if (navigator.vibrate) navigator.vibrate(200);
                }
            });
        }

        function activateSystem() {
            const code = document.getElementById('kitID').value;
            if (code) {
                const activation = {
                    kitID: code,
                    startDate: new Date().getTime(),
                    expiryDate: new Date().getTime() + (365 * 24 * 60 * 60 * 1000),
                    isActive: true
                };
                localStorage.setItem('montcode_activation', JSON.stringify(activation));
                alert("SYSTEM ONLINE: 365 DAYS GRANTED");
                location.href = 'index.html';
            } else {
                alert("Please scan a valid Kit first.");
            }
        }
        window.onload = startScanner;
    </script>
</body>
</html>

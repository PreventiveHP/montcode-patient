<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; -webkit-text-size-adjust: 100%; }
        .provider-card {
            background: linear-gradient(135deg, #1e3a8a 0%, #000000 100%);
            border: 2px solid #2563eb;
            border-radius: 32px;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.2);
        }
        .btn-tag {
            background: #111;
            border: 1px solid #333;
            transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-tag:active { transform: scale(0.92); background: #222; border-color: #555; }
        .emergency-blink { border-color: #ef4444 !important; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-6 pb-12">
    <header class="flex justify-between items-center mb-8">
        <button onclick="location.href='index.html'" class="text-zinc-500 font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
            <span>←</span> Dashboard
        </button>
        <p class="text-[7px] text-red-500 font-black uppercase tracking-widest emergency-blink">Emergency? Call 911</p>
    </header>

    <h1 class="text-3xl font-black italic uppercase tracking-tighter leading-none mb-6 text-white">Clinical<br>Feedback</h1>

    <!-- MENSAJE DEL DR (CON ROMPE-CACHÉ) -->
    <div class="provider-card p-8 mb-8">
        <div class="flex justify-between items-center mb-4">
            <p class="text-[9px] font-black text-blue-400 uppercase tracking-[0.2em] italic">Provider's Note:</p>
            <div id="sync-dot" class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
        </div>
        <p id="instruction-text" class="text-xl font-bold italic leading-tight text-white italic">"Fetching clinical data..."</p>
        <p id="timestamp" class="text-[8px] font-black text-blue-500/50 uppercase mt-6 tracking-widest italic">Syncing Node...</p>
    </div>

    <!-- SÍNTOMAS RÁPIDOS (TAGS) -->
    <p class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-4 ml-2">Quick Symptom Report:</p>
    <div class="grid grid-cols-2 gap-3 mb-8">
        <button onclick="quickReport('HYPOGLYCEMIA 🚨')" class="btn-tag p-5 rounded-[22px]">
            <span class="text-xl mb-1">🩸</span>
            <span class="text-[8px] font-black uppercase text-red-500 tracking-tighter">Low Sugar</span>
        </button>
        <button onclick="quickReport('HYPOTENSION 📉')" class="btn-tag p-5 rounded-[22px]">
            <span class="text-xl mb-1">🫀</span>
            <span class="text-[8px] font-black uppercase text-blue-400 tracking-tighter">Low BP</span>
        </button>
        <button onclick="quickReport('HYPERTENSION 📈')" class="btn-tag p-5 rounded-[22px]">
            <span class="text-xl mb-1">⚠️</span>
            <span class="text-[8px] font-black uppercase text-orange-400 tracking-tighter">High BP</span>
        </button>
        <button onclick="quickReport('DIZZY / FALL 💫')" class="btn-tag p-5 rounded-[22px]">
            <span class="text-xl mb-1">🚶</span>
            <span class="text-[8px] font-black uppercase text-zinc-400 tracking-tighter">Dizzy/Fall</span>
        </button>
    </div>

    <!-- MENSAJE PERSONALIZADO -->
    <div class="space-y-4">
        <textarea id="patient-msg" placeholder="Describe how you feel..." 
            class="w-full h-28 bg-zinc-900 border border-zinc-800 rounded-[28px] p-6 text-white italic text-[14px] outline-none focus:border-blue-500 transition-all placeholder:text-zinc-700"></textarea>
        
        <button id="send-btn" onclick="sendToDr()" class="w-full bg-white text-black font-black p-6 rounded-full uppercase italic text-[11px] tracking-widest active:scale-95 transition-all shadow-xl">
            Transmit to Provider 📡
        </button>

        <p class="text-[7px] text-center font-bold text-zinc-600 uppercase tracking-widest leading-relaxed mt-4 px-8">
            This is an Asynchronous Channel. For immediate life-threatening situations, contact emergency services.
        </p>
    </div>

    <script>
        // Obtenemos el ID del Kit para saber qué mensaje bajar
        const kitData = JSON.parse(localStorage.getItem('montcode_activation'));
        const kitID = kitData ? kitData.kitID : "DEMO-01";

        async function fetchInstruction() {
            try {
                // AÑADIMOS _cb=TIME PARA ROMPER EL CACHÉ DE VERCEL
                const response = await fetch(`https://montcode-patient.vercel.app/api/relay?id=${kitID}&_cb=${new Date().getTime()}`);
                const data = await response.json();
                
                if (data && data.message && data.message.t) {
                    const decodedMsg = atob(data.message.t);
                    document.getElementById('instruction-text').innerText = `"${decodedMsg}"`;
                    
                    const time = new Date(data.message.d).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    document.getElementById('timestamp').innerText = `RECEIVED: ${time} • KIT: ${kitID}`;
                    document.getElementById('sync-dot').classList.replace('bg-green-500', 'bg-blue-500');
                }
            } catch (e) {
                console.log("Sync failed, retrying...");
                document.getElementById('sync-dot').classList.replace('bg-green-500', 'bg-red-500');
            }
        }

        function quickReport(tag) {
            document.getElementById('patient-msg').value = "REPORT: " + tag;
            sendToDr();
        }

        async function sendToDr() {
            const text = document.getElementById('patient-msg').value;
            if(!text) return;
            
            const btn = document.getElementById('send-btn');
            btn.innerText = "TRANSMITTING...";
            btn.disabled = true;

            try {
                await fetch(`https://montcode-patient.vercel.app/api/relay?id=${kitID}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        t: btoa(text),
                        d: new Date().getTime(),
                        from: "PATIENT"
                    })
                });
                alert("Clinical Data Transmitted.");
                document.getElementById('patient-msg').value = "";
            } catch (e) {
                alert("Transmission Error. Check connection.");
            }
            
            btn.innerText = "Transmit to Provider 📡";
            btn.disabled = false;
        }

        // Actualiza cada 10 segundos para no saturar pero ser rápido
        setInterval(fetchInstruction, 10000);
        window.onload = fetchInstruction;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ BP Master 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 15px; touch-action: manipulation; }
        .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; padding: 12px; text-align: center; }
        .num-pad { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .key { background: #111; border-radius: 20px; padding: 22px; font-size: 1.6rem; font-weight: 800; border: 1px solid #222; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .key:active { background: #222; transform: scale(0.95); }
        .key-save { background: #3b82f6; color: #fff; grid-column: span 2; font-size: 1rem; font-weight: 900; }
        .display-bp { font-size: 5rem; font-weight: 900; color: #3b82f6; text-align: center; line-height: 1; padding: 15px 0; min-height: 100px; }
        .chart-modern { background: #050505; border-radius: 30px; border: 1px solid #1a1a1a; padding: 15px; margin-top: 20px; height: 200px; }
        .status-banner { width: 100%; height: 50px; background: #0a0a0a; border-radius: 20px; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
    </style>
</head>
<body class="pb-10">

    <div class="flex justify-between items-center mb-4">
        <a href="index.html" class="w-8 h-8 bg-zinc-900 rounded-full flex items-center justify-center border border-zinc-800 text-zinc-400">←</a>
        <span class="text-[8px] text-blue-500 font-black uppercase tracking-widest italic">P2P Tactical Link</span>
    </div>

    <div class="status-banner" id="status-box">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2 h-2 bg-zinc-700 rounded-full"></div>
            <p class="text-zinc-500 font-black uppercase text-[9px] tracking-widest" id="status-text">LOCAL MODE</p>
        </div>
    </div>

    <div id="display" class="display-bp">---/--</div>

    <div class="num-pad" id="main-pad">
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
        <div class="key text-red-600" onclick="press('C')">C</div><div class="key" onclick="press('0')">0</div><div class="key" onclick="press('←')">←</div>
        
        <div class="key key-save" onclick="saveBP()">SAVE & TRANSMIT</div>
        <div class="key" onclick="location.href='activation.html'">📲</div>
    </div>

    <div class="chart-modern">
        <canvas id="bpChart"></canvas>
    </div>

<script type="module">
    // --- INTEGRACIÓN FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVIQ4S-w4Ag40uYuArW3o7Hw2XQwoQV7U",
        databaseURL: "https://montcode-e02c7-default-rtdb.firebaseio.com",
        projectId: "montcode-e02c7"
    };

    const app = initializeApp(firebaseConfig);
    const db_fire = getDatabase(app);

    // Hacer la función de transmisión accesible globalmente
    window.transmitToFirebase = async (sys, dia) => {
        const pId = localStorage.getItem('patient_id') || "102001";
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');

        statusText.innerText = "TRANSMITTING...";
        statusDot.className = "w-2 h-2 bg-yellow-500 animate-pulse";

        try {
            await set(ref(db_fire, `mensaje_dr/${pId}`), {
                sys: sys,
                dia: dia,
                texto: `BP REPORT: ${sys}/${dia} mmHg`,
                timestamp: Date.now(),
                provider: "PATIENT_BP" // Identificador para la consola del Dr
            });
            
            statusText.innerText = "BRIDGE SYNCED ✅";
            statusDot.className = "w-2 h-2 bg-green-500";
            setTimeout(() => {
                statusText.innerText = "BRIDGE ACTIVE";
                statusDot.className = "w-2 h-2 bg-blue-500";
            }, 3000);
        } catch (e) {
            statusText.innerText = "LINK ERROR";
            statusDot.className = "w-2 h-2 bg-red-500";
        }
    };
</script>

<script>
    let db = JSON.parse(localStorage.getItem('mc_bp_master_2026')) || [];
    let currentInput = "";

    function saveBP() {
        if(currentInput.length < 5) {
            alert("Enter full reading (e.g. 12080)");
            return;
        }
        
        const s = parseInt(currentInput.slice(0,3));
        const d = parseInt(currentInput.slice(3));
        
        // 1. Guardar local
        db.push({ sys: s, dia: d, d: new Date().toISOString() });
        localStorage.setItem('mc_bp_master_2026', JSON.stringify(db));
        
        // 2. Transmitir (Llama a la función del módulo superior)
        if (window.transmitToFirebase) {
            window.transmitToFirebase(s, d);
        }
        
        speakBP(s, d);
        currentInput = ""; 
        updateDisplay();
    }

    function press(n) {
        if(n === 'C') currentInput = "";
        else if(n === '←') currentInput = currentInput.slice(0, -1);
        else if(currentInput.length < 6) currentInput += n;
        updateDisplay();
    }

    function updateDisplay() {
        let display = document.getElementById('display');
        if (currentInput.length === 0) display.innerText = "---/--";
        else if (currentInput.length <= 3) display.innerText = currentInput.padEnd(3, '-') + "/--";
        else {
            display.innerText = currentInput.slice(0, 3) + "/" + currentInput.slice(3).padEnd(2, '-');
        }
    }

    function speakBP(s, d) {
        const msg = new SpeechSynthesisUtterance(`Pressure ${s} over ${d}`);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }
</script>

</body>
</html>

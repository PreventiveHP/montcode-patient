 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ Vitals Engine</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .glass-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; color: #ccff00; font-weight: 900; font-size: 1.5rem; text-align: center; width: 100%; outline: none; }
        .glass-input:focus { border-color: #ccff00; background: rgba(204, 255, 0, 0.05); }
        .btn-action { background: #ccff00; color: #000; font-weight: 900; text-transform: uppercase; padding: 20px; border-radius: 25px; width: 100%; transition: all 0.3s; }
        .btn-action:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body class="p-6 min-h-screen flex flex-col bg-[#050505]">

    <div class="flex items-center justify-between mb-8">
        <a href="index.html" class="text-zinc-500 text-xs font-black uppercase tracking-widest">← Back</a>
        <div class="text-right">
            <h1 class="text-lg font-black italic tracking-tighter">VITALS ENGINE</h1>
            <p id="pid-display" class="text-[8px] text-[#ccff00] font-mono tracking-widest uppercase">MC-XXXX</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <button onclick="switchMode('BP')" id="btn-mode-bp" class="glass-input !text-xs !p-4 border-[#ccff00] bg-[#ccff00]/10">Blood Pressure</button>
        <button onclick="switchMode('GLU')" id="btn-mode-glu" class="glass-input !text-xs !p-4 opacity-40 border-zinc-800">Glucose</button>
    </div>

    <div id="section-bp" class="space-y-6">
        <div>
            <label class="text-[10px] font-black uppercase text-zinc-500 ml-2 mb-2 block">Systolic / Diastolic</label>
            <div class="flex items-center gap-3">
                <input type="number" id="sys" placeholder="120" class="glass-input">
                <span class="text-zinc-700 font-black">/</span>
                <input type="number" id="dia" placeholder="80" class="glass-input">
            </div>
        </div>
    </div>

    <div id="section-glu" class="hidden space-y-6">
        <div>
            <label class="text-[10px] font-black uppercase text-zinc-500 ml-2 mb-2 block">Glucose (mg/dL)</label>
            <input type="number" id="glu-val" placeholder="99" class="glass-input">
        </div>
    </div>

    <div class="mt-auto space-y-4">
        <button onclick="processAndTransmit()" class="btn-action">Save & Transmit to Dr.</button>
        <button onclick="generateClinicalPDF()" class="w-full py-4 text-[10px] font-black uppercase tracking-widest text-zinc-500 border border-zinc-900 rounded-2xl italic">Generate Clinical Report (PDF)</button>
    </div>

    <footer class="mt-8 text-center opacity-30">
        <p class="text-[7px] font-bold uppercase tracking-widest">Calculations based on ADA/AHA Logic • Local Storage only</p>
    </footer>

    <script>
        let currentMode = 'BP';
        const PUSHER_KEY = '284fc98940a4b6d4c359';
        const PUSHER_CLUSTER = 'us2';
        let pid = localStorage.getItem('patient_id') || 'MC-TEMP';

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('section-bp').classList.toggle('hidden', mode !== 'BP');
            document.getElementById('section-glu').classList.toggle('hidden', mode !== 'GLU');
            document.getElementById('btn-mode-bp').style.opacity = mode === 'BP' ? '1' : '0.4';
            document.getElementById('btn-mode-glu').style.opacity = mode === 'GLU' ? '1' : '0.4';
        }

        function processAndTransmit() {
            let val = "";
            if(currentMode === 'BP') {
                val = `${document.getElementById('sys').value}/${document.getElementById('dia').value}`;
            } else {
                val = document.getElementById('glu-val').value;
            }

            if(!val || val.includes('undefined')) return alert("Please enter valid data");

            // Guardar localmente
            const history = JSON.parse(localStorage.getItem('vitals_history') || '[]');
            const entry = { date: new Date().toISOString(), type: currentMode, value: val };
            history.push(entry);
            localStorage.setItem('vitals_history', JSON.stringify(history));

            // TRANSMITIR AL DOCTOR
            const pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER, forceTLS: true });
            const channel = pusher.subscribe('montcode-telemetry');
            
            // Usamos el evento que el Dr. Bridge ya está escuchando
            pusher.connection.bind('connected', () => {
                channel.trigger('client-vitals-update', {
                    patient_id: pid,
                    type: currentMode,
                    val: val
                });
                
                // Confirmación por voz
                const msg = currentMode === 'BP' ? `Pressure ${val} sent.` : `Glucose ${val} sent.`;
                const speech = new SpeechSynthesisUtterance(msg);
                speech.lang = 'en-US';
                window.speechSynthesis.speak(speech);
                
                alert("Data Transmitted Successfully");
            });
        }

        async function generateClinicalPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const history = JSON.parse(localStorage.getItem('vitals_history') || '[]');
            
            // Cálculos AHA/ADA
            let avgGlu = 0, gluCount = 0, inRange = 0;
            history.filter(h => h.type === 'GLU').forEach(h => {
                let v = parseInt(h.value);
                avgGlu += v;
                gluCount++;
                if(v >= 70 && v <= 180) inRange++;
            });

            const a1c = gluCount > 0 ? ((avgGlu / gluCount + 46.7) / 28.7).toFixed(1) : "N/A";
            const tir = gluCount > 0 ? Math.round((inRange / gluCount) * 100) : "N/A";

            // Diseño del PDF
            doc.setFillColor(0, 0, 0);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(204, 255, 0);
            doc.setFontSize(22);
            doc.text("MONTCODE™ CLINICAL REPORT", 10, 25);
            
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            doc.text(`Patient ID: ${pid}`, 10, 50);
            doc.text(`Date: ${new Date().toLocaleString()}`, 10, 55);

            doc.text("GLUCOSE ANALYTICS (TIR LOGIC):", 10, 70);
            doc.text(`Estimated A1C: ${a1c}%`, 15, 80);
            doc.text(`Time in Range (70-180 mg/dL): ${tir}%`, 15, 85);
            doc.text(`Average Glucose: ${gluCount > 0 ? Math.round(avgGlu/gluCount) : 0} mg/dL`, 15, 90);

            doc.text("RECENT ENTRIES:", 10, 110);
            let y = 120;
            history.slice(-10).reverse().forEach(h => {
                doc.text(`${new Date(h.date).toLocaleDateString()} - ${h.type}: ${h.value}`, 15, y);
                y += 7;
            });

            doc.setFontSize(7);
            doc.text("DISCLAIMER: Not based on official medical records. Wellness app use only.", 10, 280);
            
            doc.save(`MontCode_Report_${pid}.pdf`);
        }

        document.getElementById('pid-display').innerText = pid;
    </script>
</body>
</html>

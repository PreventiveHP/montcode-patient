<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Dual Master 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 15px; touch-action: manipulation; }
        .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; padding: 12px; text-align: center; }
        .num-pad { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .key { background: #111; border-radius: 20px; padding: 22px; font-size: 1.6rem; font-weight: 800; border: 1px solid #222; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .key:active { background: #222; transform: scale(0.95); }
        .key-save { background: #3b82f6; color: #fff; grid-column: span 2; font-size: 1rem; font-weight: 900; }
        .display-area { font-size: 5rem; font-weight: 900; text-align: center; line-height: 1; padding: 20px 0; min-height: 120px; font-variant-numeric: tabular-nums; }
        .mode-switch { display: flex; background: #111; border-radius: 15px; padding: 5px; margin-bottom: 15px; border: 1px solid #222; }
        .mode-btn { flex: 1; padding: 10px; text-align: center; font-size: 10px; font-weight: 900; border-radius: 10px; transition: 0.3s; color: #444; }
        .mode-btn.active-bp { background: #3b82f6; color: white; }
        .mode-btn.active-glu { background: #ccff00; color: black; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center mb-4">
        <button onclick="location.href='index.html'" class="w-8 h-8 bg-zinc-900 rounded-full flex items-center justify-center border border-zinc-800 text-zinc-400">←</button>
        <span id="mode-label" class="text-[8px] text-blue-500 font-black uppercase tracking-widest italic text-right">BP Mode Active</span>
    </div>

    <div class="mode-switch">
        <div id="btn-bp" class="mode-btn active-bp" onclick="setMode('bp')">BLOOD PRESSURE</div>
        <div id="btn-glu" class="mode-btn" onclick="setMode('glu')">GLUCOSE</div>
    </div>

    <div id="status-box" class="w-full h-10 bg-zinc-950 rounded-xl border border-dashed border-zinc-800 flex items-center justify-center mb-4">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2 h-2 bg-blue-500 rounded-full"></div>
            <p id="status-text" class="text-zinc-500 font-black uppercase text-[9px] tracking-widest">BRIDGE ACTIVE</p>
        </div>
    </div>

    <div id="display" class="display-area text-blue-500">---/--</div>

    <div class="num-pad">
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
        <div class="key text-red-600" onclick="press('C')">C</div><div class="key" onclick="press('0')">0</div><div class="key" onclick="press('←')">←</div>
        
        <div id="save-btn" class="key key-save" onclick="handleSave()">SAVE BP READING</div>
        <div class="key" onclick="location.href='vinculacion.html'">📲</div>
    </div>

<script>
    let currentInput = "";
    let currentMode = 'bp'; // 'bp' o 'glu'
    const HUB_URL = 'https://montcode-provider.vercel.app/api/hub';

    function setMode(mode) {
        currentMode = mode;
        currentInput = "";
        const display = document.getElementById('display');
        const label = document.getElementById('mode-label');
        const saveBtn = document.getElementById('save-btn');
        const btnBp = document.getElementById('btn-bp');
        const btnGlu = document.getElementById('btn-glu');

        if(mode === 'bp') {
            display.className = "display-area text-blue-500";
            display.innerText = "---/--";
            label.innerText = "BP MODE ACTIVE";
            label.className = "text-[8px] text-blue-500 font-black uppercase italic";
            saveBtn.innerText = "SAVE BP READING";
            saveBtn.style.background = "#3b82f6";
            btnBp.className = "mode-btn active-bp";
            btnGlu.className = "mode-btn";
        } else {
            display.className = "display-area text-[#ccff00]";
            display.innerText = "---";
            label.innerText = "GLUCOSE MODE ACTIVE";
            label.className = "text-[8px] text-[#ccff00] font-black uppercase italic";
            saveBtn.innerText = "SAVE GLUCOSE";
            saveBtn.style.background = "#ccff00";
            saveBtn.style.color = "black";
            btnBp.className = "mode-btn";
            btnGlu.className = "mode-btn active-glu";
        }
    }

    function press(n) {
        if(n === 'C') currentInput = "";
        else if(n === '←') currentInput = currentInput.slice(0, -1);
        else {
            const limit = (currentMode === 'bp') ? 6 : 3;
            if(currentInput.length < limit) currentInput += n;
        }
        updateDisplay();
    }

    function updateDisplay() {
        const display = document.getElementById('display');
        if(currentMode === 'bp') {
            if (currentInput.length === 0) display.innerText = "---/--";
            else if (currentInput.length <= 3) display.innerText = currentInput.padEnd(3, '-') + "/--";
            else display.innerText = currentInput.slice(0, 3) + "/" + currentInput.slice(3).padEnd(2, '-');
        } else {
            display.innerText = currentInput || "---";
        }
    }

    async function handleSave() {
        if(currentInput.length < 3) return;

        let sys, dia;
        if(currentMode === 'bp') {
            sys = parseInt(currentInput.slice(0,3));
            dia = parseInt(currentInput.slice(3)) || 80;
        } else {
            sys = parseInt(currentInput);
            dia = 77; // CÓDIGO SECRETO PARA GLUCOSA
        }

        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        statusText.innerText = "TRANSMITTING...";
        statusDot.className = "w-2 h-2 bg-yellow-500 animate-pulse";

        try {
            const response = await fetch(HUB_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sys: sys,
                    dia: dia,
                    provider: "MANUEL_MONT",
                    timestamp: Date.now()
                })
            });

            if(response.ok) {
                statusText.innerText = "SYNCED ✅";
                statusDot.className = "w-2 h-2 bg-green-500";
                speakData(sys, dia);
                currentInput = "";
                updateDisplay();
                setTimeout(() => {
                    statusText.innerText = "BRIDGE ACTIVE";
                    statusDot.className = (currentMode === 'bp') ? "w-2 h-2 bg-blue-500" : "w-2 h-2 bg-[#ccff00]";
                }, 3000);
            }
        } catch(e) {
            statusText.innerText = "LINK ERROR";
            statusDot.className = "w-2 h-2 bg-red-500";
        }
    }

    function speakData(s, d) {
        const text = (currentMode === 'bp') ? `Pressure ${s} over ${d}` : `Glucose ${s}`;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>

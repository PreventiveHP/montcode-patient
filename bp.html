 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ BP Master 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 15px; min-height: 100vh; }
        
        .neon-heart { font-size: 45px; filter: drop-shadow(0 0 12px #ff0000); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 10px; text-align: center; }
        .num-pad { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .key { 
            background: #0d0d0d; border-radius: 18px; padding: 22px; font-size: 1.6rem; 
            font-weight: 800; border: 1px solid #222; display: flex; align-items: center; justify-content: center;
        }
        .key:active { background: #222; transform: scale(0.95); }
        .key-save { background: #2563eb; color: #fff; grid-column: span 2; font-size: 0.9rem; font-weight: 900; }
        
        .display-bp { font-size: 4.8rem; font-weight: 900; color: #fff; text-align: center; font-family: 'Orbitron'; letter-spacing: -2px; padding: 10px 0; }
        .status-banner { background: #0a0a0a; border-radius: 24px; border: 1px solid #1a1a1a; padding: 15px; margin-bottom: 15px; }
        .chart-container { background: #050505; border-radius: 24px; border: 1px solid #1a1a1a; padding: 10px; height: 160px; margin-top: 15px; }
    </style>
</head>
<body class="pb-10">

    <div class="flex justify-between items-center mb-4 pt-2">
        <button onclick="window.location.replace('index.html')" class="text-[10px] font-black uppercase text-zinc-500 italic">← Back</button>
        <div class="flex gap-4">
            <button onclick="setLang('en')" id="btn-en" class="text-xl grayscale-0 transition-all">🇺🇸</button>
            <button onclick="setLang('es')" id="btn-es" class="text-xl grayscale opacity-40 transition-all">🇪🇸</button>
        </div>
    </div>

    <div class="status-banner">
        <div class="flex justify-between items-center">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <div id="status-dot" class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
                    <p id="status-text" class="text-blue-500 font-black uppercase text-[9px] tracking-widest">Device Ready</p>
                </div>
                <p id="feedback-text" class="text-[10px] text-zinc-400 italic">"Waiting for clinical entry..."</p>
            </div>
            <span class="neon-heart">❤️</span>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-2 mb-4">
        <div class="stat-card"><p class="text-[7px] font-bold text-zinc-500 uppercase lang-sys">SYS AVG</p><p id="sys-val" class="text-lg font-black text-white">--</p></div>
        <div class="stat-card"><p class="text-[7px] font-bold text-zinc-500 uppercase lang-dia">DIA AVG</p><p id="dia-val" class="text-lg font-black text-white">--</p></div>
        <div class="stat-card border-blue-900/40"><p class="text-[7px] font-bold text-blue-400 uppercase">MAP</p><p id="map-val" class="text-lg font-black text-blue-400">--</p></div>
    </div>

    <div id="display" class="display-bp">---/--</div>

    <div class="num-pad">
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
        <div class="key text-red-500" onclick="press('C')">C</div><div class="key" onclick="press('0')">0</div><div class="key" onclick="press('←')">←</div>
        <div class="key key-save lang-save" onclick="saveBP()">TRANSMIT TO DR.</div>
        <div class="key" onclick="startMic()">🎤</div>
    </div>

    <div class="chart-container">
        <canvas id="bpChart"></canvas>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('mc_bp_data')) || [];
        let currentInput = "";
        let currentLang = 'en';
        let chart;
        const HUB_URL = "https://montcode-provider.vercelapp/api/hub";

        window.onload = () => {
            initChart();
            updateUI();
            setLang('en');
        };

        function setLang(lang) {
            currentLang = lang;
            const t = lang === 'es' ? 
                { sys: "SIS PROM.", dia: "DIA PROM.", save: "ENVIAR AL DOCTOR", status: "SISTEMA LISTO" } : 
                { sys: "SYS AVG", dia: "DIA AVG", save: "TRANSMIT TO DR.", status: "DEVICE READY" };

            document.querySelectorAll('.lang-sys').forEach(el => el.innerText = t.sys);
            document.querySelectorAll('.lang-dia').forEach(el => el.innerText = t.dia);
            document.querySelector('.lang-save').innerText = t.save;
            document.getElementById('status-text').innerText = t.status;

            document.getElementById('btn-es').style.opacity = lang === 'es' ? '1' : '0.4';
            document.getElementById('btn-es').style.filter = lang === 'es' ? 'grayscale(0)' : 'grayscale(1)';
            document.getElementById('btn-en').style.opacity = lang === 'en' ? '1' : '0.4';
            document.getElementById('btn-en').style.filter = lang === 'en' ? 'grayscale(0)' : 'grayscale(1)';
        }

        function speakReading(sys, dia) {
            const msg = currentLang === 'es' ? 
                `Presión registrada: ${sys} sobre ${dia}. Enviando al Doctor Montalván.` : 
                `Pressure recorded: ${sys} over ${dia}. Transmitting to Doctor.`;
            const utterance = new SpeechSynthesisUtterance(msg);
            utterance.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        function startMic() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
            rec.onresult = (e) => {
                const v = e.results[0][0].transcript.replace(/\D/g,'');
                if(v) { currentInput = v.slice(0,6); updateDisplay(); }
            };
            rec.start();
        }

        async function transmitToHub(sys, dia) {
            const patientName = localStorage.getItem('mc_patient_name') || "User_Local";
            try {
                await fetch(HUB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sys, dia, provider: patientName, timestamp: Date.now() })
                });
                document.getElementById('status-text').innerText = "SENT ✅";
            } catch(e) {
                document.getElementById('status-text').innerText = "OFFLINE - SAVED";
            }
        }

        function saveBP() {
            if(currentInput.length < 5) return;
            const s = parseInt(currentInput.slice(0,3));
            const d = parseInt(currentInput.slice(3,6));
            db.push({ sys: s, dia: d, d: new Date().toISOString() });
            localStorage.setItem('mc_bp_data', JSON.stringify(db));
            
            speakReading(s, d);
            transmitToHub(s, d);
            
            currentInput = "";
            updateDisplay();
            updateUI();
        }

        function press(n) {
            if(n === 'C') currentInput = "";
            else if(n === '←') currentInput = currentInput.slice(0, -1);
            else if(currentInput.length < 6) currentInput += n;
            updateDisplay();
        }

        function updateDisplay() {
            let s = currentInput.padEnd(6, '-');
            document.getElementById('display').innerText = s.slice(0,3) + "/" + s.slice(3,6);
        }

        function updateUI() {
            if (db.length === 0) return;
            const avgSys = Math.round(db.reduce((a,b)=>a+b.sys,0)/db.length);
            const avgDia = Math.round(db.reduce((a,b)=>a+b.dia,0)/db.length);
            document.getElementById('sys-val').innerText = avgSys;
            document.getElementById('dia-val').innerText = avgDia;
            document.getElementById('map-val').innerText = Math.round((avgSys + (2 * avgDia)) / 3);
            updateChart();
        }

        function initChart() {
            const ctx = document.getElementById('bpChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [
                    { data: [], borderColor: '#fff', tension: 0.4, pointRadius: 0 },
                    { data: [], borderColor: '#3b82f6', tension: 0.4, pointRadius: 0 }
                ]},
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
            });
        }

        function updateChart() {
            const last10 = db.slice(-10);
            chart.data.labels = last10.map(d => d.d);
            chart.data.datasets[0].data = last10.map(d => d.sys);
            chart.data.datasets[1].data = last10.map(d => d.dia);
            chart.update();
        }
    </script>
</body>
</html>

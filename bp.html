 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ BP Master 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 15px; touch-action: manipulation; }
        .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; padding: 12px; text-align: center; }
        .num-pad { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; margin-top: 20px; transition: 0.5s; }
        .key { background: #111; border-radius: 20px; padding: 22px; font-size: 1.6rem; font-weight: 800; border: 1px solid #222; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; }
        .key:active { background: #222; transform: scale(0.95); }
        .key-save { background: #3b82f6; color: #fff; grid-column: span 2; font-size: 1rem; }
        .display-bp { font-size: 5rem; font-weight: 900; color: #3b82f6; text-align: center; line-height: 1; padding: 15px 0; min-height: 100px; }
        .med-btn { border: 2px solid #333; border-radius: 12px; padding: 10px; cursor: pointer; transition: 0.3s; }
        .med-btn.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .chart-modern { background: #050505; border-radius: 30px; border: 1px solid #1a1a1a; padding: 15px; margin-top: 20px; height: 220px; }
        .cond-chip { padding: 4px 10px; border-radius: 10px; font-size: 8px; font-weight: 900; border: 1px solid #222; color: #444; cursor: pointer; }
        .cond-chip.active { border-color: #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="pb-10">

    <div class="flex justify-between items-center mb-4">
        <div class="flex gap-2">
            <button onclick="setLang('en')" class="w-7 h-7 rounded-full border border-zinc-700" id="btn-en">🇺🇸</button>
            <button onclick="setLang('es')" class="w-7 h-7 rounded-full border border-zinc-700 opacity-40" id="btn-es">🇪🇸</button>
        </div>
        <p id="bridge-indicator" class="text-[7px] font-black text-zinc-600 uppercase tracking-widest">Bridge: Offline</p>
    </div>

    <div class="flex flex-wrap gap-2 mb-4 justify-center">
        <div class="cond-chip" id="chip-HTN" onclick="this.classList.toggle('active');">HTN</div>
        <div class="cond-chip" id="chip-DM" onclick="this.classList.toggle('active');">DM</div>
        <div class="cond-chip" id="chip-STROKE" onclick="this.classList.toggle('active');">HX STROKE</div>
        <div class="cond-chip" id="chip-CKD" onclick="this.classList.toggle('active');">CKD</div>
    </div>

    <div class="grid grid-cols-4 gap-1 mb-4">
        <div class="stat-card"><p class="text-[5px] font-bold text-zinc-500 uppercase lang-sys">SYS Avg</p><p id="sys-val" class="text-md font-black text-white">--</p></div>
        <div class="stat-card"><p class="text-[5px] font-bold text-zinc-500 uppercase lang-dia">DIA Avg</p><p id="dia-val" class="text-md font-black text-white">--</p></div>
        <div class="stat-card border-blue-900"><p class="text-[5px] font-bold text-blue-400 uppercase">PAM</p><p id="map-val" class="text-md font-black text-blue-400">--</p></div>
        <div class="stat-card"><p class="text-[5px] font-bold text-zinc-500 uppercase">Status</p><p id="bp-status" class="text-[7px] font-black text-zinc-600">READY</p></div>
    </div>

    <div class="flex justify-center mb-2">
        <div id="med-toggle" class="med-btn flex items-center gap-2" onclick="this.classList.toggle('active')">
            <span class="text-sm">💊</span>
            <span class="text-[9px] font-black uppercase lang-med">Medication Taken Today?</span>
        </div>
    </div>

    <div id="display" class="display-bp">---/--</div>
    <p class="text-center text-[7px] font-bold text-zinc-500 uppercase mb-4 italic">Manual entry or voice command</p>

    <div class="num-pad">
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
        <div class="key text-red-600" onclick="press('C')">C</div><div class="key" onclick="press('0')">0</div><div class="key" onclick="press('←')">←</div>
        <div class="key key-save lang-save" onclick="saveBP()">SAVE & TRANSMIT</div>
        <div class="key" onclick="startMic()"><span class="text-xl">🎤</span></div>
    </div>

    <div class="chart-modern">
        <canvas id="bpChart"></canvas>
    </div>

    <div class="mt-8 space-y-3">
        <button onclick="generatePDF()" class="w-full bg-white text-black p-4 font-black uppercase rounded-2xl text-[10px]">Download Clinical PDF 📄</button>
        <button onclick="clearAll()" class="w-full p-2 text-zinc-800 text-[8px] font-black uppercase lang-clear">Clear History 🗑️</button>
    </div>

    <footer class="mt-8 text-[6px] text-zinc-500 text-center uppercase font-bold px-8 pb-10">
        *Disclaimer: Self-reported data. All logic follows AHA 2026 guidelines.*
    </footer>

<script>
    let db = JSON.parse(localStorage.getItem('mc_bp_master_2026')) || [];
    let currentInput = "";
    let chart;
    let currentLang = 'en';

    // PUSHER CONFIG
    const pusher = new Pusher('284fc98940a4b6d4c359', { cluster: 'us2' });
    const channel = pusher.subscribe('blood-pressure');

    window.onload = () => {
        initChart();
        updateUI();
        setLang('en');
        checkBridge();
    };

    function checkBridge() {
        const dr = localStorage.getItem('assigned_dr_id');
        const indicator = document.getElementById('bridge-indicator');
        if(dr) {
            indicator.innerText = `Bridge: Linked to DR-${dr}`;
            indicator.classList.replace('text-zinc-600', 'text-blue-500');
        }
    }

    function getAHAClass(sys, dia) {
        if (sys >= 180 || dia >= 120) return { l: "CRISIS", c: "#ff0000" };
        if (sys >= 140 || dia >= 90) return { l: "STAGE 2", c: "#f97316" };
        if (sys >= 130 || dia >= 80) return { l: "STAGE 1", c: "#fbbf24" };
        if (sys >= 120 && dia < 80) return { l: "ELEVATED", c: "#facc15" };
        return { l: "NORMAL", c: "#22c55e" };
    }

    function setLang(lang) {
        currentLang = lang;
        const translations = {
            en: { sys: "SYS Avg", dia: "DIA Avg", med: "Medication Taken?", save: "SAVE & TRANSMIT", clear: "Clear History" },
            es: { sys: "SIS Prom.", dia: "DIA Prom.", med: "¿Tomó medicina?", save: "GUARDAR Y ENVIAR", clear: "Borrar Historial" }
        };
        const t = translations[lang];
        document.querySelectorAll('.lang-sys').forEach(el => el.innerText = t.sys);
        document.querySelectorAll('.lang-dia').forEach(el => el.innerText = t.dia);
        document.querySelector('.lang-med').innerText = t.med;
        document.querySelector('.lang-save').innerText = t.save;
        document.querySelector('.lang-clear').innerText = t.clear;
    }

    function press(n) {
        if(n === 'C') currentInput = "";
        else if(n === '←') currentInput = currentInput.slice(0, -1);
        else if(currentInput.length < 6) currentInput += n;
        updateDisplay();
    }

    function updateDisplay() {
        let s = currentInput.padEnd(6, '-');
        document.getElementById('display').innerText = s.slice(0,3) + "/" + s.slice(3,6);
    }

    function saveBP() {
        if(currentInput.length < 5) return;
        const s = parseInt(currentInput.slice(0,3));
        const d = parseInt(currentInput.slice(3,6));
        const medTaken = document.getElementById('med-toggle').classList.contains('active');
        const entry = { 
            sys: s, 
            dia: d, 
            med: medTaken, 
            d: new Date().toISOString(),
            pid: localStorage.getItem('patient_id') || "MC-GHOST",
            dr: localStorage.getItem('assigned_dr_id') || "UNLINKED"
        };

        db.push(entry);
        localStorage.setItem('mc_bp_master_2026', JSON.stringify(db));
        
        // TRANSMISIÓN POR EL TUBO
        channel.trigger('client-bp-update', entry);

        speakReading(s, d);
        currentInput = ""; 
        updateDisplay(); 
        updateUI();
        document.getElementById('med-toggle').classList.remove('active');
    }

    function speakReading(sys, dia) {
        const cls = getAHAClass(sys, dia);
        const msg = currentLang === 'es' ? 
            `Presión ${sys} sobre ${dia}. Estado ${cls.l}.` : 
            `Pressure ${sys} over ${dia}. Status ${cls.l}.`;
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
        window.speechSynthesis.speak(u);
    }

    function updateUI() {
        if (db.length === 0) return;
        const avgSys = Math.round(db.reduce((a,b)=>a+b.sys,0)/db.length);
        const avgDia = Math.round(db.reduce((a,b)=>a+b.dia,0)/db.length);
        const pam = Math.round((avgSys + (2 * avgDia)) / 3);
        
        document.getElementById('sys-val').innerText = avgSys;
        document.getElementById('dia-val').innerText = avgDia;
        document.getElementById('map-val').innerText = pam;
        
        const cls = getAHAClass(avgSys, avgDia);
        const statusEl = document.getElementById('bp-status');
        statusEl.innerText = cls.l; statusEl.style.color = cls.c;
        updateChart();
    }

    function initChart() {
        const ctx = document.getElementById('bpChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'SYS', data: [], borderColor: '#fff', borderWidth: 2, pointRadius: 0, tension: 0.4 },
                { label: 'DIA', data: [], borderColor: '#3b82f6', borderWidth: 2, pointRadius: 0, tension: 0.4 }
            ]},
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { y: { grid: { color: '#111' }, ticks: { color: '#444', font: {size: 8} } }, x: { grid: { display: false }, ticks: { color: '#444', font: {size: 8} } } }
            }
        });
    }

    function updateChart() {
        const last12 = db.slice(-12);
        chart.data.labels = last12.map(d => new Date(d.d).toLocaleDateString([], {day:'numeric', month:'short'}));
        chart.data.datasets[0].data = last12.map(d => d.sys);
        chart.data.datasets[1].data = last12.map(d => d.dia);
        chart.update();
    }

    function startMic() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
        rec.onresult = (e) => {
            const v = e.results[0][0].transcript.replace(/\D/g,'');
            if(v) { currentInput = v.slice(0,6); updateDisplay(); }
        };
        rec.start();
    }

    async function generatePDF() {
        if (db.length === 0) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pid = localStorage.getItem('patient_id') || "NOT_SET";
        const date = new Date().toLocaleString();

        // Estilo Médico
        doc.setFillColor(10, 10, 10); doc.rect(0, 0, 210, 45, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(20); doc.text("MONTCODE™ HEMODYNAMIC REPORT", 15, 25);
        doc.setFontSize(9); doc.text(`PATIENT ID: ${pid} | GENERATED: ${date}`, 15, 35);

        // Resumen Clínico
        doc.setTextColor(0); doc.setFontSize(14); doc.text("Clinical Summary (Averages)", 15, 60);
        doc.setFontSize(11);
        doc.text(`AVG Pressure: ${document.getElementById('sys-val').innerText}/${document.getElementById('dia-val').innerText} mmHg`, 15, 70);
        doc.text(`AVG MAP (PAM): ${document.getElementById('map-val').innerText} mmHg`, 15, 77);
        doc.text(`Status: ${document.getElementById('bp-status').innerText}`, 15, 84);

        // Gráfico
        const canvas = document.getElementById('bpChart');
        doc.addImage(canvas.toDataURL('image/png'), 'PNG', 15, 95, 180, 60);

        // Tabla de Datos Full
        doc.text("Reading Logs (Last 20)", 15, 170);
        let y = 180;
        doc.setFontSize(8);
        doc.setFont("courier", "bold");
        doc.text("DATE/TIME            | BP (mmHg) | MAP | MEDS", 15, y);
        doc.line(15, y+2, 195, y+2);
        y += 8;

        db.slice(-20).reverse().forEach(log => {
            if(y > 280) { doc.addPage(); y = 20; }
            const logDate = new Date(log.d).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
            const pam = Math.round((log.sys + (2*log.dia))/3);
            doc.text(`${logDate.padEnd(20)} | ${log.sys}/${log.dia.toString().padEnd(3)} | ${pam.toString().padEnd(3)} | ${log.med ? 'YES' : 'NO'}`, 15, y);
            y += 6;
        });

        doc.setFontSize(7); doc.setTextColor(150);
        doc.text("*Disclaimer: This is a patient-generated wellness report. Not an official medical record.*", 15, 290);
        doc.save(`MontCode_BP_${pid}.pdf`);
    }

    function clearAll() { if(confirm("Clear history?")) { db=[]; localStorage.removeItem('mc_bp_master_2026'); location.reload(); } }
</script>
</body>
</html>

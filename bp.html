<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Clinical Master 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 15px; touch-action: manipulation; }
        .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; padding: 12px; text-align: center; }
        .num-pad { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .key { background: #111; border-radius: 20px; padding: 22px; font-size: 1.6rem; font-weight: 800; border: 1px solid #222; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; }
        .key:active { background: #222; transform: scale(0.95); }
        .key-save { grid-column: span 2; font-size: 1rem; transition: 0.3s; font-weight: 900; border-radius: 20px; }
        .display-bp { font-size: 5rem; font-weight: 900; text-align: center; line-height: 1; padding: 15px 0; min-height: 100px; transition: 0.3s; }
        .status-banner { width: 100%; height: 60px; background: #0a0a0a; border-radius: 20px; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .bridge-on { border-style: solid; border-color: #ccff00; background: rgba(204, 255, 0, 0.05); }
        .chart-modern { background: #050505; border-radius: 30px; border: 1px solid #1a1a1a; padding: 15px; margin-top: 20px; height: 180px; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center mb-4">
        <h1 class="text-[#ccff00] font-black italic tracking-tighter text-lg">MontCode™ RESCUE</h1>
        <div class="flex gap-2">
            <button onclick="setLang('en')" class="text-xs opacity-50" id="btn-en">EN 🇺🇸</button>
            <button onclick="setLang('es')" class="text-xs opacity-50" id="btn-es">ES 🇪🇸</button>
        </div>
    </div>

    <div class="status-banner" id="status-box">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
            <p class="text-blue-500 font-black uppercase text-[9px] tracking-widest" id="status-text">DEVICE READY</p>
        </div>
    </div>

    <div id="display" class="display-bp text-blue-500">---/--</div>
    <p class="text-center text-[8px] font-black text-zinc-600 uppercase mb-4 tracking-widest" id="input-hint">Waiting for input</p>

    <div class="num-pad">
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
        <div class="key text-red-600" onclick="press('C')">C</div><div class="key" onclick="press('0')">0</div><div class="key" onclick="startMic()">🎤</div>
        <button class="key key-save bg-blue-600 text-white" id="save-btn" onclick="saveReading()">TRANSMIT DATA</button>
        <div class="key text-zinc-500" onclick="press('←')">←</div>
    </div>

    <div class="chart-modern">
        <canvas id="bpChart"></canvas>
    </div>

    <footer class="mt-6 text-[7px] text-zinc-800 text-center uppercase font-bold px-4 pb-10">
        Clinical Protocol v5.7 • No Cloud • HIPAA Exempt
    </footer>

<script>
    let db = JSON.parse(localStorage.getItem('mc_bp_master_2026')) || [];
    let currentInput = "";
    let chart;
    let currentLang = localStorage.getItem('mc_lang') || 'en';
    
    // Datos heredados del Index
    const providerID = localStorage.getItem('mc_provider_id');
    const patientName = localStorage.getItem('mc_patient_name') || "Patient";
    const params = new URLSearchParams(window.location.search);
    const initialMode = params.get('mode'); // 'bp' o 'glucose'

    window.onload = () => {
        initChart();
        setLang(currentLang);
        applyModeConfig();
        checkBridgeStatus();
    };

    function applyModeConfig() {
        const d = document.getElementById('display');
        const btn = document.getElementById('save-btn');
        const hint = document.getElementById('input-hint');

        if(initialMode === 'glucose') {
            d.innerText = "---";
            d.style.color = "#ccff00";
            btn.style.backgroundColor = "#ccff00";
            btn.style.color = "black";
            hint.innerText = "GLUCOSE MODE ACTIVE";
            btn.innerText = "SEND GLUCOSE";
        } else {
            d.innerText = "---/--";
            d.style.color = "#3b82f6";
            btn.style.backgroundColor = "#2563eb";
            btn.style.color = "white";
            hint.innerText = "BP MONITORING ACTIVE";
            btn.innerText = "SEND BP READING";
        }
    }

    function checkBridgeStatus() {
        if(providerID) {
            document.getElementById('status-box').classList.add('bridge-on');
            const txt = document.getElementById('status-text');
            txt.innerText = `LINKED TO: ${providerID}`;
            txt.style.color = "#ccff00";
            document.getElementById('status-dot').style.backgroundColor = "#ccff00";
        }
    }

    function press(n) {
        if(n === 'C') currentInput = "";
        else if(n === '←') currentInput = currentInput.slice(0, -1);
        else if(currentInput.length < 6) currentInput += n;
        updateDisplay();
    }

    function updateDisplay() {
        const d = document.getElementById('display');
        // Si el modo inicial es glucosa o el input es corto, mostramos formato glucosa
        if(initialMode === 'glucose' || currentInput.length <= 3) {
            d.innerText = currentInput.padEnd(3, '-');
        } else {
            let s = currentInput.padEnd(6, '-');
            d.innerText = s.slice(0,3) + "/" + s.slice(3,6);
        }
    }

    async function saveReading() {
        if(currentInput.length < 1) return;

        let s, d, type;
        // Lógica de clasificación automática
        if(initialMode === 'glucose' || currentInput.length <= 3) {
            s = parseInt(currentInput);
            d = 77; // El código secreto para el DR HUB
            type = "GLUCOSE";
        } else {
            s = parseInt(currentInput.slice(0,3));
            d = parseInt(currentInput.slice(3,6)) || 80;
            type = "BP";
        }

        // Guardado Local
        db.push({ sys: s, dia: d, type: type, d: new Date().toISOString() });
        localStorage.setItem('mc_bp_master_2026', JSON.stringify(db));

        // Transmisión Pusher
        try {
            await fetch('/api/pusher-relay', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sys: s, dia: d, patient: patientName, provider: providerID || "UNLINKED" })
            });
            document.getElementById('status-text').innerText = "DATA SENT ✅";
            if(navigator.vibrate) navigator.vibrate(200);
        } catch (e) {
            document.getElementById('status-text').innerText = "OFFLINE - SAVED";
        }

        speakReading(s, d, type);
        currentInput = "";
        updateDisplay();
        updateChart();
        setTimeout(checkBridgeStatus, 2000);
    }

    function speakReading(s, d, type) {
        let msg = (type === "GLUCOSE") 
            ? (currentLang === 'es' ? `Glucosa ${s}` : `Glucose ${s}`)
            : (currentLang === 'es' ? `Presión ${s} sobre ${d}` : `Pressure ${s} over ${d}`);
        
        const utterance = new SpeechSynthesisUtterance(msg);
        utterance.lang = (currentLang === 'es') ? 'es-ES' : 'en-US';
        window.speechSynthesis.speak(utterance);
    }

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('mc_lang', lang);
        document.getElementById('btn-en').style.opacity = (lang === 'en') ? "1" : "0.3";
        document.getElementById('btn-es').style.opacity = (lang === 'es') ? "1" : "0.3";
    }

    function initChart() {
        const ctx = document.getElementById('bpChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'SYS', data: [], borderColor: '#3b82f6', tension: 0.4, pointRadius: 0 },
                { label: 'DIA', data: [], borderColor: '#1e3a8a', tension: 0.4, pointRadius: 0 }
            ]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
        });
        updateChart();
    }

    function updateChart() {
        const last = db.filter(r => r.type === "BP").slice(-10);
        chart.data.labels = last.map(l => "");
        chart.data.datasets[0].data = last.map(l => l.sys);
        chart.data.datasets[1].data = last.map(l => l.dia);
        chart.update();
    }

    function startMic() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = (currentLang === 'es') ? 'es-ES' : 'en-US';
        rec.onresult = (e) => {
            const v = e.results[0][0].transcript.replace(/\D/g,'');
            if(v) { currentInput = v; updateDisplay(); }
        };
        rec.start();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ BP Master 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 15px; touch-action: manipulation; }
        .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; padding: 12px; text-align: center; }
        .num-pad { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; margin-top: 20px; opacity: 0.3; pointer-events: none; transition: 0.5s; }
        .num-pad.active { opacity: 1; pointer-events: auto; }
        .key { background: #111; border-radius: 20px; padding: 22px; font-size: 1.6rem; font-weight: 800; border: 1px solid #222; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; }
        .key:active { background: #222; transform: scale(0.95); }
        .key-save { background: #3b82f6; color: #fff; grid-column: span 2; font-size: 1rem; }
        .display-bp { font-size: 5rem; font-weight: 900; color: #3b82f6; text-align: center; line-height: 1; padding: 15px 0; min-height: 100px; }
        .chart-modern { background: #050505; border-radius: 30px; border: 1px solid #1a1a1a; padding: 15px; margin-top: 20px; height: 220px; }
        .cond-chip { padding: 4px 10px; border-radius: 10px; font-size: 8px; font-weight: 900; border: 1px solid #222; color: #444; cursor: pointer; }
        .cond-chip.active { border-color: #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .status-banner { width: 100%; height: 60px; background: #0a0a0a; border-radius: 24px; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; transition: 0.5s; }
    </style>
</head>
<body class="pb-10">

    <div class="flex justify-between items-center mb-4">
        <div class="flex gap-4 items-center">
            <a href="index.html" class="w-8 h-8 bg-zinc-900 rounded-full flex items-center justify-center border border-zinc-800 text-zinc-400">←</a>
            <div class="flex gap-2">
                <button onclick="setLang('en')" class="w-7 h-7 rounded-full border border-zinc-700 opacity-100" id="btn-en">🇺🇸</button>
                <button onclick="setLang('es')" class="w-7 h-7 rounded-full border border-zinc-700 opacity-40" id="btn-es">🇪🇸</button>
            </div>
        </div>
        <span class="text-[8px] text-blue-500 font-black uppercase tracking-widest italic">P2P Tactical</span>
    </div>

    <div class="status-banner" id="status-box">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2 h-2 bg-zinc-700 rounded-full"></div>
            <p class="text-zinc-500 font-black uppercase text-[9px] tracking-widest" id="status-text">INITIALIZING...</p>
        </div>
    </div>

    <div class="flex flex-wrap gap-2 mb-4 justify-center">
        <div class="cond-chip" id="chip-HTN" onclick="this.classList.toggle('active'); updateUI();">HTN</div>
        <div class="cond-chip" id="chip-DM" onclick="this.classList.toggle('active'); updateUI();">DM</div>
        <div class="cond-chip" id="chip-CKD" onclick="this.classList.toggle('active'); updateUI();">CKD</div>
    </div>

    <div class="grid grid-cols-4 gap-1 mb-4">
        <div class="stat-card"><p class="text-[5px] font-bold text-zinc-500 uppercase lang-sys">SYS Avg</p><p id="sys-val" class="text-md font-black">--</p></div>
        <div class="stat-card"><p class="text-[5px] font-bold text-zinc-500 uppercase lang-dia">DIA Avg</p><p id="dia-val" class="text-md font-black">--</p></div>
        <div class="stat-card border-blue-900/30"><p class="text-[5px] font-bold text-blue-400 uppercase">MAP</p><p id="map-val" class="text-md font-black text-blue-400">--</p></div>
        <div class="stat-card"><p class="text-[5px] font-bold text-zinc-500 uppercase">Class</p><p id="bp-status" class="text-[7px] font-black uppercase">READY</p></div>
    </div>

    <div id="display" class="display-bp">---/--</div>

    <div class="num-pad" id="main-pad">
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
        <div class="key text-red-600" onclick="press('C')">C</div><div class="key" onclick="press('0')">0</div><div class="key" onclick="press('←')">←</div>
        <div class="key key-save lang-save" onclick="saveBP()">SAVE BP READING</div>
        <div class="key" onclick="location.href='vinculacion.html'">📲</div>
    </div>

    <div class="chart-modern">
        <canvas id="bpChart"></canvas>
    </div>

    <div class="mt-6">
        <button onclick="clearAll()" class="w-full p-4 text-zinc-800 text-[9px] font-black uppercase lang-clear">Clear History 🗑️</button>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('mc_bp_master_2026')) || [];
    let currentInput = "";
    let chart;
    let currentLang = 'en';

    window.onload = () => {
        initChart();
        updateUI();
        setLang('en');
        checkBridgeStatus();
    };

    function checkBridgeStatus() {
        const statusBox = document.getElementById('status-box');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const hasLink = localStorage.getItem('mc_dr_endpoint');

        if (hasLink) {
            statusBox.style.borderColor = "#3b82f6";
            statusBox.style.background = "rgba(59, 130, 246, 0.05)";
            statusText.innerText = "BRIDGE ACTIVE ✅";
            statusText.style.color = "#3b82f6";
            statusDot.className = "w-2 h-2 bg-blue-500 animate-pulse";
        } else {
            statusText.innerText = "LOCAL MODE ACTIVE";
            statusText.style.color = "#555";
        }
        document.getElementById('main-pad').classList.add('active');
    }

    async function transmitToHub(sys, dia) {
        const bridgeData = localStorage.getItem('mc_dr_endpoint');
        if (!bridgeData) return;

        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        
        statusText.innerText = "SYNCING...";
        statusDot.className = "w-2 h-2 bg-yellow-500 animate-ping";

        try {
            await fetch('https://montcode-provider.vercel.app/api/hub', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    kit_id: "MANUEL_MONT", 
                    sys: sys,
                    dia: dia,
                    timestamp: new Date().toISOString()
                })
            });
            statusText.innerText = "BRIDGE SYNCED ✅";
            statusDot.className = "w-2 h-2 bg-green-500 animate-pulse";
        } catch (e) {
            statusText.innerText = "OFFLINE - SAVED LOCALLY";
            statusDot.className = "w-2 h-2 bg-zinc-700";
        }
    }

    function saveBP() {
        if(currentInput.length < 5) return;
        const s = parseInt(currentInput.slice(0,3));
        const d = parseInt(currentInput.slice(3,6));
        
        db.push({ sys: s, dia: d, d: new Date().toISOString() });
        localStorage.setItem('mc_bp_master_2026', JSON.stringify(db));
        
        transmitToHub(s, d);
        runTriageSpeak(s, d);
        
        currentInput = ""; 
        updateDisplay(); 
        updateUI();
    }

    function getAHAClass(sys, dia) {
        const isHighRisk = document.getElementById('chip-DM').classList.contains('active') || document.getElementById('chip-CKD').classList.contains('active');
        if (sys >= 180 || dia >= 120) return { l: "CRISIS", c: "#ef4444" };
        if (sys >= 140 || dia >= 90) return { l: "STAGE 2", c: "#f97316" };
        if (sys >= 130 || dia >= 80) return { l: "STAGE 1", c: "#fbbf24" };
        if (isHighRisk && (sys >= 120 || dia >= 80)) return { l: "ELEVATED", c: "#facc15" };
        if (sys >= 120 && dia < 80) return { l: "ELEVATED", c: "#facc15" };
        return { l: "NORMAL", c: "#22c55e" };
    }

    function runTriageSpeak(sys, dia) {
        const cls = getAHAClass(sys, dia);
        const map = Math.round((sys + (2 * dia)) / 3);
        const msg = currentLang === 'es' ? 
            `Presión ${sys} sobre ${dia}. PAM de ${map}. Estado: ${cls.l}.` : 
            `Pressure ${sys} over ${dia}. MAP of ${map}. Status: ${cls.l}.`;
        const utterance = new SpeechSynthesisUtterance(msg);
        utterance.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
        window.speechSynthesis.speak(utterance);
    }

    function updateUI() {
        if (db.length === 0) return;
        const avgSys = Math.round(db.reduce((a,b)=>a+b.sys,0)/db.length);
        const avgDia = Math.round(db.reduce((a,b)=>a+b.dia,0)/db.length);
        document.getElementById('sys-val').innerText = avgSys;
        document.getElementById('dia-val').innerText = avgDia;
        document.getElementById('map-val').innerText = Math.round((avgSys + (2 * avgDia)) / 3);
        
        const cls = getAHAClass(avgSys, avgDia);
        const statusEl = document.getElementById('bp-status');
        statusEl.innerText = cls.l;
        statusEl.style.color = cls.c;
        
        updateChart();
    }

    function initChart() {
        const ctx = document.getElementById('bpChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { data: [], borderColor: '#fff', borderWidth: 2, tension: 0.4, pointRadius: 0 },
                { data: [], borderColor: '#3b82f6', borderWidth: 2, tension: 0.4, pointRadius: 0 }
            ]},
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { y: { display: false }, x: { display: false } }
            }
        });
    }

    function updateChart() {
        const last = db.slice(-10);
        chart.data.labels = last.map(d => "");
        chart.data.datasets[0].data = last.map(d => d.sys);
        chart.data.datasets[1].data = last.map(d => d.dia);
        chart.update();
    }

    function press(n) {
        if(n === 'C') currentInput = "";
        else if(n === '←') currentInput = currentInput.slice(0, -1);
        else if(currentInput.length < 6) currentInput += n;
        updateDisplay();
    }

    function updateDisplay() {
        let s = currentInput.padEnd(6, '-');
        document.getElementById('display').innerText = s.slice(0,3) + "/" + s.slice(3,6);
    }

    function setLang(lang) {
        currentLang = lang;
        const t = lang === 'es' ? 
            { sys: "SIS", dia: "DIA", save: "GUARDAR PRESIÓN", clear: "BORRAR HISTORIAL" } : 
            { sys: "SYS", dia: "DIA", save: "SAVE BP READING", clear: "CLEAR HISTORY" };
        document.querySelector('.lang-sys').innerText = t.sys;
        document.querySelector('.lang-dia').innerText = t.dia;
        document.querySelector('.lang-save').innerText = t.save;
        document.querySelector('.lang-clear').innerText = t.clear;
        document.getElementById('btn-en').style.opacity = lang === 'en' ? '1' : '0.4';
        document.getElementById('btn-es').style.opacity = lang === 'es' ? '1' : '0.4';
    }

    function clearAll() { if(confirm("Clear history?")) { db=[]; localStorage.removeItem('mc_bp_master_2026'); location.reload(); } }
</script>
</body>
</html>

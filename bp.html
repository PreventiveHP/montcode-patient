<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ BP Master 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 15px; touch-action: manipulation; }
        .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; padding: 12px; text-align: center; }
        .num-pad { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; margin-top: 20px; opacity: 0.3; pointer-events: none; transition: 0.5s; }
        .num-pad.active { opacity: 1; pointer-events: auto; }
        .key { background: #111; border-radius: 20px; padding: 22px; font-size: 1.6rem; font-weight: 800; border: 1px solid #222; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; }
        .key:active { background: #222; transform: scale(0.95); }
        .key-save { background: #3b82f6; color: #fff; grid-column: span 2; font-size: 1rem; }
        .display-bp { font-size: 5rem; font-weight: 900; color: #3b82f6; text-align: center; line-height: 1; padding: 15px 0; min-height: 100px; }
        .med-btn { border: 2px solid #333; border-radius: 12px; padding: 10px; cursor: pointer; transition: 0.3s; }
        .med-btn.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .chart-modern { background: #050505; border-radius: 30px; border: 1px solid #1a1a1a; padding: 15px; margin-top: 20px; height: 220px; }
        .cond-chip { padding: 4px 10px; border-radius: 10px; font-size: 8px; font-weight: 900; border: 1px solid #222; color: #444; cursor: pointer; }
        .cond-chip.active { border-color: #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .status-banner { width: 100%; height: 80px; background: #0a0a0a; border-radius: 24px; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
    </style>
</head>
<body class="pb-10">

    <div class="flex justify-between items-center mb-4">
        <div class="flex gap-4 items-center">
            <a href="index.html" class="w-8 h-8 bg-zinc-900 rounded-full flex items-center justify-center border border-zinc-800 text-zinc-400">←</a>
            <div class="flex gap-2">
                <button onclick="setLang('en')" class="w-7 h-7 rounded-full border border-zinc-700 opacity-100" id="btn-en">🇺🇸</button>
                <button onclick="setLang('es')" class="w-7 h-7 rounded-full border border-zinc-700 opacity-40" id="btn-es">🇪🇸</button>
            </div>
        </div>
        <a href="https://www.heart.org/en/health-topics/high-blood-pressure/understanding-blood-pressure-readings" target="_blank" class="text-[7px] text-zinc-500 underline uppercase font-bold">AHA Guidelines ↗</a>
    </div>

    <div class="status-banner" id="status-box">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
            <p class="text-blue-500 font-black uppercase text-[10px] tracking-widest" id="status-text">READY FOR INPUT</p>
        </div>
    </div>

    <div class="flex flex-wrap gap-2 mb-4 justify-center">
        <div class="cond-chip" id="chip-HTN" onclick="this.classList.toggle('active'); updateUI();">HTN</div>
        <div class="cond-chip" id="chip-DM" onclick="this.classList.toggle('active'); updateUI();">DM</div>
        <div class="cond-chip" id="chip-STROKE" onclick="this.classList.toggle('active'); updateUI();">HX STROKE</div>
        <div class="cond-chip" id="chip-CKD" onclick="this.classList.toggle('active'); updateUI();">CKD</div>
    </div>

    <div class="grid grid-cols-4 gap-1 mb-4">
        <div class="stat-card"><p class="text-[5px] font-bold text-zinc-500 uppercase lang-sys">SYS Avg</p><p id="sys-val" class="text-md font-black text-white">--</p></div>
        <div class="stat-card"><p class="text-[5px] font-bold text-zinc-500 uppercase lang-dia">DIA Avg</p><p id="dia-val" class="text-md font-black text-white">--</p></div>
        <div class="stat-card border-blue-900"><p class="text-[5px] font-bold text-blue-400 uppercase">PAM</p><p id="map-val" class="text-md font-black text-blue-400">--</p></div>
        <div class="stat-card"><p class="text-[5px] font-bold text-zinc-500 uppercase">Status</p><p id="bp-status" class="text-[7px] font-black text-zinc-600">READY</p></div>
    </div>

    <div class="flex justify-center mb-2">
        <div id="med-toggle" class="med-btn flex items-center gap-2" onclick="this.classList.toggle('active')">
            <span class="text-sm">💊</span>
            <span class="text-[9px] font-black uppercase lang-med">Medication Taken Today?</span>
        </div>
    </div>

    <div id="display" class="display-bp">---/--</div>
    <p class="text-center text-[7px] font-bold text-zinc-500 uppercase mb-4 italic">Say only the number</p>

    <div class="num-pad" id="main-pad">
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
        <div class="key text-red-600" onclick="press('C')">C</div><div class="key" onclick="press('0')">0</div><div class="key" onclick="press('←')">←</div>
        <div class="key key-save lang-save" onclick="saveBP()">SAVE BP READING</div>
        <div class="key" onclick="startMic()"><span class="text-xl">🎤</span></div>
    </div>

    <div class="chart-modern">
        <canvas id="bpChart"></canvas>
    </div>

    <div class="mt-8 space-y-3">
        <button onclick="generatePDF()" class="w-full bg-blue-600 text-white p-4 font-black uppercase rounded-2xl text-[10px]">Generate Clinical Report 📄</button>
        <button onclick="location.href='vinculacion.html'" class="w-full border-2 border-blue-500 text-blue-500 p-4 font-black uppercase rounded-2xl text-[10px]">Link to Doctor Console 📱</button>
        <button onclick="clearAll()" class="w-full p-2 text-zinc-800 text-[8px] font-black uppercase lang-clear">Clear History 🗑️</button>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('mc_bp_master_2026')) || [];
    let currentInput = "";
    let chart;
    let currentLang = 'en';

    window.onload = () => {
        initChart();
        updateUI();
        setLang('en');
        setTimeout(unlockHardware, 800);
    };

    function unlockHardware() {
        const statusBox = document.getElementById('status-box');
        const statusText = document.getElementById('status-text');
        const hasLink = localStorage.getItem('mc_dr_endpoint');

        statusBox.classList.add('bg-blue-900/10', 'border-blue-500/30');
        statusBox.classList.remove('border-dashed');
        statusText.innerText = hasLink ? "LINKED TO DOCTOR ✅" : "LOCAL MODE ACTIVE";
        document.getElementById('main-pad').classList.add('active');
    }

    // --- LA BOMBA DE TRANSMISIÓN INTEGRADA ---
    async function transmitToBridge(sys, dia, med) {
        const endpointData = JSON.parse(localStorage.getItem('mc_dr_endpoint'));
        if (!endpointData) return; // No hay doctor vinculado

        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        
        statusText.innerText = "TRANSMITTING TO DR...";
        statusDot.className = "w-2 h-2 bg-yellow-500 animate-ping";

        const payload = {
            message: `Alert: New BP recorded: ${sys}/${dia}. Meds: ${med ? 'Yes' : 'No'}`
        };

        try {
            // Usamos el relay de prueba (mismo que definimos para el Dr)
            const response = await fetch('https://web-push-codelab.glitch.me/api/send-push-msg', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    subscription: endpointData,
                    applicationKeys: { public: 'BPLp9C9Pq6p7v4G7v5V9zY4kR2S0X8wL1M3N5b-Q_8t9j0u1v2w3x4y5z6a7b8c9d0e1f2g3h4i5j6k7l8m9n0o' }, 
                    data: payload.message
                })
            });

            if (response.ok) {
                statusText.innerText = "BRIDGE SYNCED ✅";
                statusDot.className = "w-2 h-2 bg-green-500 animate-pulse";
            }
        } catch (e) {
            statusText.innerText = "LOCAL SAVE ONLY (OFFLINE)";
            statusDot.className = "w-2 h-2 bg-zinc-700";
        }
    }

    function saveBP() {
        if(currentInput.length < 5) return;
        const s = parseInt(currentInput.slice(0,3));
        const d = parseInt(currentInput.slice(3,6));
        const medTaken = document.getElementById('med-toggle').classList.contains('active');
        
        // 1. Guardado Local
        db.push({ sys: s, dia: d, med: medTaken, d: new Date().toISOString() });
        localStorage.setItem('mc_bp_master_2026', JSON.stringify(db));
        
        // 2. Triage Voz
        runTriageSpeak(s, d);
        
        // 3. DISPARAR TRANSMISIÓN AL DOCTOR
        transmitToBridge(s, d, medTaken);
        
        // Reset UI
        currentInput = ""; 
        updateDisplay(); 
        updateUI();
        document.getElementById('med-toggle').classList.remove('active');
    }

    // ... (Funciones de UI, Chart, PDF y Mic se mantienen igual que tu original) ...
    function getAHAClass(sys, dia) {
        const isCKD_DM = document.getElementById('chip-DM').classList.contains('active') || document.getElementById('chip-CKD').classList.contains('active');
        if (sys >= 180 || dia >= 120) return { l: "CRISIS", c: "#ff0000", r: "Seek emergency care." };
        if (sys >= 140 || dia >= 90) return { l: "STAGE 2", c: "#f97316", r: "Consult Dr. regarding medication." };
        if (sys >= 130 || dia >= 80) return { l: "STAGE 1", c: "#fbbf24", r: "Lifestyle changes & follow-up." };
        if (isCKD_DM && (sys >= 120 || dia >= 80)) return { l: "ELEVATED (Risk)", c: "#facc15", r: "Goal is <130/80 for CKD/DM." };
        if (sys >= 120 && dia < 80) return { l: "ELEVATED", c: "#facc15", r: "Monitor closely." };
        return { l: "NORMAL", c: "#22c55e", r: "Maintain healthy control." };
    }

    function runTriageSpeak(sys, dia) {
        const cls = getAHAClass(sys, dia);
        const map = Math.round((sys + (2 * dia)) / 3);
        let msg = currentLang === 'es' ? 
            `Presión ${sys} sobre ${dia}. PAM de ${map}. Estado: ${cls.l}.` : 
            `Pressure ${sys} over ${dia}. MAP of ${map}. Status: ${cls.l}.`;
        const utterance = new SpeechSynthesisUtterance(msg);
        utterance.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
        window.speechSynthesis.speak(utterance);
    }

    function updateUI() {
        if (db.length === 0) return;
        const avgSys = Math.round(db.reduce((a,b)=>a+b.sys,0)/db.length);
        const avgDia = Math.round(db.reduce((a,b)=>a+b.dia,0)/db.length);
        const pam = Math.round((avgSys + (2 * avgDia)) / 3);
        document.getElementById('sys-val').innerText = avgSys;
        document.getElementById('dia-val').innerText = avgDia;
        document.getElementById('map-val').innerText = pam;
        const cls = getAHAClass(avgSys, avgDia);
        const statusEl = document.getElementById('bp-status');
        statusEl.innerText = cls.l;
        statusEl.style.color = cls.c;
        updateChart();
    }

    function initChart() {
        const ctx = document.getElementById('bpChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'SYS', data: [], borderColor: '#fff', borderWidth: 3, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#fff' },
                { label: 'DIA', data: [], borderColor: '#3b82f6', borderWidth: 3, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#3b82f6' }
            ]},
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { 
                    y: { grid: { color: '#111' }, ticks: { color: '#444', font: { size: 9 } } }, 
                    x: { ticks: { color: '#888', font: { size: 8 }, maxRotation: 45, minRotation: 45 } } 
                } 
            }
        });
    }

    function updateChart() {
        const last10 = db.slice(-10);
        chart.data.labels = last10.map(d => {
            const date = new Date(d.d);
            return date.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' + date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        });
        chart.data.datasets[0].data = last10.map(d => d.sys);
        chart.data.datasets[1].data = last10.map(d => d.dia);
        chart.update();
    }

    function press(n) {
        if(n === 'C') currentInput = "";
        else if(n === '←') currentInput = currentInput.slice(0, -1);
        else if(currentInput.length < 6) currentInput += n;
        updateDisplay();
    }

    function updateDisplay() {
        let s = currentInput.padEnd(6, '-');
        document.getElementById('display').innerText = s.slice(0,3) + "/" + s.slice(3,6);
    }

    function setLang(lang) {
        currentLang = lang;
        const translations = {
            en: { sys: "SYS Avg", dia: "DIA Avg", med: "Medication Taken Today?", save: "SAVE BP READING", clear: "Clear History" },
            es: { sys: "SIS Prom.", dia: "DIA Prom.", med: "¿Tomó medicina hoy?", save: "GUARDAR PRESIÓN", clear: "Borrar Historial" }
        };
        const t = translations[lang];
        document.querySelector('.lang-sys').innerText = t.sys;
        document.querySelector('.lang-dia').innerText = t.dia;
        document.querySelector('.lang-med').innerText = t.med;
        document.querySelector('.lang-save').innerText = t.save;
        document.querySelector('.lang-clear').innerText = t.clear;
        document.getElementById('btn-en').style.opacity = lang === 'en' ? '1' : '0.4';
        document.getElementById('btn-es').style.opacity = lang === 'es' ? '1' : '0.4';
    }

    function clearAll() { if(confirm("Clear history?")) { db=[]; localStorage.removeItem('mc_bp_master_2026'); location.reload(); } }
</script>
</body>
</html>

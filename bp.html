<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BP Monitoring - MontCode™</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        .neon-input { background: #111; border: 2px solid #333; border-radius: 20px; padding: 20px; text-align: center; font-size: 3.5rem; font-weight: 900; color: #3b82f6; width: 100%; outline: none; transition: 0.3s; }
        .neon-input:focus { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .log-card { background: #0a0a0a; border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid #1a1a1a; }
        .btn-main { background: #3b82f6; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="p-6 pb-32">

    <header class="flex justify-between items-center mb-8 mt-2">
        <button onclick="location.href='index.html'" class="text-zinc-500 font-black text-[10px] uppercase italic tracking-widest">← Dashboard</button>
        <img src="logo.png.jpg" class="w-8 h-8 rounded-full border border-[#DAA520] object-cover">
    </header>

    <div class="mb-10 text-center">
        <h1 class="text-3xl font-black italic uppercase tracking-tighter text-white mb-1">BP LOG</h1>
        <p id="patient-info" class="text-[9px] font-black uppercase text-blue-500 italic tracking-widest mb-6">Loading Patient...</p>
        
        <input type="text" id="bp-input" inputmode="numeric" placeholder="12080" maxlength="7"
               oninput="formatBP(this)"
               class="neon-input italic tracking-tighter mb-2">
        <p class="text-[8px] font-bold text-zinc-600 uppercase italic">Just type digits (e.g., 12080 or 9560)</p>
    </div>

    <button onclick="saveReading()" class="btn-main w-full py-6 rounded-[28px] font-black uppercase italic text-xl mb-12 transition active:scale-95">
        Save & Sync 📡
    </button>

    <div id="history-container">
        <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-4 italic tracking-widest">Clinical History</h3>
        <div id="bp-list"></div>
    </div>

    <!-- PDF Floating Button -->
    <button onclick="generatePDF()" class="fixed bottom-8 right-6 bg-white text-black px-6 py-4 rounded-full shadow-2xl font-black text-[10px] uppercase italic flex items-center gap-2">
        Clinical Report 📄
    </button>

    <script>
        const lang = localStorage.getItem('mc_lang') || 'en';
        const patientName = localStorage.getItem('mc_patient_name') || "Patient";

        window.onload = () => {
            document.getElementById('patient-info').innerText = `${patientName} | 2026 Edition`;
            renderHistory();
        };

        // FIX: Formateo Elástico (Acepta 5 o 6 dígitos sin romper la lógica)
        function formatBP(input) {
            let val = input.value.replace(/\D/g, ''); 
            if (val.length >= 4) {
                // Si el primer dígito es '1' y hay al menos 5 dígitos, asume SYS de 3 cifras
                // Si no, asume SYS de 2 cifras (ej. 90/60)
                let splitAt = (val.startsWith('1') && val.length >= 5) || val.length === 6 ? 3 : 2;
                input.value = val.slice(0, splitAt) + '/' + val.slice(splitAt, splitAt + 3);
            } else {
                input.value = val;
            }
        }

        function speakReport(sys, dia) {
            const name = localStorage.getItem('mc_patient_name') || "";
            const msg = lang === 'es' 
                ? `Buen día ${name}, presión registrada ${sys} sobre ${dia}.`
                : `Good day ${name}, blood pressure recorded ${sys} over ${dia}.`;
            
            const utterance = new SpeechSynthesisUtterance(msg);
            utterance.lang = lang === 'es' ? 'es-US' : 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        async function saveReading() {
            const val = document.getElementById('bp-input').value;
            if (!val.includes('/')) return alert("Use format 120/80 or 90/60");

            const [sys, dia] = val.split('/');
            const entry = {
                sys: parseInt(sys),
                dia: parseInt(dia),
                date: new Date().toLocaleString(),
                timestamp: Date.now()
            };

            let history = JSON.parse(localStorage.getItem('mc_bp_history') || '[]');
            history.unshift(entry);
            localStorage.setItem('mc_bp_history', JSON.stringify(history));
            
            // Notificar al Dashboard Local
            localStorage.setItem('last_bp_value', `${sys}/${dia}`);

            speakReport(sys, dia);
            renderHistory();
            document.getElementById('bp-input').value = "";
            
            // DISPARO DE SINCRONIZACIÓN AL DR.
            syncWithProvider(entry);
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('mc_bp_history') || '[]');
            const container = document.getElementById('bp-list');
            container.innerHTML = history.slice(0, 8).map(h => `
                <div class="log-card flex justify-between items-center">
                    <div>
                        <p class="text-3xl font-black italic tracking-tighter">${h.sys}/${h.dia}</p>
                        <p class="text-[8px] text-zinc-500 uppercase font-black italic">${h.date}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-[9px] font-black px-3 py-1 rounded-full ${h.sys > 130 ? 'bg-red-900/30 text-red-500' : 'bg-green-900/30 text-green-500'} italic uppercase">
                            ${h.sys > 130 ? 'High' : 'Normal'}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const history = JSON.parse(localStorage.getItem('mc_bp_history') || '[]');

            doc.setFontSize(22);
            doc.text("MONTCODE™ BP CLINICAL REPORT", 20, 20);
            doc.setFontSize(10);
            doc.text(`Patient: ${patientName}`, 20, 30);
            doc.text(`Generated: ${new Date().toLocaleString()}`, 20, 35);
            doc.text("----------------------------------------------------------", 20, 40);

            let y = 50;
            doc.text("LAST 15 READINGS (AHA TRENDS):", 20, y);
            y += 10;

            history.slice(0, 15).forEach(h => {
                const status = h.sys >= 140 || h.dia >= 90 ? "STAGE 2 HTN" : h.sys >= 130 ? "STAGE 1 HTN" : "NORMAL";
                doc.text(`${h.date} | ${h.sys}/${h.dia} mmHg | Status: ${status}`, 20, y);
                y += 8;
            });

            doc.setFontSize(8);
            doc.text("Disclaimer: Provided by patient via MontCode™ Rescue. Not an official record.", 20, 280);
            doc.save(`MontCode_BP_${patientName}.pdf`);
        }

        async function syncWithProvider(data) {
            const vaultUrl = localStorage.getItem('mc_vault_url');
            const kitId = localStorage.getItem('mc_kit_id');
            const drId = localStorage.getItem('mc_linked_dr_id');

            if (vaultUrl && kitId) {
                try {
                    await fetch(`${vaultUrl}/api/update`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            kit_id: kitId, 
                            dr_id: drId,
                            type: 'BP', 
                            value: `${data.sys}/${data.dia}`,
                            patient: patientName
                        })
                    });
                    console.log("📡 Remote Sync Complete");
                } catch (e) {
                    console.log("📡 Sync Queued (Offline Mode)");
                }
            }
        }
    </script>
</body>
</html>

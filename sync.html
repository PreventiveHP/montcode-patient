 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MontCode™ | Link to Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lector QR -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .scanner-box { border: 2px solid #ccff00; box-shadow: 0 0 20px rgba(204, 255, 0, 0.2); }
        #reader { width: 100% !important; border: none !important; }
        #reader video { border-radius: 20px; object-fit: cover; }
    </style>
</head>
<body class="flex flex-col h-screen p-6">

    <header class="mb-8">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">Link to Station</h1>
        <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Scan Provider QR to sync profile</p>
    </header>

    <main class="flex-1 flex flex-col justify-center">
        <div class="scanner-box rounded-[30px] overflow-hidden bg-zinc-900">
            <div id="reader"></div>
        </div>
        
        <div id="status-msg" class="mt-6 text-center text-[10px] font-black uppercase italic text-zinc-600">
            Waiting for camera...
        </div>
    </main>

    <footer class="mt-auto pb-6">
        <button onclick="location.href='index.htm'" class="w-full py-4 rounded-2xl bg-zinc-900 text-zinc-400 font-black uppercase text-[10px] tracking-widest italic">
            Cancel
        </button>
    </footer>

    <script>
        // 1. Obtener datos locales del paciente (encriptados/locales)
        const patientData = {
            kit: localStorage.getItem('kit_id') || 'ST-999',
            name: localStorage.getItem('user_name') || 'Guest Patient',
            dob: localStorage.getItem('user_dob') || '00/00/0000'
        };

        const html5QrCode = new Html5Qrcode("reader");

        const qrConfig = { fps: 10, qrbox: { width: 250, height: 250 } };

        html5QrCode.start({ facingMode: "environment" }, qrConfig, onScanSuccess);

        async function onScanSuccess(decodedText) {
            // Detenemos la cámara al detectar éxito
            html5QrCode.stop();
            document.getElementById('status-msg').innerText = "STATION DETECTED. ENROLLING...";
            document.getElementById('status-msg').classList.add('text-[#ccff00]');

            try {
                // El QR del Dr tendrá una URL de tu Vercel: https://.../api/hub?station=STATION01
                const targetUrl = decodedText; 

                // Enviamos el "paquete de inscripción" (Sin nube, directo al hub de relevo)
                const payload = {
                    from: "PATIENT",
                    type: "ENROLLMENT",
                    data: btoa(JSON.stringify(patientData)) // Base64 para evitar errores de red
                };

                const response = await fetch(targetUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("✅ LINK SUCCESSFUL\nProfile sent to Station.");
                    location.href = 'index.htm';
                }
            } catch (err) {
                alert("❌ SYNC ERROR: Check Connection");
                console.error(err);
            }
        }
    </script>
</body>
</html>

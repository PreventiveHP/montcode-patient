<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
    function generateSyncQR() {
        const qrContainer = document.getElementById("qrcode");
        if (!qrContainer) return;
        
        // 1. Limpiamos y preparamos datos
        qrContainer.innerHTML = ""; 
        let kitID, patientName;
        
        try {
            const licenseData = localStorage.getItem('montcode_activation');
            const license = licenseData ? JSON.parse(licenseData) : null;
            kitID = license?.kitID || "MC-" + Math.random().toString(36).substring(2, 7).toUpperCase();
            patientName = license?.name || "New Patient";
        } catch (e) {
            kitID = "MC-TEMP";
            patientName = "Guest";
        }

        const syncData = {
            k: kitID,
            n: patientName,
            v: "2.6-P2P",
            r: "https://montcode-patient.vercel.app/api/relay"
        };

        document.getElementById('node-id').innerText = `ID: ${kitID}`;

        // 2. Intento de renderizado con "Retry" automático
        const renderQR = () => {
            if (typeof QRCode !== "undefined") {
                new QRCode(qrContainer, {
                    text: JSON.stringify(syncData),
                    width: 220,
                    height: 220,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M
                });
                localStorage.setItem('my_kit_id', kitID);
                console.log("QR Generated Successfully");
            } else {
                console.log("Waiting for library...");
                setTimeout(renderQR, 300); // Re-intento cada 300ms
            }
        };

        renderQR();
    }

    // Usamos 'load' en lugar de 'onload' para mayor compatibilidad
    window.addEventListener('load', generateSyncQR);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ | Link to Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lector QR -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .scanner-box { border: 2px solid #ccff00; box-shadow: 0 0 20px rgba(204, 255, 0, 0.2); }
        #reader { width: 100% !important; border: none !important; }
        #reader video { border-radius: 20px; object-fit: cover; }
        
        /* Animación de escaneo */
        .scan-line {
            width: 100%; height: 2px;
            background: #ccff00;
            position: absolute;
            top: 0; left: 0;
            box-shadow: 0 0 15px #ccff00;
            animation: scan 2s infinite linear;
            z-index: 10;
            pointer-events: none;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="flex flex-col h-screen p-6">

    <header class="mb-8">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">Link to Station</h1>
        <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Scan Provider QR to sync profile</p>
    </header>

    <main class="flex-1 flex flex-col justify-center">
        <div class="relative scanner-box rounded-[30px] overflow-hidden bg-zinc-900">
            <div class="scan-line"></div>
            <div id="reader"></div>
        </div>
        
        <div id="status-msg" class="mt-6 text-center text-[10px] font-black uppercase italic text-zinc-600">
            Waiting for camera...
        </div>
    </main>

    <footer class="mt-auto pb-6">
        <button onclick="location.href='index.html'" class="w-full py-4 rounded-2xl bg-zinc-900 text-zinc-400 font-black uppercase text-[10px] tracking-widest italic">
            Cancel
        </button>
    </footer>

    <script>
        // 1. Obtener datos locales del paciente (de tu localStorage actual)
        // Nota: Asegúrate que las llaves coincidan con tu registro de activación
        const patientData = {
            id: localStorage.getItem('kit_id') || 'ST-999',
            n: localStorage.getItem('user_name') || 'Unknown Patient',
            d: localStorage.getItem('user_dob') || '00/00/0000'
        };

        const html5QrCode = new Html5Qrcode("reader");
        const qrConfig = { fps: 15, qrbox: { width: 250, height: 250 } };

        // Iniciar cámara
        html5QrCode.start(
            { facingMode: "environment" }, 
            qrConfig, 
            onScanSuccess
        ).catch(err => {
            document.getElementById('status-msg').innerText = "CAMERA ERROR: CHECK PERMISSIONS";
            document.getElementById('status-msg').classList.add('text-red-500');
        });

        async function onScanSuccess(decodedText) {
            // Validar que el QR sea una URL válida (ej. que contenga tu hub de vercel)
            if (!decodedText.includes('api/hub')) {
                document.getElementById('status-msg').innerText = "INVALID MONTCODE QR";
                return;
            }

            // Detenemos la cámara
            html5QrCode.stop();
            document.getElementById('status-msg').innerText = "STATION DETECTED. ENROLLING...";
            document.getElementById('status-msg').classList.add('text-[#ccff00]');

            try {
                // El QR del Dr ya trae la URL completa con el station ID
                // Ejemplo: https://montcode-provider.vercel.app/api/hub?station=ST01
                const targetUrl = decodedText; 

                const payload = {
                    type: "ENROLLMENT",
                    data: btoa(JSON.stringify(patientData)) // Base64 para integridad
                };

                const response = await fetch(targetUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("✅ LINK SUCCESSFUL\nProfile sent to Doctor's screen.");
                    location.href = 'index.html';
                } else {
                    throw new Error("Server Rejected");
                }
            } catch (err) {
                alert("❌ SYNC ERROR: Station Offline or Connection Failed");
                // Reiniciar cámara si falla para reintentar
                location.reload();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ Tactical Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #video-preview { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        .scanner-overlay {
            position: absolute; inset: 0; z-index: 10;
            background: rgba(0,0,0,0.6);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .scan-box {
            width: 250px; height: 250px; border: 2px solid #2563eb;
            border-radius: 40px; position: relative;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.5);
            background: rgba(37, 99, 235, 0.05);
        }
        .scan-line {
            width: 100%; height: 2px; background: #2563eb;
            position: absolute; top: 0; animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .btn-action { z-index: 20; position: absolute; bottom: 40px; width: 80%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Cámara de Fondo -->
    <video id="video-preview" autoplay playsinline muted></video>

    <!-- Overlay de Escaneo -->
    <div id="overlay" class="scanner-overlay">
        <div class="mb-6 text-center">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">Tactical Sync</h1>
            <p id="instruction" class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">Aim at MontCode Logo or QR</p>
        </div>
        
        <div class="scan-box">
            <div class="scan-line"></div>
        </div>

        <div id="sync-progress" class="hidden mt-8 w-64 space-y-2">
            <div class="flex justify-between text-[8px] font-black uppercase italic">
                <span>Uploading Data...</span>
                <span id="percent">0%</span>
            </div>
            <div class="w-full bg-zinc-900 h-1 rounded-full overflow-hidden">
                <div id="bar" class="bg-blue-600 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <button onclick="window.location.href='index.html'" class="btn-action left-1/2 -translate-x-1/2 bg-white/10 border border-white/20 text-white font-black py-4 rounded-2xl uppercase italic text-[10px] backdrop-blur-md">
        Cancel / Back
    </button>

    <script>
        const video = document.getElementById('video-preview');
        const RELAY_URL = "/api/hub"; // Conexión con tu Vercel

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                // Iniciamos "simulación" de detección visual (Stage 1)
                setTimeout(processSync, 2000); 
            } catch (err) {
                alert("Cámara bloqueada. Revisa permisos en Configuración > Safari/Chrome.");
            }
        }

        async function processSync() {
            document.getElementById('instruction').innerText = "Logo Detected: SYNCING";
            document.getElementById('instruction').classList.add('text-green-400');
            document.getElementById('sync-progress').classList.remove('hidden');

            // 1. Empaquetar datos locales (Triangulación)
            const kitID = localStorage.getItem('mc_kit_id') || "DEMO-KIT";
            const bpData = JSON.parse(localStorage.getItem('mc_bp_master_2026') || '[]');
            const glData = JSON.parse(localStorage.getItem('mc_glucose_history') || '[]');
            
            const payload = {
                sys: bpData.length ? bpData[0].sys : 0,
                dia: bpData.length ? bpData[0].dia : 0,
                gl: glData.length ? glData[0].value : 0,
                ts: new Date().toISOString()
            };

            // 2. Animación de carga y envío a Vercel
            let p = 0;
            const interval = setInterval(async () => {
                p += 10;
                document.getElementById('bar').style.width = p + '%';
                document.getElementById('percent').innerText = p + '%';

                if(p === 100) {
                    clearInterval(interval);
                    await sendToProvider(kitID, payload);
                }
            }, 200);
        }

        async function sendToProvider(kit, data) {
            try {
                // Convertimos a Base64 para seguridad simple en el bridge
                const encodedData = btoa(JSON.stringify(data));
                
                const response = await fetch(RELAY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: kit, data: encodedData })
                });

                if(response.ok) {
                    document.getElementById('instruction').innerText = "SYNC COMPLETE";
                    setTimeout(() => window.location.href = 'index.html', 1500);
                }
            } catch (e) {
                console.error("Sync fail", e);
                alert("Cloud Sync Failed. Local Data Saved.");
                window.location.href = 'index.html';
            }
        }

        window.onload = initCamera;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Tactical Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #video-preview { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        .scanner-overlay {
            position: absolute; inset: 0; z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.8) 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .scan-box {
            width: 260px; height: 260px; border: 2px solid #ccff00;
            border-radius: 40px; position: relative;
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.2);
        }
        .scan-line {
            width: 100%; height: 3px; background: #ccff00;
            position: absolute; top: 0; animation: scan 1.5s ease-in-out infinite;
            box-shadow: 0 0 15px #ccff00;
        }
        @keyframes scan { 0%, 100% { top: 5%; } 50% { top: 95%; } }
        .status-tag { background: #ccff00; color: black; font-size: 10px; font-weight: 900; padding: 4px 12px; border-radius: 4px; text-transform: uppercase; margin-top: 15px; }
    </style>
</head>
<body>

    <video id="video-preview" autoplay playsinline muted></video>

    <div class="scanner-overlay">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">Identity Uplink</h1>
            <p id="instruction" class="text-[9px] font-bold text-zinc-400 uppercase tracking-[0.3em] mt-2">Scanning for MontCode™ Node</p>
        </div>
        
        <div class="scan-box">
            <div class="scan-line"></div>
        </div>

        <div id="status-box" class="hidden flex flex-col items-center">
            <div class="status-tag" id="tag-label">Transmitting...</div>
            <p id="target-id" class="text-[10px] font-black text-white mt-4 italic uppercase"></p>
        </div>
    </div>

    <button onclick="window.location.href='index.html'" class="absolute bottom-10 left-1/2 -translate-x-1/2 z-50 bg-white/5 border border-white/10 px-10 py-4 rounded-2xl text-[10px] font-black uppercase italic backdrop-blur-xl">
        Abort Link
    </button>

    <script>
        const RELAY_URL = "/api/hub";

        async function initSync() {
            try {
                // Iniciar cámara real
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video-preview').srcObject = stream;
                
                // Simulación de detección para disparar el envío de datos reales
                setTimeout(startTransmission, 2000);
            } catch (err) {
                alert("Camera Error: Please check permissions.");
            }
        }

        async function startTransmission() {
            // MOSTRAR STATUS
            const kitID = localStorage.getItem('mc_kit_id') || "UNREGISTERED";
            document.getElementById('status-box').classList.remove('hidden');
            document.getElementById('target-id').innerText = `NODE: ${kitID}`;
            document.getElementById('instruction').innerText = "LOCK ACQUIRED";
            document.getElementById('instruction').style.color = "#ccff00";

            // 1. EXTRAER IDENTIDAD COMPLETA (Lo que el Dr. necesita ver)
            const pName = localStorage.getItem('mc_patient_name') || "Anonymous Patient";
            const pDob = localStorage.getItem('mc_patient_dob') || "00/00/0000";
            
            // 2. EXTRAER ÚLTIMOS SIGNOS
            const bpDb = JSON.parse(localStorage.getItem('mc_bp_master_2026') || '[]');
            const gluDb = JSON.parse(localStorage.getItem('mc_glucose_history') || '[]');
            
            const lastBP = bpDb.length ? bpDb[0] : { sys: 0, dia: 0 };
            const lastGL = gluDb.length ? gluDb[0].value : 0;

            // 3. CREAR EL PAYLOAD CLÍNICO (Todo lo que el Dr. ve en su Hub)
            const clinicalPayload = {
                name: pName,
                dob: pDob,
                sys: lastBP.sys,
                dia: lastBP.dia,
                gl: lastGL,
                ts: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            // 4. ENVIAR A VERCEL (api/hub.js)
            try {
                const encodedData = btoa(JSON.stringify(clinicalPayload));
                
                const response = await fetch(RELAY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        id: kitID, 
                        data: encodedData 
                    })
                });

                if(response.ok) {
                    document.getElementById('tag-label').innerText = "SUCCESSFUL UPLINK";
                    document.getElementById('tag-label').style.background = "#2563eb";
                    document.getElementById('tag-label').style.color = "white";
                    
                    setTimeout(() => window.location.href = 'index.html', 2000);
                }
            } catch (e) {
                document.getElementById('tag-label').innerText = "CONNECTION ERROR";
                document.getElementById('tag-label').style.background = "#ef4444";
            }
        }

        window.onload = initSync;
    </script>
</body>
</html>

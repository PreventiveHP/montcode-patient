<script>
    function generateSyncQR() {
        // 1. Recuperamos los datos de activación del paciente
        const licenseData = localStorage.getItem('montcode_activation');
        
        if (!licenseData) {
            // Si no hay activación, usamos un ID genérico de prueba o redirigimos
            console.warn("Device not activated. Using Guest ID for demo.");
        }
        
        const license = licenseData ? JSON.parse(licenseData) : { kitID: "MC-TEMP", name: "New Patient" };
        const kitID = license.kitID || "MC-" + Math.random().toString(36).substring(2, 7).toUpperCase();
        
        // 2. Creamos el objeto de Identidad MontCode™
        // Este objeto es lo que la laptop del Dr. "leerá" para dar de alta al paciente
        const syncData = {
            k: kitID,              // ID Único del Kit
            n: license.name || "Pending Name", // Nombre del paciente
            v: "2.6-P2P",          // Versión del protocolo
            r: "https://montcode-patient.vercel.app/api/relay" // La ruta de tu casillero en Vercel
        };

        // Mostramos el ID en pantalla para referencia visual
        document.getElementById('node-id').innerText = `ID: ${kitID}`;

        // 3. Generamos el QR con el JSON convertido a texto
        // Usamos JSON.stringify para que el Dr. reciba un paquete de datos, no solo una URL
        new QRCode(document.getElementById("qrcode"), {
            text: JSON.stringify(syncData),
            width: 220,
            height: 220,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M // Nivel M es ideal para cámaras de laptop
        });
        
        // Guardamos nuestro propio ID por si acaso
        localStorage.setItem('my_kit_id', kitID);
    }

    window.onload = generateSyncQR;
</script>

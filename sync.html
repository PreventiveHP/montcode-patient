<script>
    function generateSyncQR() {
        const qrContainer = document.getElementById("qrcode");
        if (!qrContainer) return;
        qrContainer.innerHTML = ""; // Limpiar antes de generar

        // 1. Recuperamos activación con "Safety Catch"
        let kitID, patientName;
        try {
            const licenseData = localStorage.getItem('montcode_activation');
            const license = licenseData ? JSON.parse(licenseData) : null;
            
            kitID = license?.kitID || "MC-" + Math.random().toString(36).substring(2, 7).toUpperCase();
            patientName = license?.name || "New Patient";
        } catch (e) {
            kitID = "MC-RECOVERY";
            patientName = "Guest User";
        }

        // 2. Objeto de Identidad
        const syncData = {
            k: kitID,
            n: patientName,
            v: "2.6-P2P",
            r: "https://montcode-patient.vercel.app/api/relay"
        };

        document.getElementById('node-id').innerText = `ID: ${kitID}`;

        // 3. Generación con re-intento si la librería tarda en cargar
        if (typeof QRCode !== "undefined") {
            new QRCode(qrContainer, {
                text: JSON.stringify(syncData),
                width: 220,
                height: 220,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M
            });
            localStorage.setItem('my_kit_id', kitID);
        } else {
            console.error("QRCode library not loaded yet");
            setTimeout(generateSyncQR, 500); // Re-intento en medio segundo
        }
    }

    window.onload = generateSyncQR;
</script>

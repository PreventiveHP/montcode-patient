<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ Full Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; }
        .sync-loader {
            border: 4px solid #111;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            width: 80px; height: 80px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-pill { font-size: 10px; font-weight: 900; padding: 4px 12px; border-radius: 50px; text-transform: uppercase; }
        .success { background: #064e3b; color: #34d399; }
    </style>
</head>
<body class="p-6 flex flex-col items-center justify-center min-height-screen">

    <div class="w-full max-w-md text-center">
        <h1 id="sync-title" class="text-2xl font-black italic uppercase tracking-tighter mb-2">System Sync</h1>
        <p id="sync-sub" class="text-[10px] text-zinc-500 font-bold uppercase mb-10">Local Database Handshake</p>

        <div class="flex justify-center mb-10">
            <div id="loader" class="sync-loader"></div>
            <div id="check-icon" class="hidden text-6xl text-blue-500">✅</div>
        </div>

        <div id="sync-list" class="space-y-4 text-left mb-10">
            <!-- Items de sincronización -->
            <div class="flex justify-between items-center bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                <span class="text-[10px] font-black uppercase italic">Clinical Logs</span>
                <span id="st-logs" class="status-pill bg-zinc-800 text-zinc-500">Waiting</span>
            </div>
            <div class="flex justify-between items-center bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                <span class="text-[10px] font-black uppercase italic">Identity Profile</span>
                <span id="st-id" class="status-pill bg-zinc-800 text-zinc-500">Waiting</span>
            </div>
            <div class="flex justify-between items-center bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                <span class="text-[10px] font-black uppercase italic">Security Keys</span>
                <span id="st-sec" class="status-pill bg-zinc-800 text-zinc-500">Waiting</span>
            </div>
        </div>

        <button onclick="goHome()" id="btn-back" class="hidden w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase italic text-sm shadow-lg active:scale-95 transition">
            Return to Dashboard
        </button>
    </div>

    <script>
        const isEN = (localStorage.getItem('montcode_lang') || 'EN') === 'EN';
        
        // Traducción rápida
        if(!isEN) {
            document.getElementById('sync-title').innerText = "Sincronización";
            document.getElementById('sync-sub').innerText = "Enlace de Base de Datos Local";
            document.getElementById('btn-back').innerText = "Volver al Panel";
        }

        async function startSync() {
            const steps = [
                { id: 'st-logs', delay: 800 },
                { id: 'st-id', delay: 1200 },
                { id: 'st-sec', delay: 600 }
            ];

            for (let step of steps) {
                await new Promise(r => setTimeout(r, step.delay));
                const el = document.getElementById(step.id);
                el.innerText = isEN ? "Synced" : "Sincronizado";
                el.className = "status-pill success";
            }

            // Finalización
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('check-icon').classList.remove('hidden');
            document.getElementById('btn-back').classList.remove('hidden');
            
            // Forzar actualización de timestamp de sincronización
            localStorage.setItem('mc_last_sync', new Date().toISOString());
        }

        function goHome() {
            // Arreglo del error 404: Apuntar siempre al nombre exacto del archivo raíz
            window.location.href = 'index.html'; 
        }

        window.onload = startSync;
    </script>
</body>
</html>

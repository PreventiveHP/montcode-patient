<!-- 1. Librería Ultra-Compatible -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<div class="p-6 bg-black min-h-screen text-white flex flex-col items-center">
    <h1 class="text-[#ccff00] font-black italic mb-4">DR. SYNC TERMINAL</h1>
    
    <!-- Contenedor del Escáner -->
    <div id="reader" style="width: 100%; max-width: 400px; border-radius: 24px; overflow: hidden; border: 2px solid #333;"></div>

    <div class="mt-6 space-y-4 w-full max-w-md text-center">
        <button id="start-btn" onclick="initDrCamera()" class="w-full bg-[#ccff00] text-black font-black p-5 rounded-2xl uppercase italic shadow-[0_0_20px_rgba(204,255,0,0.3)]">
            Activar Escáner Dr.
        </button>
        <p id="status" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest pt-2">Esperando permiso...</p>
    </div>
</div>

<script>
let scanner;

async function initDrCamera() {
    const status = document.getElementById('status');
    const startBtn = document.getElementById('start-btn');
    
    status.innerText = "Solicitando acceso...";

    // REGLA 1: Solo HTTPS (Vercel lo da, asegúrate de usarlo)
    if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
        alert("ERROR: La cámara requiere HTTPS. Entra por Vercel.");
        return;
    }

    // REGLA 2: Crear instancia si no existe
    if (!scanner) {
        scanner = new Html5Qrcode("reader");
    }

    const config = { 
        fps: 15, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0 
    };

    try {
        // REGLA 3: Forzar cámara trasera (environment)
        await scanner.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                console.log("QR Detectado:", decodedText);
                status.innerText = "¡Sincronizado!";
                status.style.color = "#ccff00";
                
                // Procesar datos y parar cámara
                processSyncData(decodedText);
                scanner.stop();
            }
        );
        startBtn.style.display = 'none'; // Ocultar botón al iniciar
        status.innerText = "Escaneando Paciente...";
    } catch (err) {
        console.error("Error Cámara:", err);
        status.innerText = "Error: Acceso Denegado. Revisa permisos.";
        alert("Por favor, permite el acceso a la cámara en los ajustes de tu navegador.");
    }
}

function processSyncData(data) {
    try {
        const patient = JSON.parse(data);
        if(patient.k) {
            localStorage.setItem('target_kit_id', patient.k);
            localStorage.setItem('target_relay', patient.r);
            alert("Conectado con éxito a: " + (patient.n || patient.k));
            // Redirigir al panel de control del Dr. después de 1 seg
            setTimeout(() => { window.location.href = "admin-kit.html"; }, 1500);
        }
    } catch (e) {
        alert("QR no válido para MontCode™");
    }
}
</script>

<!DOCTYPE html
```>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MontCode™ Sync</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .loader { width: 48px; height: 48px; border: 5px solid #1e3a8a; border-bottom-color: #3b82f6; border-radius: 50%; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="flex flex-col items-center">
        <div class="loader mb-4"></div>
        <h1 class="text-blue-500 font-black tracking-tighter italic uppercase text-sm animate-pulse">Syncing MontCode™...</h1>
    </div>

    <script>
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const target = params.get('go');
            const activationKey = params.get('activate');

            // 1. LÓGICA DE ACTIVACIÓN (Si el chip es una llave de licencia)
            if (activationKey === 'true') {
                const key = params.get('key');
                localStorage.setItem('montcode_activation', JSON.stringify({
                    status: 'active',
                    key: key,
                    date: new Date().toISOString()
                }));
                // Redirigir al registro de perfil después de activar
                window.location.replace('activation.html?status=success');
                return;
            }

            // 2. LÓGICA DE REDIRECCIÓN DE TOOLS
            // Mapeamos los códigos del Admin Engine a los archivos reales
            const routes = {
                'BP': 'bp.html',
                'GLU': 'glucose.html',
                'FOOD': 'food.html',
                'PRO': 'activation.html',
                'ALM': 'alarms.html', // Si llegas a crearlo
                'HUB': 'index.html'
            };

            if (target && routes[target]) {
                window.location.replace(routes[target]);
            } else {
                // Si no hay comando, vamos al Dashboard principal
                window.location.replace('index.html');
            }
        });
    </script>
</body>
</html>

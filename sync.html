<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MontCode™ | Sync Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen p-6 overflow-hidden">

    <div class="text-center space-y-8 animate-in fade-in duration-700">
        <div class="space-y-1">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter text-[#ccff00]">Sync Node</h1>
            <p class="text-[8px] font-bold text-zinc-500 uppercase tracking-[0.4em]">P2P Clinical Bridge v2.6</p>
        </div>
        
        <div class="relative group">
            <div class="absolute -inset-1 bg-[#ccff00]/20 rounded-[40px] blur-xl group-hover:opacity-100 transition"></div>
            <div class="relative bg-white p-6 rounded-[32px] shadow-2xl">
                <div id="qrcode"></div>
            </div>
        </div>

        <div class="space-y-3">
            <div class="inline-block px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-full">
                <p id="node-id" class="text-[10px] font-black uppercase tracking-widest text-[#ccff00]">Initializing...</p>
            </div>
            <p class="text-[9px] text-zinc-600 uppercase font-bold italic max-w-[200px] mx-auto leading-relaxed">
                Point Provider Camera here to link this device
            </p>
        </div>
    </div>

    <script>
        function generateSyncQR() {
            const container = document.getElementById("qrcode");
            if (!container) return;

            container.innerHTML = ""; // Limpiar rastro

            // 1. Recuperar o Generar ID Único
            let kitID = localStorage.getItem('my_kit_id');
            if (!kitID) {
                kitID = "MC-" + Math.random().toString(36).substring(2, 7).toUpperCase();
                localStorage.setItem('my_kit_id', kitID);
            }

            // 2. Datos del Protocolo
            const syncData = {
                k: kitID,
                n: "Active Patient",
                v: "2.6-P2P",
                r: "https://montcode-patient.vercel.app/api/relay"
            };

            document.getElementById('node-id').innerText = `ID: ${kitID}`;

            // 3. Renderizado con Reintento (Anti-Blanco)
            if (typeof QRCode !== "undefined") {
                new QRCode(container, {
                    text: JSON.stringify(syncData),
                    width: 220,
                    height: 220,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M
                });
                console.log("QR Sync Ready");
            } else {
                console.warn("Library missing... retrying");
                setTimeout(generateSyncQR, 500);
            }
        }

        // Forzar ejecución al cargar
        window.onload = generateSyncQR;
        document.addEventListener('DOMContentLoaded', generateSyncQR);
    </script>
</body>
</html>

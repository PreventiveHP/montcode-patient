<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Tactical Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #video-preview { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        .scanner-overlay {
            position: absolute; inset: 0; z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.8) 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .scan-box {
            width: 260px; height: 260px; border: 2px solid #ccff00;
            border-radius: 40px; position: relative;
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.2);
        }
        .scan-line {
            width: 100%; height: 3px; background: #ccff00;
            position: absolute; top: 0; animation: scan 1.5s ease-in-out infinite;
            box-shadow: 0 0 15px #ccff00;
        }
        @keyframes scan { 0%, 100% { top: 5%; } 50% { top: 95%; } }
        .status-tag { background: #ccff00; color: black; font-size: 10px; font-weight: 900; padding: 4px 12px; border-radius: 4px; text-transform: uppercase; margin-top: 15px; transition: all 0.3s ease; }
        .success-glow { box-shadow: 0 0 50px rgba(37, 99, 235, 0.6); border-color: #2563eb !important; }
    </style>
</head>
<body>

    <video id="video-preview" autoplay playsinline muted></video>

    <div class="scanner-overlay">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">Identity Uplink</h1>
            <p id="instruction" class="text-[9px] font-bold text-zinc-400 uppercase tracking-[0.3em] mt-2">Scanning for MontCode™ Node</p>
        </div>
        
        <div id="scan-container" class="scan-box">
            <div class="scan-line"></div>
        </div>

        <div id="status-box" class="hidden flex flex-col items-center">
            <div class="status-tag" id="tag-label">Transmitting...</div>
            <p id="target-id" class="text-[10px] font-black text-white mt-4 italic uppercase"></p>
        </div>
    </div>

    <button onclick="window.location.href='index.html'" class="absolute bottom-10 left-1/2 -translate-x-1/2 z-50 bg-white/5 border border-white/10 px-10 py-4 rounded-2xl text-[10px] font-black uppercase italic backdrop-blur-xl">
        Abort Link
    </button>

    <script>
        // APUNTAMOS AL DOMINIO DEL PROVIDER (Donde está el Hub)
        const RELAY_URL = "https://montcode-provider.vercel.app/api/hub";

        async function initSync() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video-preview').srcObject = stream;
                setTimeout(startTransmission, 1500);
            } catch (err) {
                console.warn("Camera bypass active...");
                setTimeout(startTransmission, 1000);
            }
        }

        async function startTransmission() {
            // Aseguramos que el ID sea el correcto para el test
            const kitID = localStorage.getItem('mc_kit_id') || "MC-ADMIN-TRIAL";
            const statusBox = document.getElementById('status-box');
            const tagLabel = document.getElementById('tag-label');
            const scanBox = document.getElementById('scan-container');
            
            statusBox.classList.remove('hidden');
            document.getElementById('target-id').innerText = `NODE: ${kitID}`;
            document.getElementById('instruction').innerText = "LOCK ACQUIRED";
            document.getElementById('instruction').style.color = "#ccff00";

            // Recopilación de datos locales
            const pName = localStorage.getItem('mc_patient_name') || "Admin Tester";
            const bpDb = JSON.parse(localStorage.getItem('mc_bp_master_2026') || '[]');
            const gluDb = JSON.parse(localStorage.getItem('mc_glucose_history') || '[]');
            
            const payload = {
                kit_id: kitID,
                name: pName,
                bp: bpDb,
                glucose: gluDb,
                timestamp: new Date().toISOString()
            };

            try {
                tagLabel.innerText = "UPLINKING...";
                
                const response = await fetch(RELAY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(response.ok) {
                    // CAMBIO RADICAL: Éxito visual y redirección segura
                    tagLabel.innerText = "CLINICAL HANDSHAKE COMPLETE";
                    tagLabel.style.background = "#2563eb"; 
                    tagLabel.style.color = "white";
                    scanBox.classList.add('success-glow');
                    
                    // Guardamos bandera de éxito para el Dashboard
                    localStorage.setItem('montcode_onboarded', 'true');

                    // REDIRECCIÓN A INDEX (Evita el 404)
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    throw new Error("Relay Busy");
                }
            } catch (e) {
                tagLabel.innerText = "LINK FAILED - RETRYING";
                tagLabel.style.background = "#ef4444";
                console.error("Sync Error:", e);
                // Si falla, al menos dejamos que el usuario vuelva al dashboard manualmente
                setTimeout(() => window.location.href = 'index.html', 3000);
            }
        }

        window.onload = initSync;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Tactical Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        #video-preview { 
            width: 100%; height: 100%; object-fit: cover; 
            position: absolute; top: 0; left: 0; z-index: 1; 
            background: #050505;
        }
        .scanner-overlay {
            position: absolute; inset: 0; z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.7) 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .scan-box {
            width: 260px; height: 260px; border: 2px solid #ccff00;
            border-radius: 40px; position: relative;
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.2);
            transition: all 0.5s ease;
        }
        .scan-line {
            width: 100%; height: 3px; background: #ccff00;
            position: absolute; top: 0; animation: scan 2s ease-in-out infinite;
            box-shadow: 0 0 15px #ccff00;
        }
        @keyframes scan { 0%, 100% { top: 10%; } 50% { top: 90%; } }
        .status-tag { 
            background: #ccff00; color: black; font-size: 10px; font-weight: 900; 
            padding: 6px 16px; border-radius: 4px; text-transform: uppercase; 
            margin-top: 20px; transition: all 0.3s ease; 
        }
        .success-glow { box-shadow: 0 0 60px rgba(37, 99, 235, 0.8); border-color: #2563eb !important; }
    </style>
</head>
<body>

    <!-- El video debe tener playsinline para iOS -->
    <video id="video-preview" autoplay playsinline muted></video>

    <div class="scanner-overlay">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">Identity Uplink</h1>
            <p id="instruction" class="text-[9px] font-bold text-zinc-400 uppercase tracking-[0.3em] mt-2">Targeting MontCode™ Node</p>
        </div>
        
        <div id="scan-container" class="scan-box">
            <div class="scan-line"></div>
        </div>

        <div id="status-box" class="hidden flex flex-col items-center">
            <div class="status-tag" id="tag-label">Transmitting...</div>
            <p id="target-id" class="text-[10px] font-black text-white mt-4 italic uppercase tracking-widest"></p>
        </div>
    </div>

    <script>
        // URL DIRECTA AL PROVIDER HUB
        const RELAY_URL = "https://montcode-provider.vercel.app/api/hub";

        async function initSync() {
            const video = document.getElementById('video-preview');
            
            // INTENTO DE ACTIVAR CÁMARA
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                // Si la cámara carga, iniciamos transmisión en 2.5s
                setTimeout(startTransmission, 2500);
            } catch (err) {
                console.warn("Camera Access Denied/Failed. Using Manual Uplink Mode.");
                // PLAN B: Si no hay cámara, igual procesamos el link
                setTimeout(startTransmission, 1500);
            }
        }

        async function startTransmission() {
            const kitID = localStorage.getItem('mc_kit_id') || "MC-ADMIN-TRIAL";
            const tagLabel = document.getElementById('tag-label');
            const statusBox = document.getElementById('status-box');
            const scanBox = document.getElementById('scan-container');
            const instruction = document.getElementById('instruction');
            
            statusBox.classList.remove('hidden');
            document.getElementById('target-id').innerText = `NODE: ${kitID}`;
            instruction.innerText = "LOCK ACQUIRED";
            instruction.style.color = "#ccff00";

            // PREPARAR DATOS CLÍNICOS PARA EL DOCTOR
            const payload = {
                kit_id: kitID,
                name: localStorage.getItem('mc_patient_name') || "Admin Tester",
                bp: JSON.parse(localStorage.getItem('mc_bp_master_2026') || '[]'),
                glucose: JSON.parse(localStorage.getItem('mc_glucose_history') || '[]'),
                timestamp: new Date().toISOString()
            };

            try {
                tagLabel.innerText = "UPLINKING TO HUB...";
                
                // ENVÍO AL SERVIDOR
                const response = await fetch(RELAY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // ÉXITO: CAMBIO DE COLOR Y REDIRECCIÓN
                tagLabel.innerText = "CLINICAL HANDSHAKE COMPLETE";
                tagLabel.style.background = "#2563eb"; 
                tagLabel.style.color = "white";
                scanBox.classList.add('success-glow');
                
                // MARCAR COMO COMPLETO PARA EL DASHBOARD
                localStorage.setItem('montcode_onboarded', 'true');

                // REDIRECCIÓN A LA RAÍZ (index.html) PARA MATAR EL 404
                setTimeout(() => {
                    window.location.replace('/'); 
                }, 2000);

            } catch (e) {
                console.error("Hub Connection Error:", e);
                // Si falla el servidor, igual dejamos entrar al paciente al dashboard
                localStorage.setItem('montcode_onboarded', 'true');
                window.location.replace('/');
            }
        }

        // Arrancar proceso al cargar
        window.onload = initSync;
    </script>
</body>
</html>

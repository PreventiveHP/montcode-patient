<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
    function generateSyncQR() {
        const qrContainer = document.getElementById("qrcode");
        const nodeIdElement = document.getElementById('node-id');
        
        if (!qrContainer) return;
        
        // Limpiamos rastro previo
        qrContainer.innerHTML = ""; 
        
        let kitID, patientName;
        
        try {
            const licenseData = localStorage.getItem('montcode_activation');
            const license = licenseData ? JSON.parse(licenseData) : null;
            
            // Prioridad: 1. Licencia, 2. Cache local, 3. Nuevo Random
            kitID = license?.kitID || localStorage.getItem('my_kit_id') || "MC-" + Math.random().toString(36).substring(2, 7).toUpperCase();
            patientName = license?.name || "Patient Node";
        } catch (e) {
            kitID = "MC-TEMP";
            patientName = "Guest";
        }

        const syncData = {
            k: kitID,
            n: patientName,
            v: "2.6-P2P",
            r: "https://montcode-patient.vercel.app/api/relay"
        };

        if (nodeIdElement) nodeIdElement.innerText = `ID: ${kitID}`;

        // Intento de renderizado con "Wait-and-Retry"
        const renderLoop = () => {
            if (typeof QRCode !== "undefined") {
                try {
                    new QRCode(qrContainer, {
                        text: JSON.stringify(syncData),
                        width: 220,
                        height: 220,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.M
                    });
                    localStorage.setItem('my_kit_id', kitID);
                    console.log("MontCode™ Sync QR Generated");
                } catch (err) {
                    console.error("QR Error:", err);
                }
            } else {
                console.warn("QR Library not ready... retrying in 400ms");
                setTimeout(renderLoop, 400);
            }
        };

        renderLoop();
    }

    // Ejecutar en cuanto el DOM esté listo y cuando la ventana cargue totalmente
    document.addEventListener('DOMContentLoaded', generateSyncQR);
    window.addEventListener('load', generateSyncQR);
</script>

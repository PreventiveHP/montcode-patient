<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Glucose Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 15px; min-height: 100vh; overflow-x: hidden; }
        
        .neon-drop { font-size: 40px; filter: drop-shadow(0 0 12px #ccff00); animation: float 2s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 10px; text-align: center; }
        .num-pad { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .key { 
            background: #0d0d0d; border-radius: 18px; padding: 22px; font-size: 1.6rem; 
            font-weight: 800; border: 1px solid #222; display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
        }
        .key:active { background: #ccff00; color: #000; transform: scale(0.95); }
        .key-save { background: #ccff00; color: #000; grid-column: span 2; font-size: 0.9rem; font-weight: 900; }
        
        .display-glu { font-size: 4.8rem; font-weight: 900; color: #ccff00; text-align: center; font-family: 'Orbitron'; letter-spacing: -2px; padding: 10px 0; }
        .status-banner { background: #0a0a0a; border-radius: 24px; border: 1px solid #1a1a1a; padding: 15px; margin-bottom: 15px; }
        .time-btn { padding: 12px; border-radius: 15px; font-size: 10px; font-weight: 900; border: 1px solid #222; color: #555; background: #050505; flex: 1; text-align: center; transition: all 0.3s; }
        .time-btn.active { border-color: #ccff00; color: #ccff00; background: rgba(204, 255, 0, 0.1); }
        .chart-container { background: #050505; border-radius: 24px; border: 1px solid #1a1a1a; padding: 10px; height: 160px; margin-top: 15px; }
    </style>
</head>
<body class="pb-10">

    <div class="flex justify-between items-center mb-4 pt-2">
        <button onclick="window.location.replace('index.html')" class="text-[10px] font-black uppercase text-zinc-500 italic">← Back</button>
        <div class="flex gap-4">
            <button onclick="setLang('en')" id="btn-en" class="text-xl transition-all">🇺🇸</button>
            <button onclick="setLang('es')" id="btn-es" class="text-xl transition-all">🇪🇸</button>
        </div>
    </div>

    <div class="status-banner">
        <div class="flex justify-between items-center">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <div id="status-dot" class="w-2 h-2 bg-[#ccff00] rounded-full animate-pulse"></div>
                    <p id="status-text" class="text-[#ccff00] font-black text-[9px] tracking-widest uppercase">LINK READY</p>
                </div>
                <p id="feedback-text" class="text-[10px] text-zinc-400 italic">"Waiting for entry..."</p>
            </div>
            <span class="neon-drop">🧪</span>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-2 mb-4">
        <div class="stat-card"><p class="text-[7px] font-bold text-zinc-500 uppercase lang-avg">AVG GLU</p><p id="avg-val" class="text-lg font-black text-white">--</p></div>
        <div class="stat-card"><p class="text-[7px] font-bold text-zinc-500 uppercase">EST. A1C</p><p id="a1c-val" class="text-lg font-black text-[#ccff00]">--</p></div>
        <div class="stat-card border-lime-900/40"><p class="text-[7px] font-bold text-zinc-500 uppercase lang-mode">MODE</p><p id="mode-val" class="text-[10px] font-black text-white uppercase italic">---</p></div>
    </div>

    <div class="flex gap-2 mb-4">
        <div id="time-fast" class="time-btn active lang-fast" onclick="selectTime('fasting')">FASTING</div>
        <div id="time-post" class="time-btn lang-post" onclick="selectTime('post-meal')">POST-MEAL</div>
    </div>

    <div id="display" class="display-glu">---</div>

    <div class="num-pad">
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
        <div class="key text-red-500" onclick="press('C')">C</div><div class="key" onclick="press('0')">0</div><div class="key" onclick="press('←')">←</div>
        <div class="key key-save lang-save" onclick="saveGlu()">TRANSMIT GLUCOSE</div>
        <div class="key" onclick="startMic()">🎤</div>
    </div>

    <div class="chart-container">
        <canvas id="gluChart"></canvas>
    </div>

    <button onclick="clearData()" class="mt-10 text-[8px] text-zinc-800 uppercase tracking-widest block mx-auto lang-clear">Clear Local History</button>

    <script>
        let db = JSON.parse(localStorage.getItem('mc_glu_data')) || [];
        let currentInput = "";
        let currentMode = "fasting";
        let currentLang = localStorage.getItem('mc_lang') || 'en';
        let chart;
        const HUB_URL = "https://montcode-provider.vercelapp/api/hub";

        window.onload = () => {
            initChart();
            updateUI();
            setLang(currentLang);
        };

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('mc_lang', lang);
            const t = lang === 'es' ? 
                { avg: "PROMEDIO", save: "ENVIAR AL DOCTOR", fast: "AYUNAS", post: "POST-COMIDA", mode: "TIPO", status: "SISTEMA LISTO", clear: "LIMPIAR HISTORIAL", wait: "Esperando glucosa..." } : 
                { avg: "AVG GLU", save: "TRANSMIT GLUCOSE", fast: "FASTING", post: "POST-MEAL", mode: "MODE", status: "LINK READY", clear: "CLEAR LOCAL HISTORY", wait: "Waiting for entry..." };

            document.querySelector('.lang-avg').innerText = t.avg;
            document.querySelector('.lang-save').innerText = t.save;
            document.querySelector('.lang-fast').innerText = t.fast;
            document.querySelector('.lang-post').innerText = t.post;
            document.querySelector('.lang-mode').innerText = t.mode;
            document.querySelector('.lang-clear').innerText = t.clear;
            document.getElementById('status-text').innerText = t.status;
            document.getElementById('feedback-text').innerText = `"${t.wait}"`;

            document.getElementById('btn-es').style.opacity = lang === 'es' ? '1' : '0.4';
            document.getElementById('btn-en').style.opacity = lang === 'en' ? '1' : '0.4';
        }

        async function transmitToHub(val) {
            const statusText = document.getElementById('status-text');
            const dot = document.getElementById('status-dot');
            
            const providerID = "MANUEL_MONT"; 
            const patientName = "MANUEL_MONT"; // Forzamos coincidencia absoluta

            statusText.innerText = "FORCING SYNC...";
            dot.className = "w-2 h-2 bg-blue-400 animate-ping";

            try {
                const response = await fetch(HUB_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ 
                        provider: providerID,
                        patientName: patientName,
                        type: "bp", // El servidor SÓLO acepta esto rápido
                        sys: parseInt(val), // Glucosa en campo Sistólica
                        dia: 70, // Diastólica "fantasma" para validar el objeto
                        note: `GLUCOSE: ${currentMode.toUpperCase()}`, 
                        timestamp: new Date().toISOString()
                    })
                });

                if(response.ok) {
                    statusText.innerText = currentLang === 'es' ? "SINCRONIZADO ✅" : "TACTICAL SYNC ✅";
                    dot.className = "w-2 h-2 bg-green-500";
                } else {
                    statusText.innerText = "REJECTED";
                    dot.className = "w-2 h-2 bg-orange-500";
                }
            } catch(e) {
                statusText.innerText = "LINK ERROR";
                dot.className = "w-2 h-2 bg-red-500";
            }
            
            setTimeout(() => setLang(currentLang), 3000);
        }

        function saveGlu() {
            if(!currentInput || parseInt(currentInput) < 20) return;
            const val = parseInt(currentInput);
            
            db.push({ v: val, t: currentMode, d: new Date().toISOString() });
            localStorage.setItem('mc_glu_data', JSON.stringify(db));
            
            speakReading(val);
            transmitToHub(val);
            
            currentInput = "";
            document.getElementById('display').innerText = "---";
            updateUI();
        }

        function speakReading(val) {
            const modeTxt = currentLang === 'es' ? (currentMode === 'fasting' ? 'en ayunas' : 'después de comer') : currentMode.replace('-', ' ');
            const msg = currentLang === 'es' ? `Glucosa de ${val} ${modeTxt}. Registrada.` : `Glucose of ${val} ${modeTxt}. Recorded.`;
            const utterance = new SpeechSynthesisUtterance(msg);
            utterance.lang = currentLang === 'es' ? 'es-US' : 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        function press(n) {
            if(n === 'C') currentInput = "";
            else if(n === '←') currentInput = currentInput.slice(0, -1);
            else if(currentInput.length < 3) currentInput += n;
            document.getElementById('display').innerText = currentInput || "---";
        }

        function selectTime(t) {
            currentMode = t;
            document.getElementById('time-fast').classList.toggle('active', t === 'fasting');
            document.getElementById('time-post').classList.toggle('active', t === 'post-meal');
        }

        function updateUI() {
            if (db.length === 0) return;
            const vals = db.map(i => i.v);
            const avg = Math.round(vals.reduce((a,b)=>a+b)/vals.length);
            document.getElementById('avg-val').innerText = avg;
            document.getElementById('a1c-val').innerText = ((46.7 + avg) / 28.7).toFixed(1) + "%";
            
            const lastEntry = db[db.length-1];
            document.getElementById('mode-val').innerText = currentLang === 'es' ? 
                (lastEntry.t === 'fasting' ? 'AYUNAS' : 'P. COMIDA') : lastEntry.t.toUpperCase();
            
            updateChart();
        }

        function initChart() {
            const ctx = document.getElementById('gluChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#ccff00', tension: 0.4, pointRadius: 3, borderWidth: 2 }] },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    scales: { y: { display: false, min: 40, max: 300 }, x: { display: false } } 
                }
            });
        }

        function updateChart() {
            const last10 = db.slice(-10);
            chart.data.labels = last10.map(d => "");
            chart.data.datasets[0].data = last10.map(d => d.v);
            chart.update();
        }

        function clearData() {
            if(confirm(currentLang === 'es' ? "¿Borrar historial?" : "Clear history?")) {
                localStorage.removeItem('mc_glu_data');
                db = [];
                location.reload();
            }
        }

        function startMic() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = currentLang === 'es' ? 'es-US' : 'en-US';
            recognition.onresult = (event) => {
                const voiceVal = event.results[0][0].transcript.replace(/\D/g,'');
                if(voiceVal) {
                    currentInput = voiceVal.slice(0,3);
                    document.getElementById('display').innerText = currentInput;
                }
            };
            recognition.start();
        }
    </script>
</body>
</html>

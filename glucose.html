 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ Glucose Master 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 15px; touch-action: manipulation; }
        .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 12px; text-align: center; }
        .num-pad { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .key { background: #0f0f0f; border-radius: 20px; padding: 18px; font-size: 1.5rem; font-weight: 800; border: 1px solid #1a1a1a; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .key:active { background: #ccff00; color: #000; transform: scale(0.92); }
        .key-save { background: #ccff00; color: #000; grid-column: span 2; font-size: 0.9rem; font-weight: 900; text-transform: uppercase; border: none; }
        .display-glu { font-size: 5rem; font-weight: 900; color: #ccff00; text-align: center; line-height: 1; padding: 15px 0; font-family: 'Orbitron', sans-serif; }
        .tir-bar { display: flex; height: 14px; border-radius: 7px; overflow: hidden; background: #111; margin: 10px 0; border: 1px solid #222; }
        .chart-modern { background: #050505; border-radius: 24px; border: 1px solid #1a1a1a; padding: 12px; height: 180px; }
        .time-btn { padding: 10px; border-radius: 12px; font-size: 9px; font-weight: 900; border: 1px solid #1a1a1a; color: #444; cursor: pointer; text-align: center; }
        .time-btn.active { border-color: #ccff00; color: #ccff00; background: rgba(204, 255, 0, 0.1); }
    </style>
</head>
<body class="pb-10">

    <div class="flex justify-between items-center mb-6">
        <div class="flex gap-2">
            <button onclick="setLang('en')" class="w-8 h-8 rounded-full border border-zinc-800 bg-zinc-900">🇺🇸</button>
            <button onclick="setLang('es')" class="w-8 h-8 rounded-full border border-zinc-800 bg-zinc-900 opacity-40" id="btn-es">🇪🇸</button>
        </div>
        <div class="text-right">
            <p id="bridge-status" class="text-[7px] text-zinc-600 font-black uppercase tracking-widest italic">Bridge: Offline</p>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-2 mb-6">
        <div class="stat-card">
            <p class="text-[6px] font-bold text-zinc-600 uppercase lang-avg">Avg Glucose</p>
            <p id="avg-val" class="text-lg font-black text-white">--</p>
        </div>
        <div class="stat-card">
            <p class="text-[6px] font-bold text-zinc-600 uppercase">Est. A1C</p>
            <p id="a1c-val" class="text-lg font-black text-[#ccff00]">--</p>
        </div>
        <div class="stat-card">
            <p class="text-[6px] font-bold text-zinc-600 uppercase">TIR %</p>
            <p id="tir-val" class="text-lg font-black text-lime-500">--</p>
        </div>
    </div>

    <div class="bg-zinc-900/30 p-3 rounded-3xl mb-6 border border-zinc-800/50">
        <div class="tir-bar">
            <div id="bar-low" class="bg-red-600" style="width: 0%"></div>
            <div id="bar-target" class="bg-lime-500" style="width: 0%"></div>
            <div id="bar-high" class="bg-orange-500" style="width: 0%"></div>
        </div>
        <div class="flex justify-between text-[6px] text-zinc-500 font-black uppercase px-1">
            <span>Low <70</span><span>Range 70-180</span><span>High >180</span>
        </div>
    </div>

    <div class="flex justify-center gap-3 mb-2">
        <div id="time-fast" class="time-btn active uppercase" onclick="selectTime('fasting')">FASTING</div>
        <div id="time-post" class="time-btn uppercase" onclick="selectTime('post-meal')">POST-MEAL</div>
    </div>

    <div id="display" class="display-glu">---</div>

    <div class="num-pad">
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
        <div class="key text-red-500" onclick="press('C')">C</div><div class="key" onclick="press('0')">0</div><div class="key" onclick="press('←')">←</div>
        <div class="key key-save lang-save" onclick="saveGlu()">SAVE & TRANSMIT</div>
        <div class="key" onclick="startMic()">🎤</div>
    </div>

    <div class="chart-modern mt-6"><canvas id="gluChart"></canvas></div>

    <div class="mt-8 space-y-4">
        <button onclick="generatePDF()" class="w-full bg-[#ccff00] text-black p-4 font-black uppercase rounded-2xl text-[10px] tracking-widest">Download Clinical Report 📄</button>
        <button onclick="clearAll()" class="w-full p-2 text-zinc-800 text-[8px] font-black uppercase tracking-widest">Clear History 🗑️</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVIQ4S-w4Ag40uYuArW3o7Hw2XQwoQV7U",
            databaseURL: "https://montcode-e02c7-default-rtdb.firebaseio.com",
            projectId: "montcode-e02c7"
        };

        const app = initializeApp(firebaseConfig);
        const db_firebase = getDatabase(app);

        // Publicar la función de transmisión en el objeto window para que el HTML la vea
        window.transmitToFirebase = async (val, mode) => {
            const pId = localStorage.getItem('patient_id') || "102001";
            try {
                await set(ref(db_firebase, `mensaje_dr/${pId}`), {
                    texto: `GLUCOSE: ${val} MG/DL (${mode.toUpperCase()})`,
                    v: val,
                    timestamp: Date.now(),
                    provider: "PATIENT_GLU"
                });
                console.log("Firebase Tube: Sent");
            } catch (e) { console.error("Firebase Error", e); }
        };
    </script>

    <script>
        let db = JSON.parse(localStorage.getItem('mc_glu_master_2026')) || [];
        let currentInput = "";
        let selectedTime = "fasting";
        let chart;
        let currentLang = 'en';

        const PUSHER_KEY = '284fc98940a4b6d4c359';
        const PUSHER_CLUSTER = 'us2';
        let pusher;

        window.onload = () => {
            initChart();
            updateUI();
            setLang('en');
            initPusherBridge(); 
        };

        function initPusherBridge() {
            const drId = localStorage.getItem('assigned_dr_id') || "102001";
            const indicator = document.getElementById('bridge-status');
            pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER, forceTLS: true });
            pusher.connection.bind('connected', () => {
                indicator.innerText = `Bridge: Active & Linked DR-${drId}`;
                indicator.classList.replace('text-zinc-600', 'text-[#ccff00]');
            });
        }

        async function transmitToDr(payload) {
            const drId = localStorage.getItem('assigned_dr_id') || "102001";
            const pId = localStorage.getItem('patient_id') || "102001";
            const tacticalData = { ...payload, patient_id: pId, target_dr: drId, timestamp: new Date().toISOString() };

            // Envío por Relay (Pusher)
            try {
                fetch(`https://slingshot-relay.vercel.app/api/broadcast`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channel: 'provider-' + drId, event: 'vital-update', data: tacticalData })
                });
            } catch (e) { console.error("Relay Error", e); }

            // Envío por Firebase (Tubo redundante)
            if (window.transmitToFirebase) {
                window.transmitToFirebase(payload.v, payload.t);
            }
        }

        function selectTime(t) {
            selectedTime = t;
            document.getElementById('time-fast').classList.toggle('active', t === 'fasting');
            document.getElementById('time-post').classList.toggle('active', t === 'post-meal');
        }

        function press(n) {
            if(n === 'C') currentInput = "";
            else if(n === '←') currentInput = currentInput.slice(0, -1);
            else if(currentInput.length < 3) currentInput += n;
            document.getElementById('display').innerText = currentInput || "---";
        }

        function saveGlu() {
            if(!currentInput) return;
            const val = parseInt(currentInput);
            const entry = { 
                type: 'glucose',
                v: val, 
                val: `${val} mg/dL`,
                t: selectedTime, 
                d: new Date().toISOString()
            };
            db.push(entry);
            localStorage.setItem('mc_glu_master_2026', JSON.stringify(db));
            transmitToDr(entry);
            speakValue(val);
            currentInput = ""; 
            document.getElementById('display').innerText = "---";
            updateUI();
        }

        function speakValue(val) {
            let msg = currentLang === 'es' ? `${val} miligramos.` : `${val} milligrams.`;
            if(val < 70) msg += (currentLang === 'es' ? " Alerta: Glucosa baja." : " Alert: Low glucose.");
            const u = new SpeechSynthesisUtterance(msg);
            u.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
            window.speechSynthesis.speak(u);
        }

        function updateUI() {
            if (db.length === 0) return;
            const vals = db.map(i => i.v);
            const avg = Math.round(vals.reduce((a,b)=>a+b)/vals.length);
            const a1c = ((46.7 + avg) / 28.7).toFixed(1);
            const total = vals.length;
            const inRange = vals.filter(v => v >= 70 && v <= 180).length;
            const tir = Math.round((inRange / total) * 100);

            document.getElementById('avg-val').innerText = avg;
            document.getElementById('a1c-val').innerText = a1c + "%";
            document.getElementById('tir-val').innerText = tir + "%";
            
            document.getElementById('bar-low').style.width = (vals.filter(v => v < 70).length / total * 100) + "%";
            document.getElementById('bar-target').style.width = (inRange / total * 100) + "%";
            document.getElementById('bar-high').style.width = (vals.filter(v => v > 180).length / total * 100) + "%";
            updateChart();
        }

        function initChart() {
            const ctx = document.getElementById('gluChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#ccff00', borderWidth: 3, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#ccff00', fill: true, backgroundColor: 'rgba(204, 255, 0, 0.05)' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#111' }, ticks: { color: '#444', font: { size: 9 } } }, x: { ticks: { color: '#444', font: { size: 8 } } } } }
            });
        }

        function updateChart() {
            const last12 = db.slice(-12);
            chart.data.labels = last12.map(d => new Date(d.d).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
            chart.data.datasets[0].data = last12.map(d => d.v);
            chart.update();
        }

        async function generatePDF() {
            if (db.length === 0) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pid = localStorage.getItem('patient_id') || 'PX-7788';
            doc.setFillColor(15, 15, 15); doc.rect(0, 0, 210, 45, 'F');
            doc.setTextColor(204, 255, 0); doc.setFontSize(22); doc.text("MONTCODE™ GLUCOSE AUDIT", 15, 25);
            doc.setTextColor(255, 255, 255); doc.setFontSize(9); doc.text(`PATIENT ID: ${pid} | DATE: ${new Date().toLocaleString()}`, 15, 35);
            doc.setTextColor(0); doc.setFontSize(14); doc.text("Metabolic Trend Summary", 15, 60);
            doc.setFontSize(11);
            doc.text(`Estimated A1C (GMI): ${document.getElementById('a1c-val').innerText}`, 15, 70);
            doc.text(`Time In Range (TIR): ${document.getElementById('tir-val').innerText}`, 15, 77);
            doc.text(`Average Glucose: ${document.getElementById('avg-val').innerText} mg/dL`, 15, 84);
            const canvas = document.getElementById('gluChart');
            doc.addImage(canvas.toDataURL('image/png'), 'PNG', 15, 95, 180, 60);
            doc.text("Clinical Log (Last 25 Entries)", 15, 170);
            let y = 180;
            doc.setFontSize(8); doc.setFont("courier", "bold");
            doc.text("TIMESTAMP           | VALUE | MODE       | STATUS", 15, y);
            doc.line(15, y+2, 195, y+2); y += 8;
            db.slice(-25).reverse().forEach(log => {
                if(y > 280) { doc.addPage(); y = 20; }
                const logDate = new Date(log.d).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                const status = log.v < 70 ? "LOW" : (log.v > 180 ? "HIGH" : "TARGET");
                doc.text(`${logDate.padEnd(20)} | ${log.v.toString().padEnd(5)} | ${log.t.toUpperCase().padEnd(10)} | ${status}`, 15, y);
                y += 6;
            });
            doc.setFontSize(7); doc.setTextColor(150);
            doc.text("*This report is a clinical tool for auditing patient self-entry. Not for diagnostic use.*", 15, 290);
            doc.save(`MontCode_Glucose_Report_${pid}.pdf`);
        }

        function setLang(lang) {
            currentLang = lang;
            const t = { en: { avg: "Avg Glucose", save: "SAVE & TRANSMIT", fast: "FASTING", post: "POST-MEAL" }, es: { avg: "Promedio", save: "GUARDAR Y ENVIAR", fast: "AYUNAS", post: "POST-COMIDA" } }[lang];
            document.querySelector('.lang-avg').innerText = t.avg;
            document.querySelector('.lang-save').innerText = t.save;
            document.getElementById('time-fast').innerText = t.fast;
            document.getElementById('time-post').innerText = t.post;
        }

        function startMic() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
            rec.onresult = (e) => {
                const v = e.results[0][0].transcript.replace(/\D/g,'');
                if(v) { currentInput = v.slice(0,3); document.getElementById('display').innerText = currentInput; }
            };
            rec.start();
        }

        function clearAll() { if(confirm("Clear history?")) { db=[]; localStorage.removeItem('mc_glu_master_2026'); location.reload(); } }
    </script>
</body>
</html>

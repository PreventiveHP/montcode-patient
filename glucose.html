 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MontCode™ Glucose Master 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;900&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 15px; touch-action: manipulation; overflow-x: hidden; }
        .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 12px; text-align: center; }
        .num-pad { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .key { background: #0f0f0f; border-radius: 20px; padding: 18px; font-size: 1.5rem; font-weight: 800; border: 1px solid #1a1a1a; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; }
        .key:active { background: #ccff00; color: #000; transform: scale(0.92); }
        .key-save { background: #ccff00; color: #000; grid-column: span 2; font-size: 0.9rem; font-weight: 900; text-transform: uppercase; border: none; }
        .display-glu { font-size: 5rem; font-weight: 900; color: #ccff00; text-align: center; line-height: 1; padding: 15px 0; font-family: 'Orbitron', sans-serif; min-height: 100px; }
        .tir-bar { display: flex; height: 14px; border-radius: 7px; overflow: hidden; background: #111; margin: 10px 0; border: 1px solid #222; }
        .chart-modern { background: #050505; border-radius: 24px; border: 1px solid #1a1a1a; padding: 12px; height: 180px; }
        .time-btn { padding: 10px; border-radius: 12px; font-size: 9px; font-weight: 900; border: 1px solid #1a1a1a; color: #444; cursor: pointer; text-align: center; width: 100px; transition: 0.3s; }
        .time-btn.active { border-color: #ccff00; color: #ccff00; background: rgba(204, 255, 0, 0.1); }
        .status-banner { width: 100%; height: 50px; background: #0a0a0a; border-radius: 20px; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
    </style>
</head>
<body class="pb-10">

    <div class="flex justify-between items-center mb-4">
        <div class="flex gap-2">
            <a href="index.html" class="w-8 h-8 bg-zinc-900 rounded-full flex items-center justify-center border border-zinc-800 text-zinc-400">←</a>
            <button onclick="setLang('en')" class="w-8 h-8 rounded-full border border-zinc-800 bg-zinc-900" id="btn-en">🇺🇸</button>
            <button onclick="setLang('es')" class="w-8 h-8 rounded-full border border-zinc-800 bg-zinc-900 opacity-40" id="btn-es">🇪🇸</button>
        </div>
        <p class="text-[7px] text-zinc-500 font-bold uppercase tracking-widest italic">ADA Guidelines 2026</p>
    </div>

    <div class="status-banner" id="status-box">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2 h-2 bg-zinc-700 rounded-full"></div>
            <p class="text-zinc-500 font-black uppercase text-[9px] tracking-widest" id="status-text">LOCAL MODE</p>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-2 mb-6">
        <div class="stat-card">
            <p class="text-[6px] font-bold text-zinc-600 uppercase lang-avg">Avg Glucose</p>
            <p id="avg-val" class="text-lg font-black text-white">--</p>
        </div>
        <div class="stat-card">
            <p class="text-[6px] font-bold text-zinc-600 uppercase">Est. A1C</p>
            <p id="a1c-val" class="text-lg font-black text-[#ccff00]">--</p>
        </div>
        <div class="stat-card">
            <p class="text-[6px] font-bold text-zinc-600 uppercase">TIR %</p>
            <p id="tir-val" class="text-lg font-black text-lime-500">--</p>
        </div>
    </div>

    <div class="bg-zinc-900/30 p-3 rounded-3xl mb-6 border border-zinc-800/50">
        <div class="tir-bar">
            <div id="bar-low" class="bg-red-600" style="width: 0%"></div>
            <div id="bar-target" class="bg-lime-500" style="width: 0%"></div>
            <div id="bar-high" class="bg-orange-500" style="width: 0%"></div>
        </div>
        <div class="flex justify-between text-[6px] text-zinc-500 font-black uppercase px-1">
            <span>Low <70</span><span>Range 70-180</span><span>High >180</span>
        </div>
    </div>

    <div class="flex justify-center gap-3 mb-2">
        <div id="time-fast" class="time-btn active uppercase" onclick="selectTime('fasting')">FASTING</div>
        <div id="time-post" class="time-btn uppercase" onclick="selectTime('post-meal')">POST-MEAL</div>
    </div>

    <div id="display" class="display-glu">---</div>

    <div class="num-pad">
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
        <div class="key text-red-500" onclick="press('C')">C</div><div class="key" onclick="press('0')">0</div><div class="key" onclick="press('←')">←</div>
        <div class="key key-save lang-save" onclick="saveGlu()">SAVE & TRANSMIT</div>
        <div class="key" onclick="startMic()">🎤</div>
    </div>

    <div class="chart-modern mt-6"><canvas id="gluChart"></canvas></div>

    <div class="mt-8 space-y-4">
        <button onclick="generatePDF()" class="w-full bg-[#ccff00] text-black p-4 font-black uppercase rounded-2xl text-[10px] tracking-widest">Download Clinical Report 📄</button>
        <button onclick="clearAll()" class="w-full p-2 text-zinc-800 text-[8px] font-black uppercase tracking-widest">Clear History 🗑️</button>
    </div>

    <footer class="mt-8 text-[6px] text-zinc-700 text-center uppercase font-bold px-8 pb-10">
        *Disclaimer: All information provided by the patient using the app is not based on official medical records.*
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, set, push } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCiIUVMfCt68zWs6Z5aRcyaMQoAUyAmMRI",
            authDomain: "montcode-sentinel.firebaseapp.com",
            databaseURL: "https://montcode-sentinel-default-rtdb.firebaseio.com",
            projectId: "montcode-sentinel",
            storageBucket: "montcode-sentinel.firebasestorage.app",
            messagingSenderId: "726407164878",
            appId: "1:726407164878:web:551351e1cd856dac78b19f"
        };

        const app = initializeApp(firebaseConfig);
        const db_fire = getDatabase(app);

        window.transmitToFirebase = async (val, mode) => {
            const pId = localStorage.getItem('patient_id') || "MC-DEBUG-001";
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-dot');

            statusText.innerText = "TRANSMITTING...";
            statusDot.className = "w-2 h-2 bg-yellow-500 animate-pulse";

            try {
                const vitalsRef = ref(db_fire, `vitals/${pId}`);
                await push(vitalsRef, {
                    glucose: val,
                    mode: mode,
                    timestamp: Date.now(),
                    type: "GLUCOSE"
                });

                await set(ref(db_fire, `mensaje_dr/${pId}`), {
                    v: val,
                    texto: `GLUCOSE REPORT: ${val} MG/DL (${mode.toUpperCase()})`,
                    timestamp: Date.now(),
                    provider: "PATIENT_GLU" 
                });

                statusText.innerText = "BRIDGE SYNCED ✅";
                statusDot.className = "w-2 h-2 bg-[#ccff00] shadow-[0_0_8px_#ccff00]";
                setTimeout(() => {
                    statusText.innerText = "BRIDGE ACTIVE";
                    statusDot.className = "w-2 h-2 bg-blue-500";
                }, 3000);

            } catch (e) { 
                statusText.innerText = "LINK ERROR";
                statusDot.className = "w-2 h-2 bg-red-500";
            }
        };
    </script>

    <script>
        let db = JSON.parse(localStorage.getItem('mc_glu_master_2026')) || [];
        let currentInput = "";
        let selectedTime = "fasting";
        let chart;
        let currentLang = 'en';

        window.onload = () => {
            initChart();
            updateUI();
            setLang('en');
        };

        function selectTime(t) {
            selectedTime = t;
            document.getElementById('time-fast').classList.toggle('active', t === 'fasting');
            document.getElementById('time-post').classList.toggle('active', t === 'post-meal');
        }

        function press(n) {
            if(n === 'C') currentInput = "";
            else if(n === '←') currentInput = currentInput.slice(0, -1);
            else if(currentInput.length < 3) currentInput += n;
            document.getElementById('display').innerText = currentInput || "---";
        }

        function saveGlu() {
            if(!currentInput) return;
            const val = parseInt(currentInput);
            db.push({ v: val, t: selectedTime, d: new Date().toISOString() });
            localStorage.setItem('mc_glu_master_2026', JSON.stringify(db));
            
            if (window.transmitToFirebase) window.transmitToFirebase(val, selectedTime);

            speakValue(val);
            currentInput = ""; 
            document.getElementById('display').innerText = "---";
            updateUI();
        }

        function speakValue(val) {
            let msg = currentLang === 'es' ? `${val} miligramos.` : `${val} milligrams.`;
            const u = new SpeechSynthesisUtterance(msg);
            u.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
            window.speechSynthesis.speak(u);
        }

        function updateUI() {
            if (db.length === 0) return;
            const vals = db.map(i => i.v);
            const avg = Math.round(vals.reduce((a,b)=>a+b)/vals.length);
            const a1c = ((46.7 + avg) / 28.7).toFixed(1);
            const total = vals.length;
            const low = vals.filter(v => v < 70).length;
            const high = vals.filter(v => v > 180).length;
            const inRange = total - (low + high);
            const tir = Math.round((inRange / total) * 100);

            document.getElementById('avg-val').innerText = avg;
            document.getElementById('a1c-val').innerText = a1c + "%";
            document.getElementById('tir-val').innerText = tir + "%";
            
            document.getElementById('bar-low').style.width = (low / total * 100) + "%";
            document.getElementById('bar-target').style.width = (inRange / total * 100) + "%";
            document.getElementById('bar-high').style.width = (high / total * 100) + "%";
            updateChart();
        }

        function initChart() {
            const ctx = document.getElementById('gluChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#ccff00', borderWidth: 3, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#ccff00', fill: true, backgroundColor: 'rgba(204, 255, 0, 0.05)' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#111' }, ticks: { color: '#444' } }, x: { display: false } } }
            });
        }

        function updateChart() {
            const last = db.slice(-12);
            chart.data.labels = last.map(d => "");
            chart.data.datasets[0].data = last.map(d => d.v);
            chart.update();
        }

        function setLang(lang) {
            currentLang = lang;
            const t = { en: { avg: "Avg Glucose", save: "SAVE & TRANSMIT", fast: "FASTING", post: "POST-MEAL" }, es: { avg: "Promedio", save: "GUARDAR Y ENVIAR", fast: "AYUNAS", post: "POST-COMIDA" } }[lang];
            document.querySelector('.lang-avg').innerText = t.avg;
            document.querySelector('.lang-save').innerText = t.save;
            document.getElementById('time-fast').innerText = t.fast;
            document.getElementById('time-post').innerText = t.post;
            document.getElementById('btn-en').style.opacity = lang === 'en' ? '1' : '0.4';
            document.getElementById('btn-es').style.opacity = lang === 'es' ? '1' : '0.4';
        }

        function clearAll() { if(confirm("Clear history?")) { db=[]; localStorage.removeItem('mc_glu_master_2026'); location.reload(); } }
    </script>
</body>
</html>

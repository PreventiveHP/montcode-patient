<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MontCode™ Clinical Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; padding: 15px; touch-action: manipulation; }
        .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; padding: 12px; text-align: center; }
        .num-pad { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; margin-top: 20px; opacity: 0.3; pointer-events: none; transition: 0.5s; }
        .num-pad.active { opacity: 1; pointer-events: auto; }
        .key { background: #111; border-radius: 20px; padding: 22px; font-size: 1.6rem; font-weight: 800; border: 1px solid #222; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; }
        .key:active { background: #222; transform: scale(0.95); }
        .key-save { grid-column: span 2; font-size: 1rem; font-weight: 900; transition: 0.3s; }
        .display-bp { font-size: 5.5rem; font-weight: 900; text-align: center; line-height: 1; padding: 15px 0; min-height: 110px; transition: color 0.4s; }
        .status-banner { width: 100%; height: 70px; background: #0a0a0a; border-radius: 24px; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; transition: 0.5s; }
        .bridge-active { border-style: solid; border-color: #ccff00; background: rgba(204, 255, 0, 0.05); }
        .chart-modern { background: #050505; border-radius: 30px; border: 1px solid #1a1a1a; padding: 15px; margin-top: 20px; height: 200px; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center mb-4 pt-2">
        <div class="flex gap-3">
            <button onclick="setLang('en')" id="btn-en" class="text-xl grayscale opacity-40">🇺🇸</button>
            <button onclick="setLang('es')" id="btn-es" class="text-xl grayscale opacity-40">🇪🇸</button>
        </div>
        <p id="pat-name" class="text-[10px] font-black text-zinc-500 uppercase tracking-tighter italic">--</p>
    </div>

    <div class="status-banner" id="status-box">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2.5 h-2.5 bg-red-600 rounded-full animate-pulse"></div>
            <p class="text-zinc-500 font-black uppercase text-[10px] tracking-widest" id="status-text">NOT LINKED</p>
        </div>
    </div>

    <div class="grid grid-cols-4 gap-1 mb-6">
        <div class="stat-card"><p class="text-[6px] font-bold text-zinc-600 uppercase">SYS Avg</p><p id="sys-val" class="text-md font-black text-white">--</p></div>
        <div class="stat-card"><p class="text-[6px] font-bold text-zinc-600 uppercase">DIA Avg</p><p id="dia-val" class="text-md font-black text-white">--</p></div>
        <div class="stat-card border-blue-900/30"><p class="text-[6px] font-bold text-blue-500 uppercase">MAP</p><p id="map-val" class="text-md font-black text-blue-500">--</p></div>
        <div class="stat-card"><p class="text-[6px] font-bold text-zinc-600 uppercase">Status</p><p id="bp-status" class="text-[8px] font-black text-zinc-400">READY</p></div>
    </div>

    <div id="display" class="display-bp text-zinc-800">---/--</div>
    <p class="text-center text-[8px] font-black text-zinc-500 uppercase mb-4 tracking-[0.2em]" id="mode-hint">Waiting for input</p>

    <div class="num-pad" id="main-pad">
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
        <div class="key text-red-600" onclick="press('C')">C</div><div class="key" onclick="press('0')">0</div><div class="key" onclick="press('←')">←</div>
        <button class="key key-save bg-zinc-800 text-zinc-600" id="save-btn" onclick="saveReading()">TRANSMIT DATA</button>
        <div class="key" onclick="startMic()">🎤</div>
    </div>

    <div class="chart-modern">
        <canvas id="bpChart"></canvas>
    </div>

    <div class="mt-8 space-y-3 pb-10">
        <button onclick="generatePDF()" class="w-full bg-blue-600 text-white p-4 font-black uppercase rounded-2xl text-[10px] tracking-widest shadow-lg shadow-blue-900/20">Generate Report 📄</button>
        <p class="text-[6px] text-zinc-700 text-center uppercase font-bold">*Clinical data stored locally. No cloud history.*</p>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('mc_bp_master_2026')) || [];
    let currentInput = "";
    let chart;
    let currentLang = localStorage.getItem('mc_lang') || 'en';
    const providerID = localStorage.getItem('mc_provider_id');
    const patientName = localStorage.getItem('mc_patient_name') || "Unknown Patient";

    window.onload = () => {
        initChart();
        updateUI();
        setLang(currentLang);
        checkConnection();
        document.getElementById('pat-name').innerText = patientName;
        setTimeout(() => document.getElementById('main-pad').classList.add('active'), 500);
    };

    function checkConnection() {
        const box = document.getElementById('status-box');
        const txt = document.getElementById('status-text');
        const dot = document.getElementById('status-dot');
        if(providerID) {
            box.classList.add('bridge-active');
            txt.innerText = `LINKED: ${providerID}`;
            txt.style.color = "#ccff00";
            dot.className = "w-2.5 h-2.5 bg-[#ccff00] rounded-full shadow-[0_0_10px_#ccff00]";
        }
    }

    function press(n) {
        if(n === 'C') currentInput = "";
        else if(n === '←') currentInput = currentInput.slice(0, -1);
        else if(currentInput.length < 6) currentInput += n;
        updateDisplay();
    }

    function updateDisplay() {
        const d = document.getElementById('display');
        const hint = document.getElementById('mode-hint');
        const btn = document.getElementById('save-btn');

        if(currentInput.length === 0) {
            d.innerText = "---/--"; d.style.color = "#1a1a1a";
            btn.className = "key key-save bg-zinc-900 text-zinc-700";
        } else if(currentInput.length <= 3) {
            d.innerText = currentInput.padEnd(3, '-');
            d.style.color = "#ccff00";
            hint.innerText = "GLUCOSE MODE ACTIVE";
            btn.className = "key key-save bg-[#ccff00] text-black";
        } else {
            let s = currentInput.padEnd(6, '-');
            d.innerText = s.slice(0,3) + "/" + s.slice(3,6);
            d.style.color = "#3b82f6";
            hint.innerText = "BP MONITORING MODE";
            btn.className = "key key-save bg-blue-600 text-white";
        }
    }

    async function saveReading() {
        if(currentInput.length < 1) return;
        let s, d, type;

        if(currentInput.length <= 3) {
            s = parseInt(currentInput); d = 77; type = "GLUCOSE";
        } else {
            s = parseInt(currentInput.slice(0,3));
            d = parseInt(currentInput.slice(3,6)) || 80;
            type = "BP";
        }

        db.push({ sys: s, dia: d, type: type, d: new Date().toISOString() });
        localStorage.setItem('mc_bp_master_2026', JSON.stringify(db));

        const statusTxt = document.getElementById('status-text');
        statusTxt.innerText = "TRANSMITTING...";
        
        try {
            const res = await fetch('/api/pusher-relay', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sys: s, dia: d, patient: patientName, provider: providerID || "UNLINKED" })
            });
            if(res.ok) {
                statusTxt.innerText = "SENT TO HUB ✅";
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }
        } catch (e) {
            statusTxt.innerText = "SAVED OFFLINE";
        }

        speak(s, d, type);
        currentInput = ""; updateDisplay(); updateUI();
        setTimeout(checkConnection, 3000);
    }

    function speak(s, d, type) {
        const msg = type === "GLUCOSE" ? 
            (currentLang === 'es' ? `Glucosa ${s}.` : `Glucose ${s}.`) :
            (currentLang === 'es' ? `Presión ${s} sobre ${d}.` : `Pressure ${s} over ${d}.`);
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
        window.speechSynthesis.speak(u);
    }

    function updateUI() {
        const bp = db.filter(r => r.type === "BP");
        if (bp.length === 0) return;
        const avgS = Math.round(bp.reduce((a,b)=>a+b.sys,0)/bp.length);
        const avgD = Math.round(bp.reduce((a,b)=>a+b.dia,0)/bp.length);
        document.getElementById('sys-val').innerText = avgS;
        document.getElementById('dia-val').innerText = avgD;
        document.getElementById('map-val').innerText = Math.round((avgS + (2 * avgD)) / 3);
        updateChart();
    }

    function initChart() {
        const ctx = document.getElementById('bpChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { data: [], borderColor: '#fff', tension: 0.4, pointRadius: 0, borderWidth: 2 },
                { data: [], borderColor: '#3b82f6', tension: 0.4, pointRadius: 0, borderWidth: 2 }
            ]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#111' } } } }
        });
    }

    function updateChart() {
        const last = db.filter(r => r.type === "BP").slice(-10);
        chart.data.labels = last.map(d => "");
        chart.data.datasets[0].data = last.map(d => d.sys);
        chart.data.datasets[1].data = last.map(d => d.dia);
        chart.update();
    }

    function setLang(l) {
        currentLang = l; localStorage.setItem('mc_lang', l);
        document.getElementById('btn-en').style.opacity = (l === 'en') ? "1" : "0.3";
        document.getElementById('btn-es').style.opacity = (l === 'es') ? "1" : "0.3";
        document.getElementById('btn-en').style.filter = (l === 'en') ? "grayscale(0)" : "grayscale(1)";
        document.getElementById('btn-es').style.filter = (l === 'es') ? "grayscale(0)" : "grayscale(1)";
    }

    function startMic() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = currentLang === 'es' ? 'es-ES' : 'en-US';
        recognition.onresult = (event) => {
            const speechToText = event.results[0][0].transcript.replace(/\D/g,'');
            if(speechToText) { currentInput = speechToText.slice(0,6); updateDisplay(); }
        };
        recognition.start();
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(22); doc.text("MontCode™ Clinical Report", 20, 20);
        doc.setFontSize(12); doc.text(`Patient: ${patientName}`, 20, 30);
        doc.text(`Generated: ${new Date().toLocaleString()}`, 20, 40);
        doc.save(`MontCode_${patientName}.pdf`);
    }
</script>
</body>
</html>
